<!-- @dsCard group="Brand" viewport="700x150" name="Logo & Mark" subtitle="The MemoX wordmark and app mark" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--memox-bg);font-family:var(--memox-font-sans);color:var(--memox-text);padding:24px;display:flex;align-items:center;gap:40px}
  .mark{width:48px;height:48px;border-radius:14px;background:var(--memox-accent);color:var(--memox-accent-contrast);display:grid;place-items:center;font-weight:800;font-size:27px;box-shadow:var(--memox-shadow-sm)}
  .word{font-size:34px;font-weight:800;letter-spacing:-.03em}
  .word b{color:var(--memox-accent)}
  .lockup{display:flex;align-items:center;gap:14px}
  .ondark{background:var(--memox-bg);padding:14px 18px;border-radius:var(--memox-radius-md)}
</style></head><body>
  <div class="lockup"><div class="mark">M</div><span class="word">Memo<b>X</b></span></div>
  <div class="lockup memox-dark ondark"><div class="mark">M</div><span class="word" style="color:var(--memox-text)">Memo<b>X</b></span></div>
</body></html>
