<!-- @dsCard group="Spacing" viewport="700x130" name="Spacing Scale" subtitle="4px base — space-1 … space-12" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--memox-bg);font-family:var(--memox-font-sans);color:var(--memox-text);padding:20px}
  .row{display:flex;align-items:flex-end;gap:14px}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--memox-accent);border-radius:3px;width:22px}
  .n{font-family:var(--memox-font-mono);font-size:10.5px;color:var(--memox-text-3)}
</style></head><body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><span class="n">1·4</span></div>
    <div class="col"><div class="bar" style="height:8px"></div><span class="n">2·8</span></div>
    <div class="col"><div class="bar" style="height:12px"></div><span class="n">3·12</span></div>
    <div class="col"><div class="bar" style="height:16px"></div><span class="n">4·16</span></div>
    <div class="col"><div class="bar" style="height:20px"></div><span class="n">5·20</span></div>
    <div class="col"><div class="bar" style="height:24px"></div><span class="n">6·24</span></div>
    <div class="col"><div class="bar" style="height:32px"></div><span class="n">8·32</span></div>
    <div class="col"><div class="bar" style="height:40px"></div><span class="n">10·40</span></div>
    <div class="col"><div class="bar" style="height:48px"></div><span class="n">12·48</span></div>
  </div>
</body></html>
