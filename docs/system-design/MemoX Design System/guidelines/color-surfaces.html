<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & Text" subtitle="Backgrounds, cards, and the text ramp (light)" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--memox-bg);font-family:var(--memox-font-sans);padding:18px}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{border-radius:var(--memox-radius-sm);min-height:64px;border:1px solid var(--memox-border);display:flex;align-items:flex-end;padding:8px}
  .t{font-size:10.5px;font-weight:700;font-family:var(--memox-font-mono)}
</style></head><body>
  <div class="grid">
    <div class="sw" style="background:var(--memox-bg)"><span class="t" style="color:var(--memox-text)">bg</span></div>
    <div class="sw" style="background:var(--memox-surface)"><span class="t" style="color:var(--memox-text)">surface</span></div>
    <div class="sw" style="background:var(--memox-surface-2)"><span class="t" style="color:var(--memox-text)">surface-2</span></div>
    <div class="sw" style="background:var(--memox-text)"><span class="t" style="color:#fff">text</span></div>
    <div class="sw" style="background:var(--memox-text-2)"><span class="t" style="color:#fff">text-2</span></div>
    <div class="sw" style="background:var(--memox-text-3)"><span class="t" style="color:#fff">text-3</span></div>
  </div>
</body></html>
