<!-- @dsCard group="Colors" viewport="700x130" name="Note Tints" subtitle="The 8 memo highlight colors used to code spaces & tags" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--memox-bg);font-family:var(--memox-font-sans);padding:18px}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
  .sw{border-radius:var(--memox-radius-sm);height:58px;display:flex;align-items:flex-end;padding:6px}
  .t{font-size:9.5px;font-weight:700;font-family:var(--memox-font-mono);color:rgba(0,0,0,.55)}
</style></head><body>
  <div class="grid">
    <div class="sw" style="background:var(--memox-note-yellow)"><span class="t">yellow</span></div>
    <div class="sw" style="background:var(--memox-note-amber)"><span class="t">amber</span></div>
    <div class="sw" style="background:var(--memox-note-green)"><span class="t">green</span></div>
    <div class="sw" style="background:var(--memox-note-teal)"><span class="t">teal</span></div>
    <div class="sw" style="background:var(--memox-note-blue)"><span class="t">blue</span></div>
    <div class="sw" style="background:var(--memox-note-violet)"><span class="t">violet</span></div>
    <div class="sw" style="background:var(--memox-note-pink)"><span class="t">pink</span></div>
    <div class="sw" style="background:var(--memox-note-clay)"><span class="t">clay</span></div>
  </div>
</body></html>
