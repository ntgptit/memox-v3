<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--memox-bg);font-family:var(--memox-font-sans);color:var(--memox-text);padding:20px;display:flex;gap:16px;align-items:flex-end}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:64px;height:56px;background:var(--memox-surface);border:1.5px solid var(--memox-accent)}
  .n{font-family:var(--memox-font-mono);font-size:11px;color:var(--memox-text-3)}
</style></head><body>
  <div class="col"><div class="box" style="border-radius:var(--memox-radius-xs)"></div><span class="n">xs 6</span></div>
  <div class="col"><div class="box" style="border-radius:var(--memox-radius-sm)"></div><span class="n">sm 10</span></div>
  <div class="col"><div class="box" style="border-radius:var(--memox-radius-md)"></div><span class="n">md 14</span></div>
  <div class="col"><div class="box" style="border-radius:var(--memox-radius-lg)"></div><span class="n">lg 20</span></div>
  <div class="col"><div class="box" style="border-radius:var(--memox-radius-xl)"></div><span class="n">xl 28</span></div>
  <div class="col"><div class="box" style="border-radius:var(--memox-radius-pill);width:84px"></div><span class="n">pill</span></div>
</body></html>
