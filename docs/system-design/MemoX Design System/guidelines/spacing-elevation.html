<!-- @dsCard group="Spacing" viewport="700x150" name="Elevation" subtitle="sm · md · lg — soft, neutral, no colored glows" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--memox-bg);font-family:var(--memox-font-sans);color:var(--memox-text);padding:26px;display:flex;gap:30px;align-items:center}
  .col{display:flex;flex-direction:column;align-items:center;gap:12px}
  .box{width:120px;height:64px;border-radius:var(--memox-radius-md);background:var(--memox-card);border:1px solid var(--memox-border)}
  .n{font-family:var(--memox-font-mono);font-size:11px;color:var(--memox-text-3)}
</style></head><body>
  <div class="col"><div class="box" style="box-shadow:var(--memox-shadow-sm)"></div><span class="n">shadow-sm · cards</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--memox-shadow-md)"></div><span class="n">shadow-md · FAB</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--memox-shadow-lg)"></div><span class="n">shadow-lg · sheets</span></div>
</body></html>
