<!-- @dsCard group="Colors" viewport="700x140" name="Brand & Accent" subtitle="MemoX accent (Tokyo Free blue / dark violet) and its states" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--memox-bg);font-family:var(--memox-font-sans);padding:18px}
  .row{display:flex;gap:12px}
  .sw{flex:1;border-radius:var(--memox-radius-md);padding:12px;border:1px solid var(--memox-border);min-height:78px;display:flex;flex-direction:column;justify-content:flex-end}
  .name{font-size:12px;font-weight:700;color:var(--memox-text)}
  .val{font-size:11px;font-family:var(--memox-font-mono);color:var(--memox-text-3)}
  .on{color:#fff}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:var(--memox-accent)"><span class="name on">accent</span><span class="val on">--memox-accent</span></div>
    <div class="sw" style="background:var(--memox-accent-press)"><span class="name on">accent-press</span><span class="val on">--memox-accent-press</span></div>
    <div class="sw" style="background:var(--memox-accent-soft)"><span class="name">accent-soft</span><span class="val">--memox-accent-soft</span></div>
    <div class="sw" style="background:var(--memox-text-accent)"><span class="name on">text-accent</span><span class="val on">--memox-text-accent</span></div>
  </div>
</body></html>
