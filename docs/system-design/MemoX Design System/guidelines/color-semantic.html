<!-- @dsCard group="Colors" viewport="700x150" name="Semantic" subtitle="Success, warning, danger, info — soft + solid" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--memox-bg);font-family:var(--memox-font-sans);padding:18px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .col{display:flex;flex-direction:column;gap:6px}
  .solid{border-radius:var(--memox-radius-sm);height:44px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
  .soft{border-radius:var(--memox-radius-sm);height:26px;border:1px solid var(--memox-border)}
</style></head><body>
  <div class="grid">
    <div class="col"><div class="solid" style="background:var(--memox-success)">success</div><div class="soft" style="background:var(--memox-success-soft)"></div></div>
    <div class="col"><div class="solid" style="background:var(--memox-warn)">warn</div><div class="soft" style="background:var(--memox-warn-soft)"></div></div>
    <div class="col"><div class="solid" style="background:var(--memox-danger)">danger</div><div class="soft" style="background:var(--memox-danger-soft)"></div></div>
    <div class="col"><div class="solid" style="background:var(--memox-info)">info</div><div class="soft" style="background:var(--memox-info-soft)"></div></div>
  </div>
</body></html>
