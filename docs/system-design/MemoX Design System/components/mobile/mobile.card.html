<!-- @dsCard group="Components" viewport="700x360" name="Mobile — NoteCard & Card" subtitle="The signature memo tile plus the generic surface container" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--memox-bg); font-family: var(--memox-font-sans); }
  .wrap { padding: 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script type="text/babel">
  const { NoteCard, Card, Badge } = window.DesignSystem_48ad9c;
  function Demo() {
    return (
      <>
        <NoteCard
          title="Q3 launch checklist" folder="Work" time="9:24"
          color="var(--memox-note-amber)" pinned
          body="Finalize copy, ship the changelog, schedule the announce thread for Tuesday morning."
          tags={['launch','todo']} />
        <NoteCard
          title="Trip to Đà Lạt" folder="Travel" time="Mon"
          color="var(--memox-note-teal)"
          body="Pine forests, coffee farms, the night market. Budget roughly 4 days." />
        <Card elevation="md" accent="var(--memox-note-violet)">
          <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--memox-text)', marginBottom: 4 }}>Generic Card</div>
          <div style={{ fontSize: 13, color: 'var(--memox-text-2)', lineHeight: 1.5 }}>
            Surface container with elevation and an optional accent bar.
          </div>
        </Card>
        <Card elevation="sm">
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <Badge tone="success" icon="check">Saved</Badge>
            <Badge tone="accent">Pro</Badge>
          </div>
        </Card>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  requestAnimationFrame(() => lucide.createIcons());
  setTimeout(() => lucide.createIcons(), 120);
</script>
</body>
</html>
