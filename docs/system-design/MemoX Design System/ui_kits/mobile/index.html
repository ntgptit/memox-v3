<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=390, initial-scale=1" />
<title>MemoX — Mobile UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { margin: 0; background: #E6E8EA; font-family: var(--memox-font-sans); transition: background 200ms cubic-bezier(0.2,0,0,1); --memox-error-fill: #DC2D4E; }
  body.stage-dark { background: #0D0D0F; }
  .stage {
    padding: 28px;
    display: flex;
    gap: 28px;
    align-items: flex-start;
    justify-content: flex-start;
    overflow-x: auto;
    min-height: 100vh;
  }
  .phone {
    width: var(--phone-w, 390px);
    height: 780px;
    background: var(--memox-surface);
    border-radius: 44px;
    border: 8px solid #1a1a1a;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
    box-shadow: 0 24px 60px rgba(25,28,30,0.12);
  }
  .memox-dark .phone {
    border-color: #2A2A2C;
    box-shadow: 0 24px 60px rgba(0,0,0,0.45);
  }
  .phone-label {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--memox-on-surface-variant);
    margin-top: 10px;
  }
  .phone-col { display: flex; flex-direction: column; align-items: center; }
  /* shared app layout inside phone */
  .app { height: 100%; width: 100%; display: flex; flex-direction: column; background: var(--memox-surface); color: var(--memox-on-surface); position: relative; overflow: hidden; }
  .statusbar { height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; font-size: 14px; font-weight: 600; }
  .appbar { height: 48px; display: flex; align-items: center; padding: 0 8px; gap: 4px; }
  .appbar .title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; flex: 1; }
  .appbar-lg { height: 56px; padding: 0 14px; }
  .scroll { flex: 1; overflow-y: auto; padding: 0 14px 14px; scrollbar-width: none; -ms-overflow-style: none; }
  .scroll::-webkit-scrollbar { display: none; }
  .ov { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--memox-on-surface-variant); }
  .card { background: var(--memox-surface-container-lowest); border: var(--memox-border-ghost); border-radius: 12px; padding: 12px; }
  .icon-btn { width: 36px; height: 36px; border-radius: 999px; display:inline-flex; align-items:center; justify-content:center; background: transparent; border: none; padding: 0; color: var(--memox-on-surface); cursor: pointer; }
  .icon-btn:hover { background: rgba(82,101,245,0.08); }
  .memox-dark .icon-btn:hover { background: rgba(108,124,255,0.14); }
  .icon-btn svg { width: 20px; height: 20px; }
  /* Scroll row — hide scrollbar but keep scrolling */
  .scroll-x { overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
  .scroll-x::-webkit-scrollbar { display: none; }
  .bottom-nav-wrap { padding: 4px 10px 12px; }
  .bottom-nav {
    height: 64px;
    background: var(--memox-chrome-glass);
    backdrop-filter: var(--memox-chrome-blur);
    -webkit-backdrop-filter: var(--memox-chrome-blur);
    border: var(--memox-border-ghost);
    border-radius: 18px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    align-items: center;
  }
  .bn-item { display:flex; flex-direction:column; align-items:center; gap: 3px; color: var(--memox-on-surface-variant); font-size: 10px; font-weight: 600; cursor: pointer; }
  .bn-item svg { width: 20px; height: 20px; }
  .bn-item.active { color: var(--memox-primary); }
  .bn-item.active .bn-pill { background: rgba(82, 101, 245, 0.14); padding: 4px 14px; border-radius: 999px; }
  .memox-dark .bn-item.active .bn-pill { background: rgba(139, 154, 255, 0.20); }
  button { font-family: inherit; cursor: pointer; }
  .pill-btn {
    height: 40px; padding: 0 18px; border-radius: 10px; border: none;
    font-size: 13px; font-weight: 600; letter-spacing: 0.1px;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  }
  .pill-btn.primary { background: var(--memox-primary); color: #fff; }
  .pill-btn.secondary { background: var(--memox-surface-container); color: var(--memox-on-surface); }
  .pill-btn.outline { background: transparent; color: var(--memox-primary); border: 1px solid var(--memox-outline-variant); }
  .status-dot { width: 8px; height: 8px; border-radius: 999px; display: inline-block; }
  .icon-tile {
    background: rgba(82, 101, 245, 0.10);
    color: var(--memox-primary);
  }
  .memox-dark .icon-tile {
    background: rgba(139, 154, 255, 0.16);
    color: var(--memox-primary);
  }

  /* ── Dark mode (scoped, not via media query so users can toggle per preview) ── */
  /* Tokyo Nebula — deep navy night, paper indigo cards, violet accent */
  .memox-dark {
    --memox-surface:                    #0A0E27;
    --memox-surface-bright:             #232B5A;
    --memox-surface-dim:                #060925;
    --memox-surface-container-lowest:   #131A3A;
    --memox-surface-container-low:      #1B2249;
    --memox-surface-container:          #232B5A;
    --memox-surface-container-high:     #2C356E;
    --memox-surface-container-highest:  #353D7E;
    --memox-on-surface:          #E4E8FA;
    --memox-on-surface-variant:  #A4ACD0;
    --memox-outline:             #5A6BAE;
    --memox-outline-variant:     #2A3267;
    --memox-mastery: #6FE0BD;
    --memox-error:   #FF8FA3;
    /* Solid danger-button fill — deep rose, so dark-mode delete CTAs don't glare
       like the light-pink text/icon error color (#FF8FA3) did as a full fill */
    --memox-error-fill: #B0485C;
    --memox-streak:  #FFAE6E;
    --memox-chrome-glass: rgba(10, 14, 39, 0.84);
    --memox-border-ghost: 1px solid rgba(139, 154, 255, 0.16);
    --memox-primary:    #5265F5;
    --memox-on-primary: #FFFFFF;
    /* Card status + rating — dark values (previously fell back to light tokens) */
    --memox-status-new:        #6B75A3;
    --memox-status-learning:   #FFC658;
    --memox-status-reviewing:  #5265F5;
    --memox-status-mastered:   #6FE0BD;
    --memox-rating-again:      #FF8FA3;
  }
  .mode-toggle {
    position: sticky; top: 16px; z-index: 5;
    display: inline-flex; gap: 4px;
    padding: 4px; border-radius: 999px;
    background: rgba(0,0,0,0.06); backdrop-filter: blur(8px);
    border: 1px solid rgba(0,0,0,0.06);
    margin: 0 0 20px;
    font-family: var(--memox-font-sans);
  }
  body.stage-dark .mode-toggle { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.08); }
  .mode-toggle button {
    border: none; background: transparent; border-radius: 999px;
    height: 32px; padding: 0 14px; font-size: 12px; font-weight: 600;
    color: #454652; display: inline-flex; align-items: center; gap: 6px;
  }
  body.stage-dark .mode-toggle button { color: #C2C2C8; }
  .mode-toggle button.active { background: #fff; color: #191C1E; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
  body.stage-dark .mode-toggle button.active { background: #35353A; color: #E5E5E7; }
  .mode-toggle svg { width: 14px; height: 14px; }
  .stage-header { padding: 0 28px; position: sticky; top: 0; z-index: 6; }

  /* ── Rewritten gallery shell: per-screen rows, light+dark pairs, state steppers ── */
  .controls {
    position: sticky; top: 0; z-index: 20;
    display: flex; flex-wrap: wrap; align-items: center; gap: 16px 24px;
    padding: 16px 28px;
    background: rgba(230,232,234,0.88);
    backdrop-filter: saturate(160%) blur(14px); -webkit-backdrop-filter: saturate(160%) blur(14px);
    border-bottom: 1px solid rgba(20,24,48,0.08);
  }
  body.stage-dark .controls { background: rgba(13,13,15,0.88); border-bottom-color: rgba(255,255,255,0.08); }
  .brandblock { display: flex; flex-direction: column; margin-right: auto; gap: 2px; }
  .brand { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; color: #1b1f3a; }
  .sub { font-size: 12px; font-weight: 500; color: #5a5f72; }
  body.stage-dark .brand { color: #E4E8FA; }
  body.stage-dark .sub { color: #9aa0b8; }
  .ctl { display: inline-flex; align-items: center; gap: 8px; }
  .seg-label { font-size: 10px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: #6a6f82; }
  body.stage-dark .seg-label { color: #8b91a8; }
  .seg { display: inline-flex; gap: 2px; padding: 3px; border-radius: 999px; background: rgba(20,24,48,0.06); }
  body.stage-dark .seg { background: rgba(255,255,255,0.07); }
  .seg button {
    border: none; background: transparent; border-radius: 999px;
    height: 30px; min-width: 44px; padding: 0 14px; cursor: pointer;
    font-family: var(--memox-font-sans); font-size: 12px; font-weight: 600;
    color: #4b4f63; display: inline-flex; align-items: center; justify-content: center;
    transition: background 120ms cubic-bezier(0.2,0,0,1), color 120ms cubic-bezier(0.2,0,0,1);
  }
  body.stage-dark .seg button { color: #b8bdd2; }
  .seg button.active { background: #fff; color: #191c2e; box-shadow: 0 1px 2px rgba(0,0,0,0.12); }
  body.stage-dark .seg button.active { background: #353A52; color: #fff; }

  .gallery { padding: 8px 28px 96px; }
  .section-head {
    padding: 40px 4px 10px; font-size: 12px; font-weight: 800;
    letter-spacing: 1.4px; text-transform: uppercase; color: #6a6f82;
  }
  body.stage-dark .section-head { color: #8b91a8; }
  .row { padding: 12px 0 10px; }
  .row-head { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
  .row-num { font-size: 11px; font-weight: 800; letter-spacing: 1px; color: #9499ab; }
  .row-title { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; color: #1b1f3a; }
  body.stage-dark .row-title { color: #E4E8FA; }
  .stepper { display: inline-flex; align-items: center; gap: 6px; padding: 4px; border-radius: 999px; background: rgba(20,24,48,0.05); }
  body.stage-dark .stepper { background: rgba(255,255,255,0.06); }
  .stepper button {
    width: 32px; height: 32px; border: none; border-radius: 999px; background: #fff; color: #3a3f55;
    display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
  }
  body.stage-dark .stepper button { background: #353A52; color: #E4E8FA; }
  .stepper svg { width: 16px; height: 16px; }
  .st-label { min-width: 150px; text-align: center; font-size: 12px; font-weight: 600; color: #3a3f55; }
  body.stage-dark .st-label { color: #c6cbe0; }
  .st-single { min-width: 0; opacity: 0.6; font-weight: 600; }
  .pair { display: flex; gap: 24px; align-items: flex-start; }
  .frame-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .theme-label { display: inline-flex; align-items: center; gap: 7px; font-size: 10px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: #7a7f92; }
  body.stage-dark .theme-label { color: #8b91a8; }
  .theme-dot { width: 8px; height: 8px; border-radius: 999px; }
  .row-placeholder { height: 822px; }

  /* ── A11y layer (added in audit pass) ───────────────────────────────
     Applies uniformly to every screen via shared primitives.
     Flutter mapping: focus ring → Material focus highlight;
     44px hit floor → IconButton's default 48dp tap target. */
  /* Visible keyboard focus on every interactive control */
  .app button:focus-visible,
  .icon-btn:focus-visible,
  .pill-btn:focus-visible,
  .bn-item:focus-visible,
  [role="switch"]:focus-visible {
    outline: 2px solid var(--memox-primary);
    outline-offset: 2px;
  }
  /* Expand icon-button tap target to >=44px without changing visual size.
     Covers buttons that inline-shrink the visual circle (e.g. 24px dismiss). */
  .icon-btn { position: relative; }
  .icon-btn::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    width: 44px; height: 44px; transform: translate(-50%, -50%);
  }
  /* Bottom-nav items are real <button>s now — reset native chrome + give a tall tap area */
  .bn-item { background: none; border: none; width: 100%; padding: 8px 0; font-family: inherit; }
  /* Hidden-scrollbar utility for in-screen scrollers (matches .scroll behavior).
     overflow-x pinned to hidden: setting only overflow-y:auto makes overflow-x
     compute to auto too, which produced a stray horizontal scrollbar. */
  .hide-scroll { overflow-x: hidden; scrollbar-width: none; -ms-overflow-style: none; }
  .hide-scroll::-webkit-scrollbar { display: none; }
  /* Respect reduced-motion: quiet the infinite skeleton/pulse loops */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
  }

  /* ── Design-token reference panel (Foundations) ───────────────────────
     A full-width, Flutter-handoff documentation surface. Independent of the
     phone-frame width: always shows the LIGHT (Tokyo Pure) + DARK (Tokyo
     Nebula) value of every token side by side, plus its Dart token reference. */
  :root { --tok-mono: ui-monospace, "SF Mono", "JetBrains Mono", "Roboto Mono", Menlo, Consolas, monospace; }
  .tokens-doc { color: #1b1f3a; }
  body.stage-dark .tokens-doc { color: #E4E8FA; }
  .tok-intro {
    background: #fff; border: 1px solid rgba(20,24,48,0.10); border-radius: 18px;
    padding: 22px 24px; margin-bottom: 8px;
    box-shadow: 0 1px 2px rgba(25,28,30,0.04);
  }
  body.stage-dark .tok-intro { background: #131A3A; border-color: rgba(139,154,255,0.16); box-shadow: none; }
  .tok-intro h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.4px; margin: 0 0 6px; }
  .tok-intro p { font-size: 13.5px; line-height: 1.55; color: #5a5f72; margin: 0; max-width: 760px; }
  body.stage-dark .tok-intro p { color: #9aa0b8; }
  .tok-intro code { font-family: var(--tok-mono); font-size: 12px; background: rgba(82,101,245,0.10); color: #3346d6; padding: 1px 6px; border-radius: 5px; }
  body.stage-dark .tok-intro code { background: rgba(139,154,255,0.16); color: #B5C0FF; }
  .tok-legend { display: flex; flex-wrap: wrap; gap: 8px 18px; margin-top: 14px; font-size: 11.5px; color: #6a6f82; }
  body.stage-dark .tok-legend { color: #8b91a8; }
  .tok-legend b { color: #1b1f3a; font-weight: 700; }
  body.stage-dark .tok-legend b { color: #E4E8FA; }

  .tok-block { margin-top: 30px; }
  .tok-block-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .tok-block-head .n { font-size: 11px; font-weight: 800; letter-spacing: 1px; color: #9499ab; font-family: var(--tok-mono); }
  .tok-block-head h3 { font-size: 16px; font-weight: 800; letter-spacing: -0.2px; margin: 0; }
  .tok-block-head .dart { font-size: 11.5px; font-weight: 600; font-family: var(--tok-mono); color: #3346d6; background: rgba(82,101,245,0.08); padding: 2px 8px; border-radius: 6px; }
  body.stage-dark .tok-block-head .dart { color: #B5C0FF; background: rgba(139,154,255,0.14); }
  .tok-block-head .note { font-size: 12px; color: #6a6f82; }
  body.stage-dark .tok-block-head .note { color: #8b91a8; }

  /* color swatch grid */
  .tok-cgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(244px, 1fr)); gap: 12px; }
  .tok-color {
    background: #fff; border: 1px solid rgba(20,24,48,0.09); border-radius: 14px; overflow: hidden;
  }
  body.stage-dark .tok-color { background: #131A3A; border-color: rgba(139,154,255,0.14); }
  .tok-color .chips { display: flex; height: 64px; }
  .tok-color .chip { flex: 1; position: relative; }
  .tok-color .chip span { position: absolute; left: 8px; bottom: 6px; font-family: var(--tok-mono); font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 4px; background: rgba(255,255,255,0.82); color: #1b1f3a; }
  .tok-color .chip.is-dark span { background: rgba(10,14,39,0.7); color: #E4E8FA; }
  .tok-color .meta { padding: 9px 11px 11px; }
  .tok-color .meta .role { font-size: 12.5px; font-weight: 700; }
  .tok-color .meta .dart { font-family: var(--tok-mono); font-size: 10.5px; color: #6a6f82; margin-top: 2px; word-break: break-all; }
  body.stage-dark .tok-color .meta .dart { color: #8b91a8; }
  .tok-corner-tags { display: flex; gap: 6px; padding: 0 11px 11px; }
  .tok-corner-tags em { font-style: normal; font-size: 9.5px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; color: #7a7f92; background: rgba(20,24,48,0.05); padding: 2px 6px; border-radius: 5px; }
  body.stage-dark .tok-corner-tags em { color: #9aa0b8; background: rgba(255,255,255,0.06); }

  /* spec table (type, spacing, radius, sizes, opacity, motion) */
  .tok-table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; border: 1px solid rgba(20,24,48,0.09); border-radius: 14px; overflow: hidden; }
  body.stage-dark .tok-table { background: #131A3A; border-color: rgba(139,154,255,0.14); }
  .tok-table th { text-align: left; font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: #9499ab; padding: 11px 14px; border-bottom: 1px solid rgba(20,24,48,0.08); }
  body.stage-dark .tok-table th { color: #8b91a8; border-bottom-color: rgba(139,154,255,0.14); }
  .tok-table td { padding: 10px 14px; border-bottom: 1px solid rgba(20,24,48,0.05); vertical-align: middle; }
  body.stage-dark .tok-table td { border-bottom-color: rgba(139,154,255,0.08); }
  .tok-table tr:last-child td { border-bottom: none; }
  .tok-table .mono { font-family: var(--tok-mono); font-size: 12px; color: #3346d6; }
  body.stage-dark .tok-table .mono { color: #B5C0FF; }
  .tok-table .val { font-family: var(--tok-mono); font-size: 12.5px; font-weight: 600; }
  .tok-table .muted { color: #6a6f82; }
  body.stage-dark .tok-table .muted { color: #8b91a8; }
  .tok-swrap { background: rgba(20,24,48,0.03); border-radius: 4px; display: inline-block; }
  body.stage-dark .tok-swrap { background: rgba(255,255,255,0.04); }
  .tok-bar { background: var(--memox-primary); border-radius: 3px; height: 12px; display: inline-block; vertical-align: middle; }
  .tok-radius-demo { border: 2px solid var(--memox-primary); background: rgba(82,101,245,0.08); }
  body.stage-dark .tok-radius-demo { background: rgba(139,154,255,0.12); }

  /* ── Shared-widget library (Components) ──────────────────────────────────
     Every reusable widget the screens compose from, each shown as a LIGHT and
     a DARK specimen (real MemoX tokens, .memox-dark scope) plus its Flutter
     widget mapping + variant list. Handoff doc for the Flutter component layer. */
  .wid-doc { color: #1b1f3a; }
  body.stage-dark .wid-doc { color: #E4E8FA; }
  .wid-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; align-items: start; }
  .wid-card { background: #fff; border: 1px solid rgba(20,24,48,0.09); border-radius: 16px; overflow: hidden; }
  body.stage-dark .wid-card { background: #131A3A; border-color: rgba(139,154,255,0.14); }
  .wid-card.span2 { grid-column: span 2; }
  .wid-head { padding: 13px 15px 11px; border-bottom: 1px solid rgba(20,24,48,0.07); }
  body.stage-dark .wid-head { border-bottom-color: rgba(139,154,255,0.12); }
  .wid-head .nm { font-size: 13.5px; font-weight: 800; letter-spacing: -0.2px; display: flex; align-items: center; gap: 8px; }
  .wid-head .fl { font-family: var(--tok-mono); font-size: 11px; font-weight: 600; color: #3346d6; margin-top: 3px; display: inline-block; }
  body.stage-dark .wid-head .fl { color: #B5C0FF; }
  .wid-head .ds { font-size: 11.5px; color: #6a6f82; margin-top: 4px; line-height: 1.45; }
  body.stage-dark .wid-head .ds { color: #8b91a8; }
  /* dual-theme specimen stage — panes STACK vertically so each specimen gets
     the card's full width (side-by-side halved the width and broke the fonts) */
  .wid-stage { display: flex; flex-direction: column; }
  .wid-pane { padding: 18px 16px; min-height: 76px; display: flex; flex-direction: column; align-items: stretch; justify-content: center; gap: 10px; position: relative; }
  .wid-pane.l { background: #F7F9FE; color: var(--memox-on-surface); }
  .wid-pane.d { background: #0A0E27; color: var(--memox-on-surface); }
  .wid-pane.l + .wid-pane.d { border-top: 1px solid rgba(139,154,255,0.16); }
  .wid-pane > .lab { position: absolute; top: 7px; right: 9px; font-family: var(--tok-mono); font-size: 8.5px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: rgba(20,24,48,0.30); }
  .wid-pane.d > .lab { color: rgba(228,232,250,0.34); }

  body.stage-dark .wid-foot { border-top-color: rgba(139,154,255,0.10); }
  .wid-foot .vt { font-size: 10.5px; font-weight: 600; font-family: var(--tok-mono); color: #4a5278; background: rgba(20,24,48,0.05); padding: 2px 7px; border-radius: 5px; }
  body.stage-dark .wid-foot .vt { color: #A4ACD0; background: rgba(255,255,255,0.06); }
  .wid-foot .vt b { color: #3346d6; font-weight: 700; }
  body.stage-dark .wid-foot .vt b { color: #B5C0FF; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">


const { useState, useEffect } = React;

function StatusBar() {
  return (
    <div className="statusbar">
      <span>9:41</span>
      <span style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><path d="M1 11h2V7H1v4zm4 0h2V4H5v7zm4 0h2V1H9v10zm4 0h2V8h-2v3z" /></svg>
        <svg width="14" height="12" viewBox="0 0 14 12" fill="currentColor"><path d="M7 10.3a1.2 1.2 0 1 0 0 2.4 1.2 1.2 0 0 0 0-2.4zm0-3a3 3 0 0 1 2.12.88l1.06-1.06a4.5 4.5 0 0 0-6.36 0l1.06 1.06A3 3 0 0 1 7 7.3zm0-3a6 6 0 0 1 4.24 1.76l1.07-1.07a7.5 7.5 0 0 0-10.62 0l1.07 1.07A6 6 0 0 1 7 4.3z" /></svg>
        <svg width="22" height="12" viewBox="0 0 22 12" fill="none"><rect x="1" y="1" width="18" height="10" rx="2" stroke="currentColor" strokeOpacity=".4" /><rect x="2.5" y="2.5" width="13" height="7" rx="1" fill="currentColor" /><rect x="20" y="4" width="1.5" height="4" rx=".5" fill="currentColor" /></svg>
      </span>
    </div>);

}

// Single-color mastery fill — replaces tri-stop gradient.
// Returns the appropriate status color token based on percentage thresholds.
function masteryColor(pct) {
  if (pct < 0.34) return 'var(--memox-status-learning)'; // amber — early
  if (pct < 0.67) return 'var(--memox-status-reviewing)'; // primary — mid
  return 'var(--memox-status-mastered)'; // green — high
}

function Ic({ name, size = 22, color, label }) {
  const ref = React.useRef();
  React.useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const i = document.createElement('i');
      i.setAttribute('data-lucide', name);
      ref.current.appendChild(i);
      window.lucide.createIcons({ icons: window.lucide.icons });
      const svg = ref.current.querySelector('svg');
      if (svg) {
        svg.setAttribute('width', size);
        svg.setAttribute('height', size);
        if (color) svg.style.stroke = color;
      }
    }
  }, [name, size, color]);
  // Icons are decorative by default (the surrounding button/text carries meaning).
  // Pass `label` only when the icon is the sole carrier of meaning.
  const a11y = label ? { role: 'img', 'aria-label': label } : { 'aria-hidden': 'true' };
  return <span ref={ref} {...a11y} style={{ display: 'inline-flex', lineHeight: 0 }} />;
}

/* Breadcrumb — folder/deck/card hierarchy path. Last segment is the current location. */
function Breadcrumb({ segments }) {
  return (
    <div className="scroll-x" style={{
      display: 'flex', alignItems: 'center', gap: 4,
      padding: '2px 14px 8px',
      fontSize: 11
    }}>
      {segments.map((s, i) => {
        const last = i === segments.length - 1;
        return (
          <React.Fragment key={i}>
            <span style={{
              color: last ? 'var(--memox-on-surface)' : 'var(--memox-on-surface-variant)',
              fontWeight: last ? 700 : 500,
              whiteSpace: 'nowrap',
              cursor: last ? 'default' : 'pointer',
              letterSpacing: 0.1
            }}>{s.label}</span>
            {!last && <Ic name="chevron-right" size={12} color="var(--memox-outline)" />}
          </React.Fragment>);

      })}
    </div>);

}

function BottomNav({ active, onChange }) {
  const items = [
  { id: 'home', icon: 'home', label: 'Home' },
  { id: 'library', icon: 'layers', label: 'Library' },
  { id: 'stats', icon: 'bar-chart-3', label: 'Stats' },
  { id: 'settings', icon: 'settings', label: 'Settings' }];

  return (
    <div className="bottom-nav-wrap">
      <div className="bottom-nav" role="navigation" aria-label="Primary">
        {items.map((it) =>
        <button type="button" key={it.id}
          aria-current={active === it.id ? 'page' : undefined}
          aria-label={it.label}
          className={"bn-item " + (active === it.id ? 'active' : '')} onClick={() => onChange(it.id)}>
            <span className="bn-pill"><Ic name={it.icon} size={22} /></span>
            <span>{it.label}</span>
          </button>
        )}
      </div>
    </div>);

}

/* Offline banner — shared, reusable connectivity-lost notice.
   Local-first voice: reassure first, never alarm. role="status" so AT announces
   it politely. Reuse on any surface that attempts Drive sync (Dashboard, Library,
   Study result). Flutter mapping: a MaterialBanner / inline Container driven by a
   connectivity stream; copy via l10n keys. */
function OfflineBanner() {
  return (
    <div role="status" style={{
      display: 'flex', alignItems: 'flex-start', gap: 10,
      padding: '10px 14px', marginBottom: 14,
      background: 'var(--memox-surface-container)',
      border: 'var(--memox-border-ghost)', borderRadius: 12
    }}>
      <Ic name="cloud-off" size={16} color="var(--memox-on-surface-variant)" />
      <div style={{ flex: 1, fontSize: 12, lineHeight: 1.55 }}>
        <strong style={{ fontWeight: 700 }}>You’re offline.</strong>{' '}
        <span style={{ color: 'var(--memox-on-surface-variant)' }}>Your cards are saved on this device. Drive sync resumes when you reconnect.</span>
      </div>
    </div>);
}

/* ─────── Screen: Study (term + meaning visible together, swipe to next) ─────── */
function StudyScreen({ go }) {
  const cards = [
  { front: '공부하다', back: 'to study', example: '저는 매일 한국어를 공부해요.', lang: 'Korean' },
  { front: '먹다', back: 'to eat', example: '아침을 먹었어요.', lang: 'Korean' },
  { front: '도서관', back: 'library', example: '저는 도서관에서 책을 읽어요.', lang: 'Korean' }];

  const total = 23;
  const [idx, setIdx] = useState(7);
  const card = cards[idx % cards.length];
  const cardRef = React.useRef(null);
  const [dragX, setDragX] = useState(0);
  const dragRef = React.useRef({ startX: null, captured: false });

  const advance = (dir = 1) => {
    setIdx((prev) => Math.min(prev + dir, total - 1));
  };

  React.useEffect(() => {
    const el = cardRef.current;
    if (!el) return;
    const onDown = (e) => {
      dragRef.current.startX = e.touches ? e.touches[0].clientX : e.clientX;
      dragRef.current.captured = true;
    };
    const onMove = (e) => {
      if (!dragRef.current.captured) return;
      const x = e.touches ? e.touches[0].clientX : e.clientX;
      setDragX(x - dragRef.current.startX);
    };
    const onUp = () => {
      if (!dragRef.current.captured) return;
      const dx = dragX;
      dragRef.current.captured = false;
      dragRef.current.startX = null;
      if (Math.abs(dx) > 70) {
        // animate out then advance
        setDragX(dx > 0 ? 500 : -500);
        setTimeout(() => {advance(1);setDragX(0);}, 180);
      } else {
        setDragX(0);
      }
    };
    el.addEventListener('mousedown', onDown);
    el.addEventListener('touchstart', onDown, { passive: true });
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, { passive: true });
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchend', onUp);
    return () => {
      el.removeEventListener('mousedown', onDown);
      el.removeEventListener('touchstart', onDown);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchend', onUp);
    };
  }, [dragX]);

  const isSwiping = Math.abs(dragX) > 4;
  const transform = `translateX(${dragX}px) rotate(${dragX * 0.025}deg)`;
  const opacity = 1 - Math.min(Math.abs(dragX) / 400, 0.5);

  return (
    <div className="app">
      <StatusBar />
      <div className="appbar" style={{ justifyContent: 'space-between' }}>
        <button className="icon-btn" onClick={() => go('deck')}><Ic name="x" size={22} /></button>
        <div style={{ flex: 1, margin: '0 16px', height: 4, background: 'var(--memox-surface-container)', borderRadius: 999, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${(idx + 1) / total * 100}%`, background: 'var(--memox-primary)', transition: 'width 200ms cubic-bezier(0.2,0,0,1)' }} />
        </div>
        <div style={{ fontSize: 13, fontWeight: 600, fontVariantNumeric: 'tabular-nums', color: 'var(--memox-on-surface-variant)' }}>{idx + 1} / {total}</div>
      </div>

      <div style={{ flex: 1, padding: '6px 14px 12px', display: 'flex', flexDirection: 'column', gap: 14 }}>
        <div
          ref={cardRef}
          className="card"
          style={{
            flex: 1,
            padding: 0,
            display: 'flex', flexDirection: 'column',
            cursor: 'grab',
            userSelect: 'none',
            transform,
            opacity,
            transition: isSwiping ? 'none' : 'transform 220ms cubic-bezier(0.05,0.7,0.1,1), opacity 220ms cubic-bezier(0.2,0,0,1)',
            touchAction: 'pan-y'
          }}>
          
          {/* Top half — term */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '20px 16px 8px', position: 'relative' }}>
            <div className="ov" style={{ position: 'absolute', top: 16, left: 20 }}>{card.lang}</div>
            <div style={{ fontSize: 32, fontWeight: 700, letterSpacing: '-0.5px', textAlign: 'center', lineHeight: 1.15 }}>{card.front}</div>
          </div>

          {/* Divider */}
          <div style={{ height: 1, background: 'var(--memox-outline-variant)', opacity: 0.5, margin: '0 20px' }} />

          {/* Bottom half — meaning + example */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '8px 16px 20px', position: 'relative', gap: 14 }}>
            <div className="ov" style={{ position: 'absolute', top: 16, left: 20 }}>Meaning</div>
            <div style={{ fontSize: 24, fontWeight: 600, letterSpacing: '-0.3px', textAlign: 'center' }}>{card.back}</div>
            <div style={{
              padding: '10px 14px',
              background: 'var(--memox-surface-container-low)',
              borderRadius: 10,
              fontSize: 14,
              lineHeight: 1.5,
              color: 'var(--memox-on-surface-variant)',
              textAlign: 'center',
              maxWidth: 280
            }}>
              {card.example}
            </div>
          </div>
        </div>

        {/* Bottom hint — swipe-only, no button */}
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          padding: '10px 14px',
          fontSize: 12, color: 'var(--memox-on-surface-variant)',
          letterSpacing: 0.3
        }}>
          <Ic name="chevrons-right" size={16} color="var(--memox-on-surface-variant)" />
          <span>Swipe left for the next card</span>
        </div>
      </div>
    </div>);

}

/* ─────── Shared: Study top bar (close + mode badge + progress + counter) ─────── */
function StudyTopBar({ mode, accent = 'var(--memox-primary)', accentBg = 'rgba(82,101,245,0.10)', current, total, onClose }) {
  return (
    <div className="appbar" style={{ justifyContent: 'space-between' }}>
      <button className="icon-btn" onClick={onClose}><Ic name="x" size={20} /></button>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, flex: 1, margin: '0 6px' }}>
        <span style={{
          fontSize: 10, fontWeight: 700, letterSpacing: 1.2, textTransform: 'uppercase',
          color: accent, padding: '3px 8px', background: accentBg, borderRadius: 999
        }}>{mode}</span>
        <div style={{ flex: 1, height: 4, background: 'var(--memox-surface-container)', borderRadius: 999, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${current / total * 100}%`, background: accent, transition: 'width 200ms cubic-bezier(0.2,0,0,1)' }} />
        </div>
      </div>
      <div style={{ fontSize: 12, fontWeight: 600, fontVariantNumeric: 'tabular-nums', color: 'var(--memox-on-surface-variant)' }}>{current} / {total}</div>
    </div>);

}

/* ─────── Screen: Match (pair fronts & backs) ─────── */
function MatchScreen({ go }) {
  // 8 tiles → 4 pairs. State per tile: 'idle' | 'selected' | 'matched'
  const initial = [
  { id: 1, text: '공부하다', kind: 'front', pair: 1, state: 'matched' },
  { id: 2, text: 'to study', kind: 'back', pair: 1, state: 'matched' },
  { id: 3, text: '먹다', kind: 'front', pair: 2, state: 'idle' },
  { id: 4, text: 'to eat', kind: 'back', pair: 2, state: 'selected' },
  { id: 5, text: '하늘', kind: 'front', pair: 3, state: 'idle' },
  { id: 6, text: 'sky', kind: 'back', pair: 3, state: 'idle' },
  { id: 7, text: '도서관', kind: 'front', pair: 4, state: 'idle' },
  { id: 8, text: 'library', kind: 'back', pair: 4, state: 'idle' }];

  const [tiles, setTiles] = useState(initial);
  const pairsLeft = 4 - tiles.filter((t) => t.state === 'matched').length / 2;

  return (
    <div className="app">
      <StatusBar />
      <StudyTopBar mode="Match" current={2} total={4} onClose={() => go('deck')} />

      <div style={{ padding: '4px 14px 0' }}>
        <div className="ov" style={{ textAlign: 'center', padding: '4px 0 10px' }}>Board 1 of 3 · {pairsLeft} pairs left</div>
      </div>

      <div className="scroll" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, alignContent: 'start', padding: '0 14px 14px' }}>
        {tiles.map((t) => {
          const matched = t.state === 'matched';
          const selected = t.state === 'selected';
          return (
            <div key={t.id} style={{
              minHeight: 78,
              borderRadius: 12,
              padding: '14px 12px',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              textAlign: 'center',
              background: matched ?
              'rgba(31,138,91,0.12)' :
              selected ?
              'var(--memox-primary)' :
              'var(--memox-surface-container-lowest)',
              color: matched ?
              'var(--memox-mastery)' :
              selected ?
              'var(--memox-on-primary)' :
              'var(--memox-on-surface)',
              border: matched ?
              '1px solid rgba(31,138,91,0.30)' :
              selected ?
              '1px solid var(--memox-primary)' :
              'var(--memox-border-ghost)',
              fontSize: t.kind === 'front' ? 18 : 14,
              fontWeight: t.kind === 'front' ? 700 : 600,
              letterSpacing: t.kind === 'front' ? '-0.4px' : 0,
              opacity: matched ? 0.7 : 1,
              transition: 'all 200ms cubic-bezier(0.2,0,0,1)'
            }}>
              {matched && <Ic name="check" size={14} color="var(--memox-mastery)" />}
              <span style={{ marginLeft: matched ? 6 : 0 }}>{t.text}</span>
            </div>);

        })}
      </div>

      <div style={{ padding: '0 14px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 11, color: 'var(--memox-on-surface-variant)' }}>
        <span style={{ display: 'flex', gap: 6, alignItems: 'center' }}><Ic name="timer" size={14} color="var(--memox-on-surface-variant)" /> 0:42</span>
        <span>1 mistake</span>
      </div>
    </div>);

}

/* ─────── Screen: Guess (multiple choice A/B/C/D/E, auto-advance) ─────── */
function GuessScreen({ go }) {
  const prompt = '도서관';
  const options = [
  { l: 'A', text: 'kitchen', state: 'fade' },
  { l: 'B', text: 'library — public building or room with a collection of books for reading or borrowing', state: 'correct' },
  { l: 'C', text: 'school — institution for educating children', state: 'wrong' },
  { l: 'D', text: 'office', state: 'fade' },
  { l: 'E', text: 'classroom', state: 'fade' }];

  return (
    <div className="app">
      <StatusBar />
      <StudyTopBar mode="Guess" current={5} total={20} onClose={() => go('deck')} />

      {/* Outer scroller — content centers when it fits, scrolls when long answers push past. */}
      <div className="hide-scroll" style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', display: 'flex', flexDirection: 'column', minHeight: 0 }}>
        <div style={{ margin: 'auto 0', padding: '8px 14px 0', display: 'flex', flexDirection: 'column', gap: 14 }}>
          {/* Prompt */}
          <div className="card" style={{ padding: '34px 14px 32px', textAlign: 'center', flexShrink: 0, minHeight: 180, display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: 10 }}>
            <div className="ov">What is this?</div>
            <div style={{ fontSize: 32, fontWeight: 700, letterSpacing: '-0.5px', lineHeight: 1.15 }}>{prompt}</div>
          </div>

          {/* Options — split term + explanation, vertical-centered prefix */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8, flexShrink: 0 }}>
            {options.map((o, i) => {
              const styles = {
                idle: {
                  bg: 'var(--memox-surface-container-lowest)',
                  fg: 'var(--memox-on-surface)',
                  border: 'var(--memox-border-ghost)'
                },
                correct: {
                  bg: 'rgba(31,138,91,0.14)',
                  fg: 'var(--memox-mastery)',
                  border: '1px solid rgba(31,138,91,0.40)'
                },
                wrong: {
                  bg: 'rgba(220,45,78,0.10)',
                  fg: 'var(--memox-error)',
                  border: '1px solid rgba(220,45,78,0.35)'
                },
                fade: {
                  bg: 'var(--memox-surface-container-lowest)',
                  fg: 'var(--memox-on-surface-variant)',
                  border: 'var(--memox-border-ghost)',
                  opacity: 0.36
                }
              }[o.state];
              // Split "term — explanation" into separate parts
              const split = o.text.split(' — ');
              const term = split[0];
              const def = split.length > 1 ? split.slice(1).join(' — ') : null;
              return (
                <div key={i} style={{
                  minHeight: 60,
                  background: styles.bg,
                  color: styles.fg,
                  border: styles.border,
                  borderRadius: 12,
                  padding: '12px 14px',
                  display: 'flex', alignItems: 'center', gap: 12,
                  opacity: styles.opacity ?? 1,
                  transition: 'all 200ms cubic-bezier(0.2,0,0,1)'
                }}>
                  <span style={{
                    width: 28, height: 28, borderRadius: 999,
                    border: '1.5px solid currentColor',
                    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: 11, fontWeight: 700,
                    opacity: 0.85, flexShrink: 0
                  }}>{o.l}</span>
                  <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 2, minWidth: 0 }}>
                    <div style={{ fontSize: 15, fontWeight: 700, letterSpacing: '-0.1px', lineHeight: 1.25 }}>{term}</div>
                    {def &&
                    <div style={{
                      fontSize: 12, fontWeight: 400, lineHeight: 1.4,
                      opacity: 0.72,
                      textWrap: 'pretty'
                    }}>{def}</div>
                    }
                  </div>
                  {o.state === 'correct' && <Ic name="check" size={18} color="var(--memox-mastery)" />}
                  {o.state === 'wrong' && <Ic name="x" size={18} color="var(--memox-error)" />}
                </div>);

            })}
          </div>
        </div>
      </div>

      {/* Auto-advance footer — static snapshot of the countdown (not looping) */}
      <div style={{ padding: '10px 14px 14px', display: 'flex', flexDirection: 'column', gap: 6, flexShrink: 0 }}>
        <div style={{
          fontSize: 10, fontWeight: 600, letterSpacing: 1.2, textTransform: 'uppercase',
          color: 'var(--memox-on-surface-variant)',
          textAlign: 'center'
        }}>
          Next card in 0.8s
        </div>
        <div style={{ height: 3, background: 'var(--memox-surface-container)', borderRadius: 999, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: '46%', background: 'var(--memox-mastery)' }} />
        </div>
      </div>
    </div>);

}

/* ─────── Screen: Recall (term card + hidden meaning card, reveal CTA) ─────── */
function RecallScreen({ go, initialRevealed = false }) {
  const accent = 'var(--memox-mastery)';
  const accentBg = 'rgba(31,138,91,0.12)';
  const [revealed, setRevealed] = useState(initialRevealed);
  const meaning = 'Researcher / Nhà nghiên cứu — person who conducts research. Hán-Việt: Nghiên cứu giả (硏究者). 연구 = research, 자 = person.';
  return (
    <div className="app">
      <StatusBar />
      <StudyTopBar mode="Recall" accent={accent} accentBg={accentBg} current={8} total={12} onClose={() => go('deck')} />

      <div style={{ flex: 1, padding: '8px 14px 0', display: 'flex', flexDirection: 'column', gap: 10, minHeight: 0 }}>
        {/* Term card — always visible; this is the prompt */}
        <div className="card" style={{
          flex: 1, padding: '14px',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          position: 'relative', minHeight: 160
        }}>
          <button className="icon-btn" style={{ position: 'absolute', top: 8, right: 8, width: 32, height: 32 }}>
            <Ic name="pencil" size={16} color="var(--memox-on-surface-variant)" />
          </button>
          <div style={{ fontSize: 32, fontWeight: 700, letterSpacing: '-0.5px', lineHeight: 1.15, textAlign: 'center' }}>
            연구자
          </div>
          <button className="icon-btn" style={{ position: 'absolute', bottom: 8, right: 8, width: 32, height: 32 }}>
            <Ic name="volume-2" size={16} color="var(--memox-on-surface-variant)" />
          </button>
        </div>

        {/* Meaning card — hidden (blurred) before reveal; user recalls the meaning */}
        <div className="card" style={{
          flex: 1, padding: '16px',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          minHeight: 160,
          background: 'var(--memox-surface-container-low)'
        }}>
          {revealed ?
          <div style={{ fontSize: 14, lineHeight: 1.55, textAlign: 'center', color: 'var(--memox-on-surface)', textWrap: 'pretty' }}>
              {meaning}
            </div> :

          <div style={{
            width: 140, height: 14, borderRadius: 999,
            background: 'var(--memox-surface-container-high)',
            opacity: 0.7, filter: 'blur(2px)'
          }} />

        </div>
      </div>

      <div style={{ padding: '14px 14px 16px', display: 'flex', justifyContent: 'center', gap: 10, flexShrink: 0 }}>
        {!revealed &&
        <button onClick={() => setRevealed(true)} className="pill-btn primary" style={{
          height: 40, padding: '0 36px', borderRadius: 999
        }}>
            Show answer
          </button>
        }
        {revealed &&
        <>
            <button onClick={() => setRevealed(false)} className="pill-btn primary" style={{
            flex: 1, maxWidth: 160, height: 40, borderRadius: 999
          }}>
              Forgot

            <button onClick={() => setRevealed(false)} className="pill-btn primary" style={{
            flex: 1, maxWidth: 160, height: 40, borderRadius: 999
          }}>
              Got it
            </button>
          </>
        }
      </div>
    </div>);

}

/* ─────── Screen: Settings hub ───────

  // ── reusable bits ────────────────────────────────────────────────

  <span style={{
    display: 'inline-block', height: 10, width: w, borderRadius: 6,

  const Spinner = ({ color = 'var(--memox-primary)', size = 12 }) =>

    display: 'inline-block', width: size, height: size, borderRadius: 999,

    borderTopColor: 'transparent',
    animation: 'memoxSpin 0.8s linear infinite',
    verticalAlign: 'middle'
  }} />;


  // Section overline + card wrapper
  const Section = ({ title, children }) =>
  <div style={{ marginBottom: 18 }}>
      <div className="ov" style={{ padding: '0 4px 8px' }}>{title}</div>

        {children}

  // Single navigation row. `disabled` greys it and replaces chevron with a

      <div style={{

      color: iconColor || 'var(--memox-primary)',
      display: 'flex', alignItems: 'center', justifyContent: 'center'

        <Ic name={icon} size={18} color={iconColor || 'var(--memox-primary)'} />

      <div style={{ minWidth: 0 }}>
        <div style={{ fontSize: 15, fontWeight: 600, letterSpacing: '-0.1px' }}>{label}</div>
        <div style={{
        fontSize: 12, color: 'var(--memox-on-surface-variant)',

        display: 'flex', alignItems: 'center', gap: 6
      }}>
          {subtitle}
        </div>
      </div>
      {chip ? chip :
    <Ic name="chevron-right" size={18} color="var(--memox-on-surface-variant)" />

    </div>;


  // ── per-state copy for the Account & Sync row ────────────────────
  let accountSubtitle,accountChip = null;

    case 'signedOut':
      accountSubtitle = 'Save your progress across devices';

    case 'signingIn':
      accountSubtitle = <><Spinner size={10} /> Signing in…</>;
      break;
    case 'syncError':
      accountSubtitle = 'alex@memox.app · last synced 2 days ago';
      accountChip =
      <span style={{
        display: 'inline-flex', alignItems: 'center', gap: 4,
        height: 24, padding: '0 8px', borderRadius: 999,
        background: 'rgba(217,137,30,0.12)',
        color: 'var(--memox-streak)',
        fontSize: 11, fontWeight: 600
      }}>
          <Ic name="cloud-off" size={11} color="var(--memox-streak)" />
          Retry
        </span>;

      break;
    default: // populated
      accountSubtitle = 'alex@memox.app · synced 2 min ago';

  // Other rows — subtitle = loading skeleton when state==='loading'
  const sub = (text, w) => state === 'loading' ? <Skel w={w} /> : text;

  return (

      <div className="scroll">

        {/* ── 1. Account ── */}

          <Row

            state === 'syncError' ? 'rgba(217,137,30,0.10)' :
            state === 'signedOut' ? 'var(--memox-surface-container)' :
            'rgba(82,101,245,0.10)'
            }
            iconColor={
            state === 'syncError' ? 'var(--memox-streak)' :
            state === 'signedOut' ? 'var(--memox-on-surface-variant)' :
            'var(--memox-primary)'
            }
            label={state === 'signedOut' ? 'Sign in & sync' : 'Account & sync'}
            subtitle={accountSubtitle}
            chip={accountChip}
            last />
          
        </Section>

        {/* ── 2. Study ── */}
        <Section title="Study">
          <Row
            icon="target"
            label="Learning"
            subtitle={sub('20 cards / day · 5 study modes', 170)} />
          
          <Row
            icon="volume-2"
            label="Audio & speech"
            subtitle={sub('Korean voice · 0.9× speed', 140)} />
          
          <Row
            icon="tag"
            label="Manage tags"
            subtitle={sub('14 tags', 60)}
            last />
          
        </Section>

        {/* ── 3. App (future-flagged) ── */}
        <Section title="App">
          <Row
            icon="sun"
            label="Appearance"
            subtitle="Light, dark, system"
            disabled
            chip={
            <span style={{
              height: 22, padding: '0 8px', borderRadius: 999,
              background: 'var(--memox-surface-container)',
              color: 'var(--memox-on-surface-variant)',
              fontSize: 10, fontWeight: 700,
              letterSpacing: 0.4, textTransform: 'uppercase',
              display: 'inline-flex', alignItems: 'center'
            }}>Soon</span>
            } />
          
          <Row
            icon="globe"
            label="Language"
            subtitle="English"
            disabled
            chip={
            <span style={{
              height: 22, padding: '0 8px', borderRadius: 999,
              background: 'var(--memox-surface-container)',

        {/* ── 4. About ── */}

        </Section>

        <div style={{
          textAlign: 'center',

          padding: '4px 0 16px',
          letterSpacing: 0.2

          Made for calm learning · MemoX
        </div>
      </div>

      <BottomNav active="settings" onChange={go} />

      <style>{`
        @keyframes memoxSkelPulse { 0%,100% { opacity: 0.45; } 50% { opacity: 0.75; } }
        @keyframes memoxSpin { to { transform: rotate(360deg); } }
      `}</style>
    </div>);

}

/* ─────── Screen: Account & Drive sync ───────
   Sub-page of Settings. Local-first messaging is non-negotiable:
   MemoX works fully offline; Drive is OPT-IN manual backup/restore.

   Variants ('state' prop):
     signedOut | signingIn | signInFailed
     noBackup | ready | uploading
     restoreWarn | restoring | tokenExpired
*/
function AccountSyncScreen({ go, state = 'ready' }) {

  const signedOut = ['signedOut', 'signingIn', 'signInFailed'].includes(state);

  // ── shared widgets ───────────────────────────────────────────────
  const Spinner = ({ color = '#fff', size = 14 }) =>
  <span style={{
    display: 'inline-block', width: size, height: size, borderRadius: 999,
    border: `2px solid ${color}`,
    borderTopColor: 'transparent',
    animation: 'memoxSpin 0.8s linear infinite',
    verticalAlign: 'middle'
  }} />;


  // Section overline + card wrapper, identical to the Settings hub pattern
  const Section = ({ title, children, gap = 10 }) =>
  <div style={{ marginBottom: 16 }}>
      <div className="ov" style={{ padding: '0 4px 8px' }}>{title}</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap }}>{children}</div>
    </div>;


  // Banner: soft (amber) for warnings, danger (red) for hard warnings,
  // info (indigo tint) for restore conflict, neutral for offline notes.
  const Banner = ({ tone = 'info', icon, title, body, action }) => {
    const tones = {
      info: { bg: 'rgba(82,101,245,0.08)', border: 'rgba(82,101,245,0.20)', col: 'var(--memox-primary)' },
      warn: { bg: 'rgba(217,137,30,0.10)', border: 'rgba(217,137,30,0.24)', col: 'var(--memox-streak)' },
      danger: { bg: 'rgba(220,72,72,0.08)', border: 'rgba(220,72,72,0.22)', col: 'var(--memox-error)' },
      ok: { bg: 'rgba(31,138,91,0.08)', border: 'rgba(31,138,91,0.20)', col: 'var(--memox-mastery)' }
    }[tone];
    return (
      <div style={{
        background: tones.bg,
        border: `1px solid ${tones.border}`,
        borderRadius: 12,
        padding: '12px 14px',
        display: 'flex', gap: 10, alignItems: 'flex-start'
      }}>
        <div style={{ paddingTop: 1 }}><Ic name={icon} size={16} color={tones.col} /></div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--memox-on-surface)', letterSpacing: '-0.1px' }}>{title}</div>
          {body && <div style={{ fontSize: 12, lineHeight: 1.5, color: 'var(--memox-on-surface-variant)', marginTop: 2 }}>{body}</div>}
          {action && <div style={{ marginTop: 8 }}>{action}</div>}
        </div>
      </div>);

  };

  // The Google G mark — recognizable inline, 4-color version
  const GoogleG = ({ size = 18 }) =>
  <svg width={size} height={size} viewBox="0 0 18 18" aria-hidden="true">
      <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.12-.84 2.07-1.78 2.71v2.26h2.88c1.68-1.55 2.66-3.83 2.66-6.61z" />
      <path fill="#34A853" d="M9 18c2.43 0 4.46-.8 5.95-2.18l-2.88-2.26c-.8.54-1.83.86-3.07.86-2.36 0-4.36-1.59-5.07-3.74H.9v2.33A8.99 8.99 0 0 0 9 18z" />
      <path fill="#FBBC05" d="M3.93 10.68A5.41 5.41 0 0 1 3.64 9c0-.58.1-1.15.29-1.68V4.99H.9A8.99 8.99 0 0 0 0 9c0 1.45.35 2.83.9 4.01l3.03-2.33z" />
      <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A8.99 8.99 0 0 0 .9 4.99l3.03 2.33C4.64 5.17 6.64 3.58 9 3.58z" />
    </svg>;


  // ── SIGNED-OUT BODY ─────────────────────────────────────────────
  if (signedOut) {
    const isFailed = state === 'signInFailed';
    const isLoading = state === 'signingIn';
    return (
      <div className="app">
        <StatusBar />
        <div className="appbar">
          <button className="icon-btn" onClick={() => go('settings')}><Ic name="arrow-left" size={20} /></button>
          <div className="title" style={{ fontSize: 16, fontWeight: 700 }}>Account & Drive sync</div>
        </div>

        <div className="scroll">

          {/* Hero — calm, explains the trade-off */}
          <div className="card" style={{ padding: '24px 18px 20px', textAlign: 'center', marginBottom: 14 }}>
            <div style={{
              width: 56, height: 56, borderRadius: 16,
              background: 'rgba(82,101,245,0.10)',
              color: 'var(--memox-primary)',
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              marginBottom: 14
            }}>
              <Ic name="cloud" size={28} color="var(--memox-primary)" />
            </div>
            <div style={{ fontSize: 18, fontWeight: 700, letterSpacing: '-0.3px', marginBottom: 8 }}>
              Back up to your Google Drive
            </div>
            <div style={{ fontSize: 13, color: 'var(--memox-on-surface-variant)', lineHeight: 1.55, marginBottom: 16, padding: '0 4px' }}>
              MemoX works fully offline. Linking Drive lets you upload and restore your decks <em style={{ fontStyle: 'normal', color: 'var(--memox-on-surface)', fontWeight: 600 }}>when you choose</em> — never automatically.
            </div>

            {isFailed &&
            <div style={{ marginBottom: 12, textAlign: 'left' }}>
                <Banner
                tone="danger"
                icon="alert-circle"
                title="Couldn't sign in"
                body="Check your connection and try again. No data left your device." />
              
              </div>
            }

            <button
              className="pill-btn"
              disabled={isLoading}
              style={{
                width: '100%', height: 44, borderRadius: 12,
                background: '#fff',
                color: '#191C1E',
                border: '1px solid rgba(0,0,0,0.12)',
                fontWeight: 600, fontSize: 14,
                gap: 10,
                boxShadow: '0 1px 2px rgba(25,28,30,0.04)',
                opacity: isLoading ? 0.85 : 1
              }}>
              
              {isLoading ?
              <><Spinner color="var(--memox-primary)" size={14} /> Signing in…</> :

            <div key={i} style={{

            }}>
                <div style={{
                width: 30, height: 30, borderRadius: 9,
                background: 'rgba(82,101,245,0.08)',
                color: 'var(--memox-primary)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                flexShrink: 0
              }}>
                  <Ic name={r.ic} size={15} color="var(--memox-primary)" />
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: '-0.1px' }}>{r.t}</div>
                  <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)', marginTop: 2, lineHeight: 1.45 }}>{r.s}</div>
                </div>
              </div>
            )}
          </div>
        </div>

        <style>{`@keyframes memoxSpin { to { transform: rotate(360deg); } }`}</style>
      </div>);

  }

  // ── SIGNED-IN BODY ──────────────────────────────────────────────
  const uploading = state === 'uploading';
  const restoring = state === 'restoring';
  const restoreWarn = state === 'restoreWarn';
  const noBackup = state === 'noBackup';
  const tokenExpired = state === 'tokenExpired';
  const busy = uploading || restoring;

  const uploadPct = 64;
  const restorePct = 38;

  return (
    <div className="app">
      <StatusBar />
      <div className="appbar">
        <button className="icon-btn" onClick={() => go('settings')}><Ic name="arrow-left" size={20} /></button>
        <div className="title" style={{ fontSize: 16, fontWeight: 700 }}>Account & Drive sync</div>
      </div>

      <div className="scroll">

        {/* ── 1. Account card ───────────────────────────────────── */}
        <Section title="Account">
          <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
            <div style={{ padding: '14px 14px', display: 'flex', gap: 12, alignItems: 'center' }}>
              <div style={{

                background: 'linear-gradient(135deg, #5265F5 0%, #8B9AFF 100%)',
                color: '#fff',

              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 600, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                  alex.minh@gmail.com

                <div style={{
                  fontSize: 11, color: 'var(--memox-on-surface-variant)',
                  marginTop: 2, display: 'inline-flex', alignItems: 'center', gap: 6

                  <span>Google · linked Apr 8</span>

                background: 'rgba(217,137,30,0.12)',

                fontSize: 11, fontWeight: 700,
                display: 'inline-flex', alignItems: 'center', gap: 4

                  <Ic name="alert-triangle" size={11} color="var(--memox-streak)" />

                  <Ic name="refresh-cw" size={16} color="var(--memox-on-surface-variant)" />
                </button>

            </div>
            {tokenExpired &&
            <div style={{ padding: '0 14px 14px' }}>

                tone="warn"
                icon="key-round"
                title="Drive access expired"
                body="Sign in again to upload or restore. Your local data is untouched."

                      Sign in again
                    </button>
