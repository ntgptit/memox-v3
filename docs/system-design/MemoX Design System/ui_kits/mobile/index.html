      {/* Delete confirmation dialog */}
      {state === 'delConfirm' &&
      <>
          <Scrim />
          <div style={{
          position: 'absolute', inset: 0,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          padding: '24px 18px', zIndex: 51,
          pointerEvents: 'none'
        }}>
            <div style={{
            width: '100%', maxWidth: 340,
            background: 'var(--memox-surface-container-high)',
            color: 'var(--memox-on-surface)',
            borderRadius: 18,
            boxShadow: '0 16px 40px rgba(0,0,0,0.32)',
            pointerEvents: 'auto',
            overflow: 'hidden',
            animation: 'memoxDialogIn 200ms cubic-bezier(0.2,0,0,1)'
          }}>
              <div style={{ padding: '18px 18px 4px', textAlign: 'center' }}>
                <div style={{
                width: 48, height: 48, borderRadius: 14,
                background: 'rgba(220,72,72,0.12)',
                color: 'var(--memox-error)',
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                marginBottom: 12
              }}>
                  <Ic name="folder-x" size={22} color="var(--memox-error)" />
                </div>
                <div style={{ fontSize: 17, fontWeight: 700, letterSpacing: '-0.2px', marginBottom: 6 }}>
                  Delete this folder?
                </div>
                <div style={{ fontSize: 13, color: 'var(--memox-on-surface-variant)', lineHeight: 1.55, padding: '0 6px' }}>
                  <strong style={{ color: 'var(--memox-on-surface)', fontWeight: 700 }}>TOPIK II</strong> and its 5 decks will be removed from your library.
                </div>
              </div>

              {/* Reassurance — cards survive */}
              <div style={{ padding: '14px 18px 4px' }}>
                <div style={{
                padding: '10px 12px',
                background: 'rgba(31,138,91,0.08)',
                border: '1px solid rgba(31,138,91,0.20)',
                borderRadius: 11,
                display: 'flex', gap: 8, alignItems: 'center'
              }}>
                  <Ic name="shield-check" size={15} color="var(--memox-mastery)" />
                  <div style={{ flex: 1, fontSize: 12, color: 'var(--memox-on-surface)', lineHeight: 1.5 }}>
                    Cards in those decks <strong style={{ fontWeight: 700 }}>move to "Unsorted"</strong> — nothing is permanently lost.
                  </div>
                </div>
              </div>

              {/* Type-to-confirm to avoid mistaps */}
              <div style={{ padding: '14px 18px 4px' }}>
                <div className="ov" style={{ marginBottom: 6 }}>Type to confirm</div>
                <div style={{
                height: 42, padding: '0 12px',
                background: 'var(--memox-surface-container-lowest)',
                border: '1px solid var(--memox-error)',
                borderRadius: 11,
                display: 'flex', alignItems: 'center', gap: 8,
                fontSize: 14, fontWeight: 600,
                color: 'var(--memox-on-surface)'
              }}>
                  <span>TOPIK II</span>
                  <span style={{
                  display: 'inline-block', width: 2, height: 18,
                  background: 'var(--memox-error)',
                  animation: 'memoxBlink 1s infinite'
                }} />
                </div>
              </div>

              <div style={{ padding: '14px 14px 14px', display: 'flex', gap: 8 }}>
                <button className="pill-btn outline" style={{ flex: 1, height: 40, borderRadius: 11, fontSize: 13 }}>
                  Cancel
                </button>
                <button className="pill-btn" style={{
                flex: 1.2, height: 40, borderRadius: 11, fontSize: 13,
                background: 'var(--memox-error-fill)', color: '#fff', border: 'none', fontWeight: 600,
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6
              }}>
                  <Ic name="trash-2" size={14} color="#fff" />
                  Delete folder
                </button>
              </div>
            </div>
          </div>
        </>
      }

      {/* Move sheet — destination picker */}
      {state === 'moveSheet' &&
      <>
          <Scrim />
          <div style={{
          position: 'absolute', left: 0, right: 0, bottom: 0,
          background: 'var(--memox-surface-container-high)',
          color: 'var(--memox-on-surface)',
          borderTopLeftRadius: 20, borderTopRightRadius: 20,
          zIndex: 51,
          animation: 'memoxSheetIn 260ms cubic-bezier(0.2,0,0,1)',
          boxShadow: '0 -10px 30px rgba(0,0,0,0.32)',
          maxHeight: '85%', overflow: 'hidden',
          display: 'flex', flexDirection: 'column'
        }}>
            <div style={{ display: 'flex', justifyContent: 'center', padding: '8px 0 4px' }}>
              <span style={{ width: 36, height: 4, borderRadius: 999, background: 'var(--memox-outline-variant)' }} />
            </div>
            <div style={{ padding: '4px 18px 12px' }}>
              <div style={{ fontSize: 16, fontWeight: 700, letterSpacing: '-0.2px', marginBottom: 4 }}>
                Move "TOPIK II" to…
              </div>
              <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)', lineHeight: 1.5 }}>
                Pick a parent folder. All decks and cards inside come along.
              </div>
            </div>

            {/* Breadcrumb path */}
            <div style={{
            margin: '0 18px 10px',
            padding: '10px 12px',
            borderRadius: 10,
            background: 'var(--memox-surface-container-lowest)',
            display: 'flex', alignItems: 'center', gap: 6,
            fontSize: 12, color: 'var(--memox-on-surface-variant)',
            flexWrap: 'wrap'
          }}>
              <Ic name="folder" size={12} color="var(--memox-on-surface-variant)" />
              <span>Library</span>
              <Ic name="chevron-right" size={11} color="var(--memox-on-surface-variant)" />
              <span style={{ color: 'var(--memox-on-surface)', fontWeight: 700 }}>Korean</span>
            </div>

            <div className="hide-scroll" style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', padding: '0 8px 10px' }}>
              {[
            { name: 'Library (root)', ic: 'home', count: '4 folders' },
            { name: 'Korean', ic: 'flag', count: '4 subfolders · 286 cards', current: true },
            { name: 'Japanese', ic: 'flag', count: '5 decks · 248 cards' },
            { name: 'Mandarin', ic: 'flag', count: '3 decks · 180 cards' },
            { name: 'Archive', ic: 'archive', count: '2 folders · hidden from Library' }].
            map((t) =>
            <button key={t.name} disabled={t.current} style={{
              width: '100%', display: 'grid',
              gridTemplateColumns: '30px 1fr auto', gap: 12,
              alignItems: 'center', padding: '12px 10px',
              background: 'transparent', border: 'none',
              color: 'var(--memox-on-surface)',
              borderRadius: 10, fontFamily: 'inherit', cursor: t.current ? 'default' : 'pointer',
              textAlign: 'left',
              opacity: t.current ? 0.45 : 1
            }}>
                  <div style={{
                width: 28, height: 28, borderRadius: 8,
                background: 'rgba(82,101,245,0.08)',
                display: 'flex', alignItems: 'center', justifyContent: 'center'
              }}>
                    <Ic name={t.ic} size={13} color="var(--memox-primary)" />
                  </div>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 600, letterSpacing: '-0.1px' }}>{t.name}</div>
                    <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 1 }}>{t.count}</div>
                  </div>
                  {t.current ?
              <span style={{
                fontSize: 10, fontWeight: 700, letterSpacing: 0.3, textTransform: 'uppercase',
                color: 'var(--memox-on-surface-variant)'
              }}>Current</span> :

              <Ic name="chevron-right" size={14} color="var(--memox-on-surface-variant)" />
              }
                </button>
            )}
            </div>

            <div style={{ padding: '10px 14px 16px', display: 'flex', gap: 8, borderTop: 'var(--memox-border-ghost)' }}>
              <button className="pill-btn outline" style={{ flex: 1, height: 40, borderRadius: 11, fontSize: 13 }}>
                Cancel
              </button>
              <button className="pill-btn primary" style={{ flex: 1.3, height: 40, borderRadius: 11, fontSize: 13 }}>
                <Ic name="folder-tree" size={14} color="#fff" />
                Move here
              </button>
            </div>
          </div>
        </>
      }

      <style>{`
        @keyframes memoxScrimIn  { from { opacity: 0; } to { opacity: 1; } }
        @keyframes memoxSheetIn  { from { transform: translateY(20%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes memoxDialogIn { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes memoxBlink    { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }
      `}</style>
    </div>);

}

/* ─────── Screen: Flashcard list ───────
   Bottom-of-tree view inside one deck. Shows the cards, summarises deck
   progress, and exposes add / import / study.

   Variants ('state' prop):
     loaded       - populated deck (default)
     empty        - deck has zero cards
     searchEmpty  - search returns nothing
     loading      - skeleton list
     error        - load failed
     delCard      - delete a single flashcard confirm
     delDeck      - delete the whole deck confirm
     reorder      - manual sort active (drag handles visible)
*/
function FlashcardListScreen({ go, state = 'loaded' }) {

  const isOverlay = state === 'delCard' || state === 'delDeck';
  const reorder = state === 'reorder';

  const deckName = 'TOPIK II — Vocab';
  const breadcrumb = [
  { label: 'Library' },
  { label: 'Korean' },
  { label: 'TOPIK II' },
  { label: deckName }];


  // Status badges follow MemoX tokens
  const statusToken = {
    new: 'var(--memox-status-new)',
    learning: 'var(--memox-status-learning)',
    reviewing: 'var(--memox-status-reviewing)',
    mastered: 'var(--memox-status-mastered)'
  };
  const statusLabel = {
    new: 'New', learning: 'Learning', reviewing: 'Reviewing', mastered: 'Mastered'
  };

  const summary = {
    total: 142, due: 23, fresh: 6, mastery: 0.62,
    new: 4, learning: 8, reviewing: 24, mastered: 106
  };

  const cards = [
  { front: '연구자', back: 'researcher / nhà nghiên cứu', tags: ['noun', 'people'], status: 'new', flag: false, due: 'now' },
  { front: '공부하다', back: 'to study', tags: ['verb'], status: 'mastered', flag: false, due: 'in 4d' },
  { front: '도서관', back: 'library, reading room', tags: ['noun', 'places'], status: 'learning', flag: true, due: '10m' },
  { front: '친구', back: 'friend, close companion', tags: ['noun', 'people'], status: 'reviewing', flag: false, due: '6h' },
  { front: '바다', back: 'sea, ocean', tags: ['noun', 'nature'], status: 'learning', flag: true, due: '15m' },
  { front: '영화', back: 'movie / film', tags: ['noun'], status: 'new', flag: false, due: 'now' },
  { front: '시간', back: 'time, hour', tags: ['noun'], status: 'reviewing', flag: false, due: '2d' }];


  // ── inline helpers ───────────────────────────────────────────────
  const Scrim = () =>
  <div style={{
    position: 'absolute', inset: 0,
    background: 'rgba(25,28,30,0.45)',
    zIndex: 50,
    animation: 'memoxScrimIn 220ms ease'
  }} />;


  // Card row — front big and bold (Korean term), back smaller variant color,
  // tags + due chip + status dot for fast scanning. Keeps one row to ~78px.
  const CardRow = ({ c, last, dragHandle }) =>
  <div style={{
    marginBottom: 8,
    padding: '12px 12px',
    display: 'grid',
    gridTemplateColumns: dragHandle ?
    '20px 8px 1fr auto' :
    '8px 1fr auto',
    gap: 12, alignItems: 'flex-start',
    background: 'var(--memox-surface-container-lowest)',
    border: 'var(--memox-border-ghost)',
    borderRadius: 12
  }}>
      {dragHandle &&
    <div style={{
      color: 'var(--memox-on-surface-variant)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      height: '100%', paddingTop: 4, cursor: 'grab'
    }}>
          <Ic name="grip-vertical" size={16} color="var(--memox-on-surface-variant)" />
        </div>
    }

      {/* Status rail */}
      <div style={{ paddingTop: 6 }}>
        <span className="status-dot" style={{ background: statusToken[c.status], width: 8, height: 8 }} />
      </div>

      <div style={{ minWidth: 0 }}>
        {/* Front — visually dominant */}
        <div style={{
        fontSize: 16, fontWeight: 700, letterSpacing: '-0.2px',
        lineHeight: 1.25,
        whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'
      }}>
          {c.front}
        </div>

        {/* Back — clearly secondary: smaller, variant color, italic-ish weight */}
        <div style={{
        fontSize: 12, color: 'var(--memox-on-surface-variant)',
        marginTop: 3, lineHeight: 1.4,
        whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'
      }}>
          {c.back}
        </div>

        {/* Bottom row — tags + status text */}
        <div style={{
        marginTop: 8, display: 'flex', alignItems: 'center', gap: 6,
        flexWrap: 'nowrap', overflow: 'hidden'
      }}>
          <span style={{
          fontSize: 10, fontWeight: 700, letterSpacing: 0.3, textTransform: 'uppercase',
          color: statusToken[c.status]
        }}>{statusLabel[c.status]}</span>
          {c.tags.slice(0, 2).map((t) =>
        <span key={t} style={{
          height: 18, padding: '0 7px', borderRadius: 999,
          background: 'var(--memox-surface-container)',
          color: 'var(--memox-on-surface-variant)',
          fontSize: 10, fontWeight: 600,
          display: 'inline-flex', alignItems: 'center', flexShrink: 0
        }}>{t}</span>
        )}
        </div>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6, paddingTop: 4 }}>
        {c.flag && <Ic name="flag" size={13} color="var(--memox-streak)" />}
        <span style={{
        fontSize: 10, fontWeight: 700,
        fontVariantNumeric: 'tabular-nums',
        color: 'var(--memox-on-surface-variant)',
        padding: '2px 6px', borderRadius: 6,
        background: 'var(--memox-surface-container)'
      }}>{c.due}</span>
      </div>
    </div>;


  return (
    <div className="app" style={{ position: 'relative' }}>
      <StatusBar />

      {/* App bar */}
      <div className="appbar" style={{ justifyContent: 'space-between' }}>
        <button className="icon-btn" onClick={() => go('library')}>
          <Ic name={reorder ? 'x' : 'arrow-left'} size={20} />
        </button>
        <div className="title" style={{
          fontSize: 16, fontWeight: 700, flex: 1, textAlign: 'left', marginLeft: 4,
          whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'
        }}>
          {reorder ? 'Reorder cards' : deckName}
        </div>
        {reorder ?
        <button className="pill-btn primary" style={{
          height: 32, padding: '0 14px', borderRadius: 9, fontSize: 12
        }}>
            Done
          </button> :

        <>
            <button className="icon-btn" title="Search">
              <Ic name="search" size={18} color="var(--memox-on-surface-variant)" />
            </button>
            <button className="icon-btn" title="More">
              <Ic name="more-vertical" size={18} color="var(--memox-on-surface-variant)" />
            </button>
          </>
        }
      </div>

      {!reorder && <Breadcrumb segments={breadcrumb} />}

      <div className="scroll" style={{ padding: '0 14px 110px' }}>

        {/* Deck summary — populated only. Drives the decide-or-add choice. */}
        {state !== 'error' && state !== 'loading' && state !== 'empty' && !reorder &&
        <div className="card" style={{
          padding: '14px',
          marginBottom: 12,
          background: 'linear-gradient(135deg, rgba(82,101,245,0.06) 0%, rgba(139,111,245,0.10) 100%)',
          border: '1px solid rgba(82,101,245,0.18)'
        }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 12 }}>
              <svg width="56" height="56" viewBox="0 0 40 40">
                <circle cx="20" cy="20" r="17" fill="none" stroke="var(--memox-surface-container)" strokeWidth="3" />
                <circle cx="20" cy="20" r="17" fill="none"
              stroke={masteryColor(summary.mastery)} strokeWidth="3"
              strokeLinecap="round"
              strokeDasharray="106.8"
              strokeDashoffset={(1 - summary.mastery) * 106.8}
              transform="rotate(-90 20 20)" />
                <text x="20" y="22.5" textAnchor="middle" fontSize="9" fontWeight="700"
              fill={masteryColor(summary.mastery)}
              style={{ fontFamily: 'var(--memox-font-sans)' }}>
                  {Math.round(summary.mastery * 100)}%
                </text>
              </svg>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div className="ov">Deck progress</div>
                <div style={{
                fontSize: 14, marginTop: 4, fontVariantNumeric: 'tabular-nums'
              }}>
                  {summary.mastered} of {summary.total} cards mastered
                </div>
                <div style={{
                fontSize: 12, color: 'var(--memox-on-surface-variant)', marginTop: 2,
                display: 'inline-flex', alignItems: 'center', gap: 5
              }}>
                  {summary.due > 0 ?
                <>
                      <span style={{ width: 6, height: 6, borderRadius: 999, background: 'var(--memox-primary)', display: 'inline-block' }} />
                      {summary.due} due · {summary.fresh} new
                    </> :
                'All caught up for now'}
                </div>
              </div>
            </div>

            {/* Status mini-segments — 4 colours so user sees where the deck lives */}
            <div style={{
            display: 'flex', height: 6, borderRadius: 999, overflow: 'hidden',
            background: 'var(--memox-surface-container)',
            marginBottom: 10
          }}>
              {[
            { v: summary.new, c: 'var(--memox-status-new)' },
            { v: summary.learning, c: 'var(--memox-status-learning)' },
            { v: summary.reviewing, c: 'var(--memox-status-reviewing)' },
            { v: summary.mastered, c: 'var(--memox-status-mastered)' }].
            map((s, i) =>
            <div key={i} style={{
              width: `${s.v / summary.total * 100}%`,
              background: s.c
            }} />
            )}
            </div>
            <div style={{
            display: 'flex', flexWrap: 'wrap', gap: '4px 10px',
            fontSize: 11, color: 'var(--memox-on-surface-variant)',
            fontVariantNumeric: 'tabular-nums',
            marginBottom: summary.due > 0 ? 12 : 0
          }}>
              {[
            { l: 'New', v: summary.new, c: 'var(--memox-status-new)' },
            { l: 'Learning', v: summary.learning, c: 'var(--memox-status-learning)' },
            { l: 'Reviewing', v: summary.reviewing, c: 'var(--memox-status-reviewing)' },
            { l: 'Mastered', v: summary.mastered, c: 'var(--memox-status-mastered)' }].
            map((b) =>
            <span key={b.l} style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>
                  <span className="status-dot" style={{ width: 6, height: 6, background: b.c }} />

            {summary.due > 0 &&
          <button className="pill-btn primary" style={{

        {/* Filter / sort row — hidden in error/loading/empty/reorder */}
        {state !== 'error' && state !== 'loading' && state !== 'empty' && !reorder &&
        <div style={{ padding: '0 0 8px' }}>
            <div className="scroll-x" style={{ display: 'flex', gap: 6 }}>
              {[
            { label: 'All', count: summary.total, active: true },
            { label: 'Due now', count: summary.due },
            { label: 'New', count: summary.new },
            { label: 'Flagged', count: 2, ic: 'flag' },
            { label: 'Mastered', count: summary.mastered }].
            map((f, i) =>
            <button key={f.label} className="pill-btn" style={{
              height: 28, padding: '0 10px', borderRadius: 999, fontSize: 11, gap: 5,
              background: f.active ? 'var(--memox-primary)' : 'var(--memox-surface-container-lowest)',
              color: f.active ? '#fff' : 'var(--memox-on-surface)',

        }

        {/* Count + sort */}
        {state !== 'error' && state !== 'loading' && state !== 'empty' &&
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '2px 4px 8px'
        }}>
            <span className="ov">
              {state === 'searchEmpty' ? 'No matches' :
            reorder ? `${cards.length} cards · drag to reorder` :
            `${state === 'loaded' ? cards.length : 0} cards`}
            </span>
            {!reorder &&
          <button className="pill-btn" style={{
            height: 28, padding: '0 10px', borderRadius: 999, fontSize: 11, gap: 5,
            background: 'transparent', border: 'none',
            color: 'var(--memox-on-surface-variant)'
          }}>
                <Ic name="arrow-down-up" size={11} color="var(--memox-on-surface-variant)" />

                <Ic name="chevron-down" size={11} color="var(--memox-on-surface-variant)" />
              </button>
          }
          </div>
        }

        {/* Body */}
        {state === 'error' ?
        <div className="card" style={{ padding: '40px 22px', textAlign: 'center', marginTop: 8 }}>
            <div style={{
            width: 52, height: 52, borderRadius: 14,
            background: 'rgba(220,72,72,0.10)', color: 'var(--memox-error)',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',

          }}>
              <Ic name="cloud-off" size={22} color="var(--memox-error)" />
            </div>
            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 6 }}>
              Couldn't open this deck
            </div>
            <div style={{ fontSize: 13, color: 'var(--memox-on-surface-variant)', lineHeight: 1.55, marginBottom: 16 }}>
              Your data is safe on this device. Try again in a moment.
            </div>
            <button className="pill-btn primary" style={{ height: 40, padding: '0 18px', borderRadius: 11, fontSize: 13 }}>
              <Ic name="refresh-cw" size={14} color="#fff" />
              Retry
            </button>
          </div> :

        state === 'loading' ?
        [0, 1, 2, 3, 4].map((i) =>
        <div key={i} style={{
          marginBottom: 8, padding: '12px 14px',
          background: 'var(--memox-surface-container-lowest)',
          border: 'var(--memox-border-ghost)',
          borderRadius: 12,
          display: 'grid', gridTemplateColumns: '8px 1fr 36px',
          gap: 12, alignItems: 'flex-start'
        }}>
              <span style={{
            width: 8, height: 8, borderRadius: 999, marginTop: 6,
            background: 'var(--memox-surface-container-high)', opacity: 0.5,
            animation: 'memoxSkelPulse 1.4s ease-in-out infinite'
          }} />
              <div>
                <span style={{
              display: 'inline-block', height: 13, width: 100 + i * 18,
              borderRadius: 6, background: 'var(--memox-surface-container-high)',
              opacity: 0.55, animation: 'memoxSkelPulse 1.4s ease-in-out infinite'
            }} />
                <span style={{
              display: 'block', height: 10, width: 160,
              borderRadius: 6, background: 'var(--memox-surface-container-high)',
              opacity: 0.4, marginTop: 6,
              animation: 'memoxSkelPulse 1.4s ease-in-out infinite'
            }} />
                <span style={{
              display: 'block', height: 8, width: 80,
              borderRadius: 6, background: 'var(--memox-surface-container-high)',
              opacity: 0.3, marginTop: 8,
              animation: 'memoxSkelPulse 1.4s ease-in-out infinite'
            }} />
              </div>
              <span />
            </div>
        ) :

        state === 'searchEmpty' ?
        <div className="card" style={{ padding: '32px 22px', textAlign: 'center' }}>
            <div style={{
            width: 44, height: 44, borderRadius: 12,
            background: 'var(--memox-surface-container)',
            color: 'var(--memox-on-surface-variant)',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            marginBottom: 12
          }}>
              <Ic name="search" size={18} color="var(--memox-on-surface-variant)" />
            </div>
            <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>
              No cards match "도서"
            </div>
            <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)', lineHeight: 1.5 }}>
              Try a different term, or clear the search to see all 142 cards.
            </div>
          </div> :

        state === 'empty' ?
        <div style={{ marginTop: 8 }}>
            <div className="card" style={{ padding: '32px 22px', textAlign: 'center', marginBottom: 14 }}>
              <div style={{
              width: 64, height: 64, borderRadius: 18,
              background: 'rgba(82,101,245,0.10)',
              color: 'var(--memox-primary)',
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              marginBottom: 14
            }}>
                <Ic name="layers" size={28} color="var(--memox-primary)" />
              </div>
              <div style={{ fontSize: 18, fontWeight: 700, letterSpacing: '-0.2px', marginBottom: 6 }}>
                No cards in this deck yet
              </div>
              <div style={{ fontSize: 13, color: 'var(--memox-on-surface-variant)', lineHeight: 1.55, padding: '0 6px' }}>
                Add your first flashcard to start studying. You can also paste a list of terms or import a file.
              </div>
            </div>

            {/* Dual CTA — Add is clearer (primary), Import is the helpful sibling */}
            <button className="pill-btn primary" style={{
            width: '100%', height: 44, borderRadius: 13, fontSize: 14, marginBottom: 8
          }}>
              <Ic name="plus" size={17} color="#fff" />
              Add first flashcard
            </button>
            <button className="pill-btn" style={{
            width: '100%', height: 40, borderRadius: 12, fontSize: 13,
            background: 'rgba(82,101,245,0.08)',
            color: 'var(--memox-primary)',
            border: 'none', gap: 7
          }}>
              <Ic name="upload" size={15} color="var(--memox-primary)" />
              Import cards (CSV, TSV, Anki)
            </button>

            <div style={{
            marginTop: 14, padding: '10px 12px',
            background: 'var(--memox-surface-container-lowest)',
            borderRadius: 10, border: 'var(--memox-border-ghost)',
            fontSize: 11, color: 'var(--memox-on-surface-variant)',
            lineHeight: 1.5,
            display: 'flex', gap: 8, alignItems: 'flex-start'
          }}>
              <Ic name="info" size={13} color="var(--memox-on-surface-variant)" />
              <span>Start study is available once you have at least one card.</span>
            </div>
          </div> :


        // populated / reorder
        cards.map((c) => <CardRow key={c.front} c={c} dragHandle={reorder} />)
        }
      </div>

      {/* FAB stack — hidden in empty/error/loading/reorder/overlays */}
      {!isOverlay && !reorder && state === 'loaded' &&
      <button style={{
        position: 'absolute', bottom: 24, right: 16,
        height: 52, padding: '0 18px 0 16px',
        borderRadius: 16,
        background: 'var(--memox-primary)', color: '#fff',
        border: 'none',
        display: 'inline-flex', alignItems: 'center', gap: 8,
        boxShadow: '0 8px 22px rgba(82,101,245,0.36)',
        fontSize: 14, fontWeight: 600,
        fontFamily: 'inherit', cursor: 'pointer',
        zIndex: 30
      }}>
          <Ic name="plus" size={18} color="#fff" />
          New card
        </button>
      }

      {/* Delete flashcard confirm */}
      {state === 'delCard' &&
      <>
          <Scrim />
          <div style={{
          position: 'absolute', inset: 0,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          padding: '24px 18px', zIndex: 51,
          pointerEvents: 'none'
        }}>
            <div style={{
            width: '100%', maxWidth: 340,
            background: 'var(--memox-surface-container-high)',
            color: 'var(--memox-on-surface)',
            borderRadius: 18,
            boxShadow: '0 16px 40px rgba(0,0,0,0.32)',
            pointerEvents: 'auto',
            overflow: 'hidden',
            animation: 'memoxDialogIn 200ms cubic-bezier(0.2,0,0,1)'
          }}>
              <div style={{ padding: '18px 18px 4px' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
                  <div style={{
                  width: 34, height: 34, borderRadius: 10,
                  background: 'rgba(220,72,72,0.12)', color: 'var(--memox-error)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  flexShrink: 0
                }}>
                    <Ic name="trash-2" size={16} color="var(--memox-error)" />
                  </div>
                  <div style={{ fontSize: 16, fontWeight: 700, letterSpacing: '-0.2px' }}>
                    Delete this flashcard?
                  </div>
                </div>

                {/* Show the card so user knows exactly what they're deleting */}
                <div style={{
                padding: '12px 14px',
                background: 'var(--memox-surface-container-lowest)',
                borderRadius: 11,
                border: 'var(--memox-border-ghost)',
                marginTop: 4
              }}>
                  <div style={{ fontSize: 15, fontWeight: 700, letterSpacing: '-0.2px', marginBottom: 3 }}>
                    도서관
                  </div>
                  <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)' }}>
                    library, reading room
                  </div>
                </div>

                <div style={{
                fontSize: 12, color: 'var(--memox-on-surface-variant)',
                lineHeight: 1.5, marginTop: 12
              }}>
                  Review history for this card will be removed. Other cards in this deck are unaffected.
                </div>
              </div>

              <div style={{ padding: '14px 14px 14px', display: 'flex', gap: 8 }}>
                <button className="pill-btn outline" style={{ flex: 1, height: 40, borderRadius: 11, fontSize: 13 }}>
                  Cancel
                </button>
                <button className="pill-btn" style={{
                flex: 1.2, height: 40, borderRadius: 11, fontSize: 13,
                background: 'var(--memox-error-fill)', color: '#fff', border: 'none', fontWeight: 600,
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6
              }}>
                  <Ic name="trash-2" size={14} color="#fff" />
                  Delete card
                </button>
              </div>
            </div>
          </div>
        </>
      }

      {/* Delete deck confirm — more dramatic, with reassurance about cards */}
      {state === 'delDeck' &&
      <>
          <Scrim />
          <div style={{
          position: 'absolute', inset: 0,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          padding: '24px 18px', zIndex: 51,
          pointerEvents: 'none'
        }}>
            <div style={{
            width: '100%', maxWidth: 340,
            background: 'var(--memox-surface-container-high)',
            color: 'var(--memox-on-surface)',
            borderRadius: 18,
            boxShadow: '0 16px 40px rgba(0,0,0,0.32)',
            pointerEvents: 'auto',
            overflow: 'hidden',
            animation: 'memoxDialogIn 200ms cubic-bezier(0.2,0,0,1)'
          }}>
              <div style={{ padding: '18px 18px 4px', textAlign: 'center' }}>
                <div style={{
                width: 48, height: 48, borderRadius: 14,
                background: 'rgba(220,72,72,0.12)',
                color: 'var(--memox-error)',
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                marginBottom: 12
              }}>
                  <Ic name="layers" size={22} color="var(--memox-error)" />
                </div>
                <div style={{ fontSize: 17, fontWeight: 700, letterSpacing: '-0.2px', marginBottom: 6 }}>
                  Delete this deck?
                </div>
                <div style={{ fontSize: 13, color: 'var(--memox-on-surface-variant)', lineHeight: 1.55, padding: '0 6px' }}>
                  <strong style={{ color: 'var(--memox-on-surface)', fontWeight: 700 }}>{deckName}</strong> and its 142 cards will be removed from this folder.
                </div>
              </div>

              {/* Type-to-confirm to avoid mistaps */}
              <div style={{ padding: '14px 18px 4px' }}>
                <div className="ov" style={{ marginBottom: 6 }}>Type the deck name to confirm</div>
                <div style={{
                height: 42, padding: '0 12px',
                background: 'var(--memox-surface-container-lowest)',
                border: '1px solid var(--memox-error)',
                borderRadius: 11,
                display: 'flex', alignItems: 'center', gap: 8,
                fontSize: 14, fontWeight: 600,
                color: 'var(--memox-on-surface)'
              }}>
                  <span>TOPIK II — Vo</span>
                  <span style={{
                  display: 'inline-block', width: 2, height: 18,
                  background: 'var(--memox-error)',
                  animation: 'memoxBlink 1s infinite'
                }} />
                </div>
              </div>

              <div style={{ padding: '14px 14px 14px', display: 'flex', gap: 8 }}>
                <button className="pill-btn outline" style={{ flex: 1, height: 40, borderRadius: 11, fontSize: 13 }}>
                  Cancel
                </button>
                <button className="pill-btn" style={{
                flex: 1.2, height: 40, borderRadius: 11, fontSize: 13,
                background: 'var(--memox-error-fill)', color: '#fff', border: 'none', fontWeight: 600,
                opacity: 0.5, pointerEvents: 'none',
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6
              }}>
                  <Ic name="trash-2" size={14} color="#fff" />
                  Delete deck
                </button>
              </div>
            </div>
          </div>
        </>
      }

      <style>{`
        @keyframes memoxScrimIn  { from { opacity: 0; } to { opacity: 1; } }
        @keyframes memoxDialogIn { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes memoxBlink    { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }
      `}</style>
    </div>);

}

/* ─────── Screen: Flashcard create ───────
   Quick-create form for a new flashcard. Front and back are required and
   visually weightier; everything else lives in a collapsible optional
   section so the form stays short for the common case.

   Variants ('state' prop):
     emptyForm     - blank, Save disabled (default)
     valid         - both required fields filled, Save enabled
     validationErr - user tried Save with empty back, inline error
     saving        - Save in progress (spinner in app bar button)
     saveFailed    - inline retry banner above Save bar
     details       - valid + optional details section expanded
*/
function FlashcardCreateScreen({ go, state = 'emptyForm' }) {
  const empty = state === 'emptyForm';
  const valid = state === 'valid' || state === 'saving' || state === 'saveFailed' || state === 'details';
  const showDetails = state === 'details';
  const validationErr = state === 'validationErr';
  const saving = state === 'saving';
  const saveFailed = state === 'saveFailed';

  const front = empty ? '' : '연구자';
  const back = empty || validationErr ? '' : 'Researcher / Nhà nghiên cứu';

  // ── shared bits ─────────────────────────────────────────────────
  const FieldHeader = ({ label, required, count, max }) =>

            border: '1px dashed var(--memox-outline-variant)',

        padding: '10px 14px 16px',

          padding: '10px 12px',
          background: 'rgba(220,72,72,0.08)',

          display: 'flex', gap: 8, alignItems: 'flex-start'
        }}>
            <Ic name="alert-circle" size={14} color="var(--memox-error)" />

            </div>
          </div>
        }

        <div style={{ display: 'flex', gap: 10 }}>
          <button className="pill-btn outline" style={{
            height: 40, padding: '0 18px', borderRadius: 12, fontSize: 13,
            flexShrink: 0
          }}>
            Cancel
          </button>
          <button className="pill-btn primary" disabled={!valid || saving} style={{
            flex: 1, height: 40, borderRadius: 12, fontSize: 14, gap: 8,
            opacity: !valid || saving ? 0.45 : 1,

            {saving ?
            <><Spinner size={14} /> Saving…</> :
            saveFailed ?
            <><Ic name="refresh-cw" size={15} color="#fff" /> Retry save</> :

            <><Ic name="check" size={16} color="#fff" /> Save card</>

          </button>
        </div>

        <div style={{
          fontSize: 10, color: 'var(--memox-on-surface-variant)',
          textAlign: 'center', opacity: 0.7
        }}>
          {empty ? 'Front and back are required to save.' :
          validationErr ? 'Add the missing field to enable save.' :
          saving ? 'Saving to this device…' :
          'You can keep adding cards after saving.'}
        </div>
      </div>

      <style>{`
        @keyframes memoxBlink { 0%, 50% { opacity:1; } 50.01%, 100% { opacity:0; } }
        @keyframes memoxSpin  { to { transform: rotate(360deg); } }
      `}</style>
    </div>);

}

/* ─────── Screen: Flashcard edit ───────
   Same fields as create, but pre-filled and with a Danger zone parked
   far from the Save bar so destruct actions don't sit next to the safe one.

   Variants ('state' prop):
     loaded        - normal edit form (default)
     loading       - skeleton fields while fetching the card
     loadError     - couldn't load card
     validationErr - tried to save with empty back
     dirtySaving   - save in progress
     saveFailed    - save failed banner
     delConfirm    - delete-flashcard dialog
*/
function FlashcardEditScreen({ go, state = 'loaded' }) {
  const loading = state === 'loading';
  const loadError = state === 'loadError';
  const validationErr = state === 'validationErr';
  const saving = state === 'dirtySaving';
  const saveFailed = state === 'saveFailed';
  const delConfirm = state === 'delConfirm';

  // "dirty" = the user has typed something. In every non-empty state we

  const valid = !loading && !loadError && !validationErr;

  const FieldHeader = ({ label, required, count, max }) =>
  <div style={{
    display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',

  // Optional field row, identical to Create — keeps required vs optional contrast

        fontSize: 10, color: 'var(--memox-on-surface-variant)',
        opacity: 0.55, fontWeight: 500

      <div style={{
      background: 'var(--memox-surface-container-lowest)',

    }}>

    return (
      <div className="app">
        <StatusBar />
        <div className="appbar" style={{ justifyContent: 'space-between' }}>

            background: 'rgba(82,101,245,0.10)', color: 'var(--memox-primary)',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center'
          }}>
            <Ic name="layers" size={13} color="var(--memox-primary)" />
          </span>
          <span>TOPIK II — Vocab</span>
          <Ic name="chevron-down" size={13} color="var(--memox-on-surface-variant)" />

          </div>

        {/* Tags */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 6,

          <span style={{
            fontSize: 11, fontWeight: 600, letterSpacing: 0.4, textTransform: 'uppercase',
            color: 'var(--memox-on-surface-variant)'
          }}>Tags</span>
          <span style={{
            fontSize: 10, color: 'var(--memox-on-surface-variant)',
            opacity: 0.55, fontWeight: 500
          }}>· optional</span>
        </div>
        {loading ?
        <div style={{ display: 'flex', gap: 6, marginBottom: 24 }}>
            <Skel w={70} h={26} />
            <Skel w={56} h={26} />

        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 24 }}>
            {tags.map((t) =>

            height: 28, padding: '0 8px 0 12px',
            background: 'rgba(82,101,245,0.10)',
            color: 'var(--memox-primary)',
            borderRadius: 999,
            fontSize: 12, fontWeight: 600,
            display: 'inline-flex', alignItems: 'center', gap: 6

                {t}
                <Ic name="x" size={11} color="var(--memox-primary)" />

            <button style={{
            height: 28, padding: '0 12px',
            background: 'transparent',
            color: 'var(--memox-on-surface-variant)',
            border: '1px dashed var(--memox-outline-variant)',
            borderRadius: 999, fontSize: 12, fontWeight: 600,
            display: 'inline-flex', alignItems: 'center', gap: 4,
            fontFamily: 'inherit', cursor: 'pointer'
          }}>
              <Ic name="plus" size={12} color="var(--memox-on-surface-variant)" />
              Add tag
            </button>
          </div>
        }

        {/* Generous spacer — keeps Delete far from any Save action above */}
        <div style={{
          height: 1, background: 'var(--memox-outline-variant)',
          margin: '8px 6px 22px'
        }} />

        {/* Danger zone — labelled, parked here on purpose */}
        <div className="ov" style={{
          padding: '0 4px 10px',
          display: 'inline-flex', alignItems: 'center', gap: 6,
          color: 'var(--memox-error)'
        }}>
          <Ic name="alert-triangle" size={11} color="var(--memox-error)" />
          <span>Danger zone</span>
        </div>

        <div className="card" style={{
          padding: 14,
          marginBottom: 24,
          borderColor: 'rgba(220,72,72,0.20)',
          background: 'rgba(220,72,72,0.03)'
        }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>
            Delete this flashcard
          </div>
          <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)', lineHeight: 1.5, marginBottom: 12 }}>
            Removes the card and its review history from <strong style={{ color: 'var(--memox-on-surface)', fontWeight: 700 }}>TOPIK II — Vocab</strong>. Other cards in this deck stay.
          </div>
          <button disabled={loading} style={{
            height: 40, padding: '0 16px',
            background: 'transparent',
            color: 'var(--memox-error)',
            border: '1px solid rgba(220,72,72,0.40)',
            borderRadius: 11, fontSize: 13, fontWeight: 600,

            fontFamily: 'inherit', cursor: 'pointer',
            opacity: loading ? 0.45 : 1

            <Ic name="trash-2" size={14} color="var(--memox-error)" />
            Delete flashcard

      </div>

      {/* Save bar */}
      <div style={{
        padding: '10px 14px 16px',
        borderTop: 'var(--memox-border-ghost)',
        background: 'var(--memox-surface)',
        display: 'flex', flexDirection: 'column', gap: 10
      }}>
        {saveFailed &&
        <div style={{
          padding: '10px 12px',
          background: 'rgba(220,72,72,0.08)',
          border: '1px solid rgba(220,72,72,0.22)',
          borderRadius: 11,
          display: 'flex', gap: 8, alignItems: 'flex-start'
        }}>
            <Ic name="alert-circle" size={14} color="var(--memox-error)" />
            <div style={{ flex: 1, fontSize: 12, lineHeight: 1.45 }}>
              <strong style={{ fontWeight: 700 }}>Couldn't save changes.</strong>{' '}

          </div>

        <div style={{ display: 'flex', gap: 10 }}>
          <button className="pill-btn outline" style={{
            height: 40, padding: '0 18px', borderRadius: 12, fontSize: 13,
            flexShrink: 0
          }}>
            Cancel
          </button>
          <button className="pill-btn primary" disabled={!valid || saving} style={{
            flex: 1, height: 40, borderRadius: 12, fontSize: 14, gap: 8,
            opacity: !valid || saving ? 0.45 : 1,
            pointerEvents: !valid || saving ? 'none' : 'auto'
          }}>
            {saving ?
            <><Spinner size={14} /> Saving changes…</> :
            saveFailed ?
            <><Ic name="refresh-cw" size={15} color="#fff" /> Retry save</> :

            <><Ic name="check" size={16} color="#fff" /> Save changes</>
            }
          </button>
        </div>
        <div style={{
          fontSize: 10, color: 'var(--memox-on-surface-variant)',
          textAlign: 'center', opacity: 0.7
        }}>
          {loading ? 'Loading card…' :
          validationErr ? 'Add the missing field to enable save.' :
          saving ? 'Saving to this device…' :
          'Changes save to this device only.'}
        </div>
      </div>

      {/* Delete confirm dialog */}
      {delConfirm &&
      <>
          <Scrim />
          <div style={{
          position: 'absolute', inset: 0,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          padding: '24px 18px', zIndex: 51, pointerEvents: 'none'
        }}>
            <div style={{
            width: '100%', maxWidth: 340,
            background: 'var(--memox-surface-container-high)',
            color: 'var(--memox-on-surface)',
            borderRadius: 18,
            boxShadow: '0 16px 40px rgba(0,0,0,0.32)',
            pointerEvents: 'auto',
            overflow: 'hidden',
            animation: 'memoxDialogIn 200ms cubic-bezier(0.2,0,0,1)'
          }}>
              <div style={{ padding: '18px 18px 4px' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
                  <div style={{
                  width: 34, height: 34, borderRadius: 10,
                  background: 'rgba(220,72,72,0.12)', color: 'var(--memox-error)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  flexShrink: 0
                }}>
                    <Ic name="trash-2" size={16} color="var(--memox-error)" />
                  </div>
                  <div style={{ fontSize: 16, fontWeight: 700, letterSpacing: '-0.2px' }}>
                    Delete this flashcard?
                  </div>
                </div>

                <div style={{
                padding: '12px 14px',
                background: 'var(--memox-surface-container-lowest)',
                borderRadius: 11, border: 'var(--memox-border-ghost)',
                marginTop: 4
              }}>
                  <div style={{ fontSize: 15, fontWeight: 700, letterSpacing: '-0.2px', marginBottom: 3 }}>
                    {front}
                  </div>
                  <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)' }}>
                    Researcher / Nhà nghiên cứu
                  </div>
                </div>

                <div style={{
                fontSize: 12, color: 'var(--memox-on-surface-variant)',
                lineHeight: 1.5, marginTop: 12
              }}>
                  Removes the card and its <strong style={{ color: 'var(--memox-on-surface)', fontWeight: 700 }}>14 reviews</strong> of history. Other cards in this deck are unaffected.
                </div>
              </div>

              <div style={{ padding: '14px 14px 14px', display: 'flex', gap: 8 }}>
                <button className="pill-btn outline" style={{ flex: 1, height: 40, borderRadius: 11, fontSize: 13 }}>
                  Cancel
                </button>
                <button className="pill-btn" style={{
                flex: 1.2, height: 40, borderRadius: 11, fontSize: 13,
                background: 'var(--memox-error-fill)', color: '#fff', border: 'none', fontWeight: 600,
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6
              }}>
                  <Ic name="trash-2" size={14} color="#fff" />
                  Delete card
                </button>
              </div>
            </div>
          </div>
        </>
      }

      <style>{`
        @keyframes memoxBlink     { 0%, 50% { opacity:1; } 50.01%, 100% { opacity:0; } }
        @keyframes memoxSpin      { to { transform: rotate(360deg); } }
        @keyframes memoxScrimIn   { from { opacity: 0; } to { opacity: 1; } }
        @keyframes memoxDialogIn  { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      `}</style>
    </div>);

}

/* ─────── Screen: Flashcard history ───────
   Read-only audit trail for a single card: study attempts and SRS box
   moves. Informative, not data-heavy; never editable, no destructive
   actions on this surface.

   Variants ('state' prop):
     loaded   - populated timeline (default)
     empty    - no attempts yet
     loading  - skeleton timeline
     error    - load failed
     partial  - some events have missing fields (graceful degradation)
*/
function FlashcardHistoryScreen({ go, state = 'loaded' }) {
  const loading = state === 'loading';
  const error = state === 'error';
  const empty = state === 'empty';
  const partial = state === 'partial';

  // Card identity
  const front = '연구자';
  const back = 'Researcher / Nhà nghiên cứu';

  // Current SRS summary — 5 boxes (Leitner-style)
  const totalBoxes = 5;
  const currentBox = 3;
  const summary = {
    box: currentBox,
    due: 'in 6 days',
    reviewCount: 14,
    lapseCount: 2,
    recallRate: 0.78,
    streak: 4, // correct in a row
    sinceCreated: '23 days'
  };

  // Event types — calm color rules. SRS box "before → after" tells the story.
  // Result classes:
  //   correct   = primary indigo (+1 box, or held at top)
  //   recovered = amber/streak  (after a lapse, regained)
  //   forgot    = error red    (reset boxes; muted)
  //   created   = neutral
  //   edited    = neutral
  //   audio     = neutral
  const events = [
  // newest first
  { t: '2h ago', date: 'today, 14:32', kind: 'correct', mode: 'Recall', ms: 1400, from: 2, to: 3, note: 'Answered correctly' },
  { t: 'yesterday', date: 'May 26, 09:10', kind: 'recovered', mode: 'Fill', ms: 4200, from: 1, to: 2, lapseAck: true, note: 'Got it back after a slip' },
  { t: '2 days ago', date: 'May 25, 21:48', kind: 'forgot', mode: 'Recall', ms: 6800, from: 3, to: 1, note: 'Couldn’t recall — reset to box 1', lapse: true },
  { t: '4 days ago', date: 'May 23, 08:00', kind: 'edited', note: 'Edit · meaning updated' },
  { t: 'a week ago', date: 'May 20, 19:14', kind: 'correct', mode: 'Match', ms: 900, from: 2, to: 3, note: 'Answered correctly' },
  { t: '10 days ago', date: 'May 17, 07:32', kind: 'correct', mode: 'Review', ms: 1600, from: 1, to: 2, note: 'Answered correctly' },
  { t: '13 days ago', date: 'May 14, 22:08', kind: 'audio', note: 'Pronunciation recorded' },
  { t: '23 days ago', date: 'May  4, 10:00', kind: 'created', note: 'Card added to TOPIK II — Vocab' }];


  const partialEvents = events.map((e, i) =>
  i === 1 ? { ...e, ms: null } // missing duration
  : i === 2 ? { ...e, from: null, to: null, note: 'Logged with missing details' } :
  e
  );

  // ── tokens for event kinds ──────────────────────────────────────
  const kinds = {
    correct: { label: 'Correct', color: 'var(--memox-primary)', bg: 'rgba(82,101,245,0.10)', ic: 'check' },
    recovered: { label: 'Recovered', color: 'var(--memox-streak)', bg: 'rgba(217,137,30,0.12)', ic: 'corner-up-right' },
    forgot: { label: 'Forgot', color: 'var(--memox-error)', bg: 'rgba(220,72,72,0.10)', ic: 'rotate-ccw' },
    edited: { label: 'Edited', color: 'var(--memox-on-surface-variant)', bg: 'var(--memox-surface-container)', ic: 'pencil' },
    created: { label: 'Created', color: 'var(--memox-mastery)', bg: 'rgba(31,138,91,0.10)', ic: 'sparkles' },
    audio: { label: 'Audio added', color: 'var(--memox-on-surface-variant)', bg: 'var(--memox-surface-container)', ic: 'mic' }
  };

  // ── shared bits ─────────────────────────────────────────────────
  const Skel = ({ w = '100%', h = 12, op = 0.5, r = 6 }) =>
  <span style={{
    display: 'block', width: w, height: h, borderRadius: r,
    background: 'var(--memox-surface-container-high)',
    opacity: op, animation: 'memoxSkelPulse 1.4s ease-in-out infinite'
  }} />;


  // Box-to-box visual: 5 dots with current box filled. Below each move
  // we render a tiny "B2 → B3" caption so the meaning is obvious without
  // teaching the SRS theory.
  const BoxMove = ({ from, to, color }) => {
    if (from == null || to == null) {
      return (
        <span style={{
          fontSize: 10, color: 'var(--memox-on-surface-variant)',
          fontStyle: 'italic'
        }}>box change unavailable</span>);

    }
    return (
      <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
        <span style={{
          fontSize: 11, fontWeight: 700, color: color,
          fontVariantNumeric: 'tabular-nums',
          display: 'inline-flex', alignItems: 'center', gap: 3
        }}>
          <span style={{ opacity: 0.6, fontWeight: 600 }}>B{from}</span>
          <Ic name={to > from ? 'arrow-right' : 'arrow-left'} size={11} color={color} />
          <span>B{to}</span>
        </span>
      </div>);

  };

  return (
    <div className="app" style={{ position: 'relative' }}>
      <StatusBar />

      <div className="appbar" style={{ justifyContent: 'space-between' }}>
        <button className="icon-btn" onClick={() => go('cards')}>
          <Ic name="arrow-left" size={20} />
        </button>
        <div className="title" style={{ fontSize: 16, fontWeight: 700, flex: 1, textAlign: 'left', marginLeft: 4 }}>
          Card history
        </div>
        {/* Primary action: jump to edit */}
        {!loading && !error &&
        <button className="pill-btn" style={{
          height: 32, padding: '0 12px', borderRadius: 9, fontSize: 12, gap: 5,
          background: 'rgba(82,101,245,0.10)', color: 'var(--memox-primary)',
          border: 'none'
        }}>
            <Ic name="pencil" size={12} color="var(--memox-primary)" />
            Edit
          </button>
        }
      </div>

      <Breadcrumb segments={[
      { label: 'Library' },
      { label: 'Korean' },
      { label: 'TOPIK II — Vocab' },
      { label: 'History' }]
      } />

      <div className="scroll" style={{ padding: '0 14px 24px' }}>

        {/* Card preview — small, read-only. Lets the user keep context. */}
        <div className="card" style={{
          padding: '14px 16px', marginBottom: 14,
          display: 'grid', gridTemplateColumns: '1fr auto', gap: 12, alignItems: 'center'
        }}>
          <div style={{ minWidth: 0 }}>
            {loading ?
            <>
                <Skel w={140} h={18} />
                <div style={{ height: 6 }} />
                <Skel w={180} h={11} op={0.4} />
              </> :

            <>
                <div style={{ fontSize: 20, fontWeight: 700, letterSpacing: '-0.3px', lineHeight: 1.2 }}>{front}</div>
                <div style={{
                fontSize: 12, color: 'var(--memox-on-surface-variant)', marginTop: 3,
                whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'
              }}>{back}</div>
              </>
            }
          </div>
          {!loading &&
          <span style={{
            height: 24, padding: '0 9px', borderRadius: 999,
            background: 'rgba(82,101,245,0.10)', color: 'var(--memox-primary)',
            fontSize: 11, fontWeight: 700,
            fontVariantNumeric: 'tabular-nums',
            display: 'inline-flex', alignItems: 'center', gap: 5,
            flexShrink: 0
          }}>
              <Ic name="zap" size={11} color="var(--memox-primary)" />
              Box {summary.box} / {totalBoxes}
            </span>
          }
        </div>

        {/* Progress summary — calm, scannable */}
        {!loading && !error &&
        <div className="card" style={{ padding: '14px', marginBottom: 16 }}>
            <div className="ov" style={{ marginBottom: 10 }}>Current progress</div>

            {/* SRS dots — 5 boxes, current filled, target indicator */}
            <div style={{
            display: 'flex', alignItems: 'center', gap: 8,
            marginBottom: 12
          }}>
              {Array.from({ length: totalBoxes }).map((_, i) => {
              const idx = i + 1;
              const isCurrent = idx === summary.box;
              const isPast = idx < summary.box;
              return (
                <React.Fragment key={i}>
                    <div style={{
                    flex: 1,
                    height: isCurrent ? 10 : 6,
                    borderRadius: 999,
                    background: isCurrent ? 'var(--memox-primary)' :
                    isPast ? 'rgba(82,101,245,0.40)' :
                    'var(--memox-surface-container-high)',
                    transition: 'all 200ms ease'
                  }} />
                  </React.Fragment>);

            })}
            </div>
            <div style={{
            display: 'flex', justifyContent: 'space-between',
            fontSize: 10, color: 'var(--memox-on-surface-variant)',
            fontVariantNumeric: 'tabular-nums', marginBottom: 14,
            padding: '0 2px'
          }}>
              <span>Box 1</span>
              <span>Box 3</span>
              <span>Box 5</span>
            </div>

            <div style={{
            display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)',
            rowGap: 14, columnGap: 14
          }}>
              {[
            { l: 'Due', v: summary.due, ic: 'clock' },
            { l: 'Reviews', v: summary.reviewCount, ic: 'repeat' },
            { l: 'Recall rate', v: `${Math.round(summary.recallRate * 100)}%`, ic: 'target' },
            { l: 'Lapses', v: summary.lapseCount, ic: 'rotate-ccw' },
            { l: 'Correct streak', v: `${summary.streak} in a row`, ic: 'flame' },
            { l: 'Since added', v: summary.sinceCreated, ic: 'calendar' }].
            map((s) =>
            <div key={s.l} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <div style={{
                width: 28, height: 28, borderRadius: 8,
                background: 'rgba(82,101,245,0.08)', color: 'var(--memox-primary)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                flexShrink: 0
              }}>
                    <Ic name={s.ic} size={13} color="var(--memox-primary)" />
                  </div>
                  <div style={{ minWidth: 0 }}>
                    <div style={{
                  fontSize: 11, color: 'var(--memox-on-surface-variant)',
                  letterSpacing: 0.2, marginBottom: 1
                }}>{s.l}</div>
                    <div style={{
                  fontSize: 13, fontWeight: 700, letterSpacing: '-0.1px',
                  fontVariantNumeric: 'tabular-nums',
                  whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'
                }}>{s.v}</div>
                  </div>
                </div>
            )}
            </div>
          </div>
        }

        {/* Section: timeline */}
        {!error &&
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '2px 4px 10px'
        }}>
            <span className="ov">
              {loading ? 'Loading timeline' :
            empty ? 'Timeline' :
            `Timeline · ${events.length} events`}
            </span>
            {!loading && !empty &&
          <button className="pill-btn" style={{
            height: 26, padding: '0 10px', borderRadius: 999, fontSize: 11, gap: 5,
            background: 'transparent', border: 'none',
            color: 'var(--memox-on-surface-variant)'
          }}>
                <Ic name="filter" size={11} color="var(--memox-on-surface-variant)" />
                All events
                <Ic name="chevron-down" size={11} color="var(--memox-on-surface-variant)" />
              </button>
          }
          </div>
        }

        {/* Body */}
        {error ?
        <div className="card" style={{ padding: '40px 22px', textAlign: 'center' }}>
            <div style={{
            width: 52, height: 52, borderRadius: 14,
            background: 'rgba(220,72,72,0.10)', color: 'var(--memox-error)',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            marginBottom: 14
          }}>
              <Ic name="cloud-off" size={22} color="var(--memox-error)" />
            </div>
            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 6 }}>
              Couldn't load history
            </div>
            <div style={{ fontSize: 13, color: 'var(--memox-on-surface-variant)', lineHeight: 1.55, marginBottom: 16 }}>
              Your data is safe on this device. Try again in a moment.
            </div>
            <button className="pill-btn primary" style={{ height: 40, padding: '0 18px', borderRadius: 11, fontSize: 13 }}>
              <Ic name="refresh-cw" size={14} color="#fff" />
              Retry
            </button>
          </div> :

        empty ?
        <div className="card" style={{ padding: '40px 22px 32px', textAlign: 'center' }}>
            <div style={{
            width: 60, height: 60, borderRadius: 16,
            background: 'rgba(82,101,245,0.10)', color: 'var(--memox-primary)',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            marginBottom: 14
          }}>
              <Ic name="clock" size={26} color="var(--memox-primary)" />
            </div>
            <div style={{ fontSize: 17, fontWeight: 700, letterSpacing: '-0.2px', marginBottom: 8 }}>
              No reviews yet
            </div>
            <div style={{ fontSize: 13, color: 'var(--memox-on-surface-variant)', lineHeight: 1.55, marginBottom: 18 }}>
              History appears here after you study this card. Open it in a session and your attempts will start showing up.
            </div>
            <button className="pill-btn primary" style={{ height: 40, padding: '0 18px', borderRadius: 11, fontSize: 13 }}>
              <Ic name="play" size={14} color="#fff" />
              Study this card now
            </button>
          </div> :

        loading ?
        // Skeleton timeline
        <div style={{ position: 'relative', paddingLeft: 24 }}>
            <div style={{
            position: 'absolute', left: 11, top: 8, bottom: 8, width: 2,
            background: 'var(--memox-surface-container)',
            borderRadius: 999
          }} />
            {[0, 1, 2, 3].map((i) =>
          <div key={i} style={{
            position: 'relative', marginBottom: 14
          }}>
                <span style={{
              position: 'absolute', left: -19, top: 6,
              width: 14, height: 14, borderRadius: 999,
              background: 'var(--memox-surface-container-high)',
              opacity: 0.55,
              animation: 'memoxSkelPulse 1.4s ease-in-out infinite'
            }} />
                <div style={{
              background: 'var(--memox-surface-container-lowest)',
              border: 'var(--memox-border-ghost)',
              borderRadius: 12, padding: '12px 14px'
            }}>
                  <Skel w={70} h={9} op={0.4} />
                  <div style={{ height: 8 }} />
                  <Skel w={i === 1 ? '85%' : '70%'} h={13} />
                  <div style={{ height: 8 }} />
                  <Skel w={120} h={10} op={0.35} />
                </div>
              </div>
          )}
          </div> :


        // Real timeline. Vertical rail down the left; each event is a card.
        <div style={{ position: 'relative', paddingLeft: 24 }}>
            <div style={{
            position: 'absolute', left: 11, top: 8, bottom: 8, width: 2,
            background: 'var(--memox-surface-container)',
            borderRadius: 999
          }} />
            {(partial ? partialEvents : events).map((e, i) => {
            const k = kinds[e.kind];
            return (
              <div key={i} style={{ position: 'relative', marginBottom: 12 }}>
                  {/* Dot on the rail */}
                  <span style={{
                  position: 'absolute', left: -19, top: 8,
                  width: 14, height: 14, borderRadius: 999,
                  background: 'var(--memox-surface)',
                  border: `3px solid ${k.color}`,
                  boxSizing: 'border-box'
                }} />
                  {/* Event card */}
                  <div style={{
                  background: 'var(--memox-surface-container-lowest)',
                  border: 'var(--memox-border-ghost)',
                  borderRadius: 12,
                  padding: '12px 14px'
                }}>
                    {/* Top row: kind chip + when */}
                    <div style={{
                    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                    gap: 8, marginBottom: 8
                  }}>
                      <span style={{
                      height: 22, padding: '0 9px', borderRadius: 999,
                      background: k.bg, color: k.color,
                      fontSize: 10, fontWeight: 700, letterSpacing: 0.3,
                      textTransform: 'uppercase',
                      display: 'inline-flex', alignItems: 'center', gap: 5
                    }}>
                        <Ic name={k.ic} size={11} color={k.color} />
                        {k.label}
                      </span>
                      <div style={{
                      fontSize: 11, color: 'var(--memox-on-surface-variant)',
                      fontVariantNumeric: 'tabular-nums', textAlign: 'right'
                    }}>
                        <div style={{ fontWeight: 600, color: 'var(--memox-on-surface)' }}>{e.t}</div>
                        <div style={{ fontSize: 10, opacity: 0.7, marginTop: 1 }}>{e.date}</div>
                      </div>
                    </div>

                    {/* Note */}
                    <div style={{
                    fontSize: 13, lineHeight: 1.45,
                    color: 'var(--memox-on-surface)',
                    marginBottom: e.from != null || e.mode || e.ms ? 8 : 0
                  }}>
                      {e.note}
                    </div>

                    {/* Bottom meta line: SRS move + mode + duration */}
                    {(e.from != null || e.to != null || e.mode || e.ms != null) &&
                  <div style={{
                    display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: '4px 10px',
                    fontSize: 11, color: 'var(--memox-on-surface-variant)'
                  }}>
                        {(e.from != null || e.to != null) &&
                    <BoxMove from={e.from} to={e.to} color={k.color} />
                    }
                        {e.mode &&
                    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                            <Ic name="layers" size={10} color="var(--memox-on-surface-variant)" />
                            {e.mode}
                          </span>
                    }
                        {e.ms != null ?
                    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, fontVariantNumeric: 'tabular-nums' }}>
                            <Ic name="timer" size={10} color="var(--memox-on-surface-variant)" />
                            {(e.ms / 1000).toFixed(1)}s
                          </span> :
                    e.ms === null && e.mode &&
                    <span style={{
                      fontStyle: 'italic', opacity: 0.7
                    }}>duration not logged</span>
                    }
                      </div>
                  }
                  </div>
                </div>);

          })}

            {/* End marker */}
            {!partial &&
          <div style={{ position: 'relative', marginTop: 4 }}>
                <span style={{
              position: 'absolute', left: -19, top: 4,
              width: 14, height: 14, borderRadius: 999,
              background: 'var(--memox-surface-container)',
              border: '2px solid var(--memox-outline-variant)',
              boxSizing: 'border-box'
            }} />
                <div style={{
              fontSize: 11, color: 'var(--memox-on-surface-variant)',
              paddingTop: 5, fontStyle: 'italic'
            }}>
                  Beginning of history
                </div>
              </div>
          }
          </div>
        }
      </div>

      <style>{`
        @keyframes memoxSkelPulse { 0%, 100% { opacity:0.45; } 50% { opacity:0.75; } }
      `}</style>
    </div>);

}

/* ─────── Screen: Deck import ───────
   Multi-step import flow inside a single screen. Never auto-imports; the
   commit action stays disabled until preview is computed AND the user has
   at least one valid row to import.

   Variants ('state' prop):
     empty       - no source picked yet (Step 1)
     fileSelected- file chosen, awaiting Preview
     parsing     - parser running
     previewAll  - preview with all rows valid
     previewMix  - preview with mixed valid + invalid + duplicate rows
     importing   - commit in progress
     success     - import success summary
     partial     - partial success (some rows skipped)
     failed      - import failed
*/
function DeckImportScreen({ go, state = 'empty' }) {
  const isResult = state === 'success' || state === 'partial' || state === 'failed';
  const isPreview = state === 'previewAll' || state === 'previewMix';
  const importing = state === 'importing';
  const parsing = state === 'parsing';
  const fileChosen = state === 'fileSelected' || parsing || isPreview || importing;

  // Sample preview rows
  const rowsAll = [
  { front: '연구자', back: 'researcher', ok: true },
  { front: '공부하다', back: 'to study', ok: true },
  { front: '도서관', back: 'library, reading room', ok: true },
  { front: '친구', back: 'friend, close companion', ok: true },
  { front: '바다', back: 'sea, ocean', ok: true }];

  const rowsMix = [
  { front: '연구자', back: 'researcher', ok: true },
  { front: '공부하다', back: '', err: 'Missing meaning' },
  { front: '도서관', back: 'library, reading room', ok: true },
  { front: '', back: 'sky', err: 'Missing term' },
  { front: '친구', back: 'friend, close companion', dup: 'Already in this deck' },
  { front: '바다', back: 'sea, ocean', ok: true },
  { front: '영화', back: 'movie / film', ok: true }];

  const rows = state === 'previewAll' ? rowsAll : rowsMix;
  const validCount = rows.filter((r) => r.ok).length;
  const invalidCount = rows.filter((r) => r.err).length;
  const duplicateCount = rows.filter((r) => r.dup).length;

  // Helpers
  const Spinner = ({ color = 'var(--memox-primary)', size = 14 }) =>
  <span style={{
    display: 'inline-block', width: size, height: size, borderRadius: 999,
    border: `2px solid ${color}`, borderTopColor: 'transparent',
    animation: 'memoxSpin 0.8s linear infinite', verticalAlign: 'middle'
  }} />;


  // ── RESULT BRANCH (success / partial / failed) — replaces body ──
  if (isResult) {
    const cfg = {
      success: {
        tone: 'mastery',
        icon: 'check-circle-2',
        title: 'Import complete',
        body: `Added 47 cards to TOPIK II — Vocab. They are ready to study.`,
        bg: 'rgba(31,138,91,0.10)',
        color: 'var(--memox-mastery)',
        bd: 'rgba(31,138,91,0.22)'
      },
      partial: {
        tone: 'streak',
        icon: 'alert-triangle',
        title: 'Imported with skips',
        body: 'Added 42 cards. 5 rows were skipped because of validation issues.',
        bg: 'rgba(217,137,30,0.10)',
        color: 'var(--memox-streak)',
        bd: 'rgba(217,137,30,0.22)'
      },
      failed: {
        tone: 'error',
        icon: 'alert-circle',
        title: 'Import didn’t finish',
        body: 'No cards were added. Your file is unchanged and your deck is untouched.',
        bg: 'rgba(220,72,72,0.08)',
        color: 'var(--memox-error)',
        bd: 'rgba(220,72,72,0.22)'
      }
    }[state];

    return (
      <div className="app">
        <StatusBar />
        <div className="appbar" style={{ justifyContent: 'space-between' }}>
          <button className="icon-btn" onClick={() => go('cards')}>
            <Ic name="x" size={20} />
          </button>
          <div className="title" style={{ fontSize: 16, fontWeight: 700, flex: 1, textAlign: 'left', marginLeft: 4 }}>
            Import results
          </div>
        </div>

        <div className="scroll" style={{ padding: '18px 14px 14px' }}>
          <div className="card" style={{
            padding: '24px 22px', textAlign: 'center', marginBottom: 14,
            background: cfg.bg, border: `1px solid ${cfg.bd}`
          }}>
            <div style={{
              width: 64, height: 64, borderRadius: 18,
              background: `${cfg.color}24`,
              color: cfg.color,
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              marginBottom: 14
            }}>
              <Ic name={cfg.icon} size={30} color={cfg.color} />
            </div>
            <div style={{ fontSize: 18, fontWeight: 700, letterSpacing: '-0.2px', marginBottom: 8 }}>
              {cfg.title}
            </div>
            <div style={{ fontSize: 13, color: 'var(--memox-on-surface-variant)', lineHeight: 1.55 }}>
              {cfg.body}
            </div>
          </div>

          {/* Breakdown */}
          {state !== 'failed' &&
          <div className="card" style={{ padding: 0, overflow: 'hidden', marginBottom: 14 }}>
              {[
            { l: 'Added', v: state === 'success' ? 47 : 42, c: 'var(--memox-mastery)', ic: 'check' },
            state === 'partial' ? { l: 'Skipped — missing fields', v: 3, c: 'var(--memox-error)', ic: 'alert-circle' } : null,
            state === 'partial' ? { l: 'Skipped — duplicates', v: 2, c: 'var(--memox-streak)', ic: 'copy' } : null].
            filter(Boolean).map((r, i, a) =>
            <div key={r.l} style={{
              display: 'grid', gridTemplateColumns: '28px 1fr auto',
              gap: 12, alignItems: 'center', padding: '12px 14px',
              borderBottom: i < a.length - 1 ? 'var(--memox-border-ghost)' : 'none'
            }}>
                  <div style={{
                width: 24, height: 24, borderRadius: 7,
                background: `${r.c}1F`, color: r.c,
                display: 'flex', alignItems: 'center', justifyContent: 'center'
              }}>
                    <Ic name={r.ic} size={12} color={r.c} />
                  </div>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>{r.l}</div>
                  <div style={{
                fontSize: 14, fontWeight: 700, color: r.c,
                fontVariantNumeric: 'tabular-nums'
              }}>{r.v}</div>
                </div>
            )}
            </div>
          }

          {state === 'partial' &&
          <div style={{
            padding: '10px 12px',
            background: 'var(--memox-surface-container-lowest)',
            border: 'var(--memox-border-ghost)',
            borderRadius: 11,
            fontSize: 11, color: 'var(--memox-on-surface-variant)',
            lineHeight: 1.5,
            display: 'flex', gap: 8, alignItems: 'flex-start',
            marginBottom: 14
          }}>
              <Ic name="info" size={13} color="var(--memox-on-surface-variant)" />
              <span>Fix the skipped rows in your source file and import again to add them.</span>
            </div>
          }
        </div>

        {/* Footer */}
        <div style={{
          padding: '10px 14px 16px',
          borderTop: 'var(--memox-border-ghost)',
          display: 'flex', gap: 10
        }}>
          <button className="pill-btn outline" style={{ flex: 1, height: 40, borderRadius: 12, fontSize: 13 }}>
            {state === 'failed' ? 'Close' : 'Back to deck'}
          </button>
          <button className="pill-btn primary" style={{ flex: 1.2, height: 40, borderRadius: 12, fontSize: 13, gap: 8 }}>
            {state === 'failed' ?
            <><Ic name="refresh-cw" size={15} color="#fff" /> Try again</> :

            <><Ic name="layers" size={15} color="#fff" /> View imported cards</>
            }
          </button>
        </div>
      </div>);

  }

  // ── MAIN BODY ─────────────────────────────────────────────────
  return (
    <div className="app">
      <StatusBar />

      <div className="appbar" style={{ justifyContent: 'space-between' }}>
        <button className="icon-btn" onClick={() => go('cards')}>
          <Ic name="x" size={20} />
        </button>
        <div className="title" style={{ fontSize: 16, fontWeight: 700, flex: 1, textAlign: 'left', marginLeft: 4 }}>
          Import cards
        </div>
        <button className="icon-btn" title="Help">
          <Ic name="help-circle" size={18} color="var(--memox-on-surface-variant)" />
        </button>
      </div>

      <Breadcrumb segments={[
      { label: 'Library' },
      { label: 'Korean' },
      { label: 'TOPIK II — Vocab' },
      { label: 'Import' }]
      } />

      <div className="scroll" style={{ padding: '0 14px 14px' }}>

        {/* Step tracker — 3 steps, current step indigo. Educates the
                    user that this is a 3-step safe flow before commit. */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 16 }}>
          {[
          { n: 1, label: 'Source', done: fileChosen || isPreview || importing },
          { n: 2, label: 'Preview', done: isPreview || importing, current: parsing || isPreview },
          { n: 3, label: 'Import', current: importing }].
          map((s, i, a) =>
          <React.Fragment key={s.n}>
              <div style={{
              display: 'inline-flex', alignItems: 'center', gap: 6,
              fontSize: 11, fontWeight: 600,
              color: s.done || s.current ? 'var(--memox-on-surface)' : 'var(--memox-on-surface-variant)',
              opacity: s.done || s.current ? 1 : 0.6
            }}>
                <span style={{
                width: 20, height: 20, borderRadius: 999,
