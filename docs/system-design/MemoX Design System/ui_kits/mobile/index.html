              </div>
            }
            <div style={{
              padding: '10px 14px',
              borderTop: 'var(--memox-border-ghost)',
              display: 'flex', gap: 8
            }}>
              <button className="pill-btn outline" style={{ flex: 1, height: 36, fontSize: 12 }}>
                <Ic name="log-out" size={14} color="var(--memox-primary)" />
                Sign out
              </button>
              <button className="pill-btn secondary" style={{ flex: 1, height: 36, fontSize: 12 }}>
                <Ic name="repeat" size={14} />
                Switch account
              </button>
            </div>
          </div>
          <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', padding: '8px 6px 0', lineHeight: 1.5 }}>
            Signing out keeps every deck and card on this device.
          </div>
        </Section>

        {/* ── 2. This device ────────────────────────────────────── */}
        <Section title="This device">
          <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
            <div style={{ padding: '12px 14px', display: 'flex', alignItems: 'center', gap: 12, borderBottom: 'var(--memox-border-ghost)' }}>
              <div className="icon-tile" style={{ width: 34, height: 34, borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <Ic name="smartphone" size={16} />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 600 }}>Alex's Pixel 8</div>
                <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 1 }}>Device label</div>
              </div>
              <button className="icon-btn" title="Rename device">
                <Ic name="pencil" size={15} color="var(--memox-on-surface-variant)" />
              </button>
            </div>
            <div style={{
              padding: '12px 14px',
              display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12
            }}>
              {[
              { n: '4', l: 'decks' },
              { n: '142', l: 'cards' },
              { n: '2 h', l: 'last active' }].
              map((s, i) =>
              <div key={i}>
                  <div style={{ fontSize: 16, fontWeight: 700, fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.3px' }}>{s.n}</div>
                  <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 1 }}>{s.l}</div>
                </div>
              )}
            </div>
          </div>
        </Section>

        {/* ── 3. Drive backup ───────────────────────────────────── */}
        <Section title="Drive backup">
          <div className="card" style={{ padding: 0, overflow: 'hidden' }}>

            {/* Manifest summary header */}
            <div style={{
              padding: '12px 14px',
              borderBottom: 'var(--memox-border-ghost)',
              display: 'flex', alignItems: 'center', gap: 12
            }}>
              <div style={{
                width: 34, height: 34, borderRadius: 10,
                background: noBackup ? 'var(--memox-surface-container)' :
                restoreWarn ? 'rgba(217,137,30,0.12)' :
                'rgba(31,138,91,0.10)',
                color: noBackup ? 'var(--memox-on-surface-variant)' :
                restoreWarn ? 'var(--memox-streak)' :
                'var(--memox-mastery)',
                display: 'flex', alignItems: 'center', justifyContent: 'center'
              }}>
                <Ic name="cloud" size={16} color={
                noBackup ? 'var(--memox-on-surface-variant)' :
                restoreWarn ? 'var(--memox-streak)' :
                'var(--memox-mastery)'
                } />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                {noBackup ?
                <>
                    <div style={{ fontSize: 14, fontWeight: 600 }}>No backup yet</div>
                    <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 1 }}>Upload to create your first backup.</div>
                  </> :

                <>
                    <div style={{ fontSize: 14, fontWeight: 600 }}>
                      Last upload {restoreWarn ? '11 days ago' : '2 days ago'}
                    </div>
                    <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 1 }}>
                      {restoreWarn ? '178 cards · 5 decks · from Galaxy S23' : '142 cards · 4 decks'}
                    </div>
                  </>
                }
              </div>
              {!noBackup && !restoreWarn &&
              <span style={{
                fontSize: 11, fontWeight: 600, color: 'var(--memox-mastery)',
                display: 'inline-flex', alignItems: 'center', gap: 4
              }}>
                  <Ic name="check" size={12} color="var(--memox-mastery)" />
                  Matches
                </span>
              }
            </div>

            {/* Progress strip — uploading */}
            {uploading &&
            <div style={{ padding: '14px 14px', borderBottom: 'var(--memox-border-ghost)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--memox-primary)' }}>
                    Uploading to Drive…
                  </div>
                  <div style={{ fontSize: 11, fontWeight: 700, fontVariantNumeric: 'tabular-nums', color: 'var(--memox-on-surface-variant)' }}>
                    {uploadPct}%
                  </div>
                </div>
                <div style={{ height: 6, background: 'var(--memox-surface-container)', borderRadius: 999, overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: `${uploadPct}%`, background: 'var(--memox-primary)', borderRadius: 999 }} />
                </div>
                <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 6 }}>
                  91 / 142 cards · keep this screen open
                </div>
              </div>
            }

            {/* Progress strip — restoring (2 steps: snapshot then download) */}
            {restoring &&
            <div style={{ padding: '14px 14px', borderBottom: 'var(--memox-border-ghost)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 0.3, textTransform: 'uppercase', color: 'var(--memox-on-surface-variant)' }}>
                    Step 1 of 2
                  </div>
                  <div style={{ fontSize: 11, fontWeight: 700, fontVariantNumeric: 'tabular-nums', color: 'var(--memox-on-surface-variant)' }}>
                    {restorePct}%
                  </div>
                </div>
                <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--memox-on-surface)', marginBottom: 8 }}>
                  Snapshotting local data first…
                </div>
                <div style={{ height: 6, background: 'var(--memox-surface-container)', borderRadius: 999, overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: `${restorePct}%`, background: 'var(--memox-primary)', borderRadius: 999 }} />
                </div>
                <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 6, lineHeight: 1.5 }}>
                  You can cancel until step 2 starts. Local data stays safe either way.
                </div>
              </div>
            }

            {/* Restore warning — different device */}
            {restoreWarn &&
            <div style={{ padding: '12px 14px', borderBottom: 'var(--memox-border-ghost)' }}>
                <Banner
                tone="warn"
                icon="alert-triangle"
                title="Backup is from a different device"
                body="Restoring will replace the 142 cards on this device with the 178 cards from Galaxy S23. Upload local first to keep both safe." />
              
              </div>
            }

            {/* Action buttons — order/intent shifts per state */}
            <div style={{ padding: '12px 14px', display: 'flex', flexDirection: 'column', gap: 8 }}>
              {restoreWarn ?
              <>
                  <button className="pill-btn primary" style={{ width: '100%', height: 40, borderRadius: 11 }}>
                    <Ic name="upload-cloud" size={16} color="#fff" />
                    Upload local first
                  </button>
                  <button className="pill-btn" style={{
                  width: '100%', height: 40, borderRadius: 11, fontSize: 13,
                  background: 'transparent',
                  border: '1px solid rgba(220,72,72,0.4)',
                  color: 'var(--memox-error)'
                }}>
                    <Ic name="download" size={15} color="var(--memox-error)" />
                    Restore anyway
                  </button>
                </> :
              restoring ?
              <button className="pill-btn outline" style={{ width: '100%', height: 40, borderRadius: 11 }}>
                  Cancel restore
                </button> :

              <>
                  <button className="pill-btn primary" disabled={busy || tokenExpired} style={{
                  width: '100%', height: 40, borderRadius: 11,
                  opacity: busy || tokenExpired ? 0.5 : 1
                }}>
                    {uploading ?
                  <><Spinner color="#fff" size={13} /> Uploading… {uploadPct}%</> :

                  <><Ic name="upload-cloud" size={16} color="#fff" /> Upload to Drive</>
                  }
                  </button>
                  <button className="pill-btn outline" disabled={busy || tokenExpired || noBackup} style={{
                  width: '100%', height: 40, borderRadius: 11,
                  opacity: busy || tokenExpired || noBackup ? 0.45 : 1
                }}>
                    <Ic name="download" size={15} color="var(--memox-primary)" />
                    Restore from Drive
                  </button>
                </>
              }
            </div>

            <div style={{ padding: '0 14px 12px', fontSize: 11, color: 'var(--memox-on-surface-variant)', lineHeight: 1.5 }}>
              {noBackup ? 'Uploads include decks, cards, tags, and review history. Settings stay local.' :
              restoreWarn ? 'Restore replaces everything on this device. There is no undo after step 2.' :
              'Backups are manual — MemoX never uploads automatically.'}
            </div>
          </div>
        </Section>

        {/* ── 4. Danger zone ────────────────────────────────────── */}
        <Section title="Danger zone">
          <div className="card" style={{
            padding: '14px',
            borderColor: 'rgba(220,72,72,0.20)',
            background: 'rgba(220,72,72,0.03)'
          }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--memox-on-surface)', marginBottom: 4 }}>
              Remove account from MemoX
            </div>
            <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)', lineHeight: 1.5, marginBottom: 12 }}>
              Unlinks Google Drive and clears the linked email from this app. Your decks, cards, and review history stay on this device.
            </div>
            <button className="pill-btn" style={{
              width: '100%', height: 40, borderRadius: 11, fontSize: 13,
              background: 'var(--memox-error-fill)',
              color: '#fff'
            }}>
              <Ic name="trash-2" size={14} color="#fff" />
              Remove account
            </button>
          </div>
        </Section>

      </div>

      <style>{`@keyframes memoxSpin { to { transform: rotate(360deg); } }`}</style>
    </div>);

}

/* ─────── Screen: Learning settings ───────
   Sub-page of Settings. No Save button — every change auto-saves; a small
   "Saved" chip flashes in the app bar to make the behavior visible.

   Variants ('state' prop):
     goalOn       - goal on, reminder off (default)
     goalOff      - goal toggled off, slider locked, streak FROZEN (not reset)
     reminderOn   - goal on, reminder on, permission granted
     permDenied   - reminder toggle requested but OS permission denied
     saving       - autosave chip visible (transient state)
*/
function LearningSettingsScreen({ go, state = 'goalOn' }) {
  const goalEnabled = state !== 'goalOff';
  const reminderOn = state === 'reminderOn' || state === 'permDenied';
  const permDenied = state === 'permDenied';
  const showSaved = state === 'saving';

  // Sample values that match the spec defaults
  const dailyGoal = 20;
  const goalMin = 5,goalMax = 200;
  const goalPct = (dailyGoal - goalMin) / (goalMax - goalMin) * 100;
  const reminderTime = '20:00';

  // ── inline widgets ───────────────────────────────────────────────
  // Single switch — used for every toggle row to keep visual rhythm.
  const Toggle = ({ on, disabled }) =>
  <span
    role="switch"
    aria-checked={on}
    tabIndex={disabled ? -1 : 0}
    aria-disabled={disabled || undefined}
    style={{
      display: 'inline-block', position: 'relative',
      width: 44, height: 26, borderRadius: 999,
      background: on ? 'var(--memox-primary)' : 'var(--memox-surface-container-high)',
      opacity: disabled ? 0.45 : 1,
      flexShrink: 0,
      transition: 'background 180ms cubic-bezier(0.2,0,0,1)'
    }}>
      <span style={{
      position: 'absolute', top: 3, left: on ? 21 : 3,
      width: 20, height: 20, borderRadius: 999,
      background: '#fff',
      boxShadow: '0 1px 3px rgba(0,0,0,0.18)',
      transition: 'left 180ms cubic-bezier(0.2,0,0,1)'
    }} />
    </span>;


  // Section overline + card wrapper — matches the rest of the settings tree.
  const Section = ({ title, children, hint }) =>
  <div style={{ marginBottom: 18 }}>
      <div className="ov" style={{ padding: '0 4px 8px' }}>{title}</div>
      <div className="card" style={{ padding: 0, overflow: 'hidden' }}>{children}</div>
      {hint &&
    <div style={{
      fontSize: 11, color: 'var(--memox-on-surface-variant)',
      padding: '8px 6px 0', lineHeight: 1.5
    }}>{hint}</div>
    }
    </div>;


  // A row inside a section card. `right` is whatever sits at the trailing edge
  // (toggle, value, chevron). `dim` greys out the whole row for disabled state.
  const Row = ({ icon, label, sub, right, dim, last, onTap }) =>
  <div onClick={onTap} style={{
    display: 'grid',
    gridTemplateColumns: icon ? '34px 1fr auto' : '1fr auto',
    gap: 12, alignItems: 'center',
    padding: '13px 14px',
    borderBottom: last ? 'none' : 'var(--memox-border-ghost)',
    opacity: dim ? 0.45 : 1,
    pointerEvents: dim ? 'none' : 'auto'
  }}>
      {icon &&
    <div style={{
      width: 30, height: 30, borderRadius: 9,
      background: 'rgba(82,101,245,0.08)',
      color: 'var(--memox-primary)',
      display: 'flex', alignItems: 'center', justifyContent: 'center'
    }}>
          <Ic name={icon} size={15} color="var(--memox-primary)" />
        </div>
    }
      <div style={{ minWidth: 0 }}>
        <div style={{ fontSize: 14, fontWeight: 600, letterSpacing: '-0.1px' }}>{label}</div>
        {sub &&
      <div style={{
        fontSize: 12, color: 'var(--memox-on-surface-variant)',
        marginTop: 2, lineHeight: 1.45
      }}>{sub}</div>
      }
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>{right}</div>
    </div>;


  return (
    <div className="app">
      <StatusBar />
      <div className="appbar">
        <button className="icon-btn" onClick={() => go('settings')}>
          <Ic name="arrow-left" size={20} />
        </button>
        <div className="title" style={{ fontSize: 16, fontWeight: 700 }}>Learning</div>
        {/* Autosave chip — appears momentarily after every change.
                    Spec: no Save button; this is the affordance that makes
                    persistence visible. */}
        <div style={{
          opacity: showSaved ? 1 : 0,
          transition: 'opacity 200ms ease',
          display: 'inline-flex', alignItems: 'center', gap: 5,
          fontSize: 11, fontWeight: 600,
          color: 'var(--memox-mastery)',
          padding: '4px 9px', borderRadius: 999,
          background: 'rgba(31,138,91,0.10)',
          pointerEvents: 'none'
        }}>
          <Ic name="check" size={11} color="var(--memox-mastery)" />
          Saved
        </div>
      </div>

      <div className="scroll">

        {/* ── 1. Daily goal ───────────────────────────────────── */}
        <Section
          title="Daily goal"
          hint={goalEnabled ?
          null :
          'Goal is off. Your streak is frozen — it won’t reset while paused.'}>
          
          {/* Master toggle */}
          <Row
            label="Set a daily goal"
            sub={goalEnabled ? 'Track how many cards you complete each day.' : 'Pause goal tracking without losing your streak.'}
            right={<Toggle on={goalEnabled} />} />
          

          {/* Slider — locked but still visible when goal off */}
          <div style={{
            padding: '14px 14px 16px',
            borderTop: 'var(--memox-border-ghost)',
            opacity: goalEnabled ? 1 : 0.4,
            pointerEvents: goalEnabled ? 'auto' : 'none'
          }}>
            <div style={{
              display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
              marginBottom: 14
            }}>
              <div className="ov">Cards per day</div>
              <div style={{
                display: 'inline-flex', alignItems: 'baseline', gap: 4,
                fontVariantNumeric: 'tabular-nums'
              }}>
                <span style={{ fontSize: 24, fontWeight: 700, letterSpacing: '-0.5px', color: 'var(--memox-primary)' }}>
                  {dailyGoal}
                </span>
                <span style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)' }}>cards</span>
              </div>
            </div>

            {/* Slider track */}
            <div style={{ position: 'relative', height: 24, marginBottom: 8 }}>
              <div style={{
                position: 'absolute', top: '50%', left: 0, right: 0, height: 6,
                transform: 'translateY(-50%)',
                background: 'var(--memox-surface-container-high)',
                borderRadius: 999
              }} />
              <div style={{
                position: 'absolute', top: '50%', left: 0, height: 6,
                width: `${goalPct}%`,
                transform: 'translateY(-50%)',
                background: 'var(--memox-primary)',
                borderRadius: 999
              }} />
              {/* Thumb */}
              <div style={{
                position: 'absolute', top: '50%', left: `${goalPct}%`,
                transform: 'translate(-50%, -50%)',
                width: 22, height: 22, borderRadius: 999,
                background: '#fff',
                border: '2px solid var(--memox-primary)',
                boxShadow: '0 2px 6px rgba(82,101,245,0.25)'
              }} />
              {/* Tick marks at common steps */}
              {[0, 25, 50, 75, 100].map((p) =>
              <div key={p} style={{
                position: 'absolute', top: '50%', left: `${p}%`,
                transform: 'translate(-50%, -50%)',
                width: 2, height: 2, borderRadius: 999,
                background: p <= goalPct ? 'rgba(255,255,255,0.85)' : 'var(--memox-outline-variant)'
              }} />
              )}
            </div>

            {/* Range labels */}
            <div style={{
              display: 'flex', justifyContent: 'space-between',
              fontSize: 11, color: 'var(--memox-on-surface-variant)',
              fontVariantNumeric: 'tabular-nums',
              padding: '0 2px'
            }}>
              <span>{goalMin}</span>
              <span style={{ opacity: 0.7 }}>50</span>
              <span style={{ opacity: 0.7 }}>100</span>
              <span style={{ opacity: 0.7 }}>150</span>
              <span>{goalMax}</span>
            </div>

            <div style={{
              marginTop: 10, fontSize: 11, color: 'var(--memox-on-surface-variant)',
              display: 'flex', alignItems: 'center', gap: 5
            }}>
              <Ic name="info" size={11} color="var(--memox-on-surface-variant)" />
              <span>Drag to adjust in steps of 5</span>
            </div>
          </div>

          {/* Streak counter sub-toggle */}
          <Row
            icon="flame"
            label="Show streak counter"
            sub="Display your current streak on Home and Stats."
            right={<Toggle on={true} disabled={!goalEnabled} />}
            dim={!goalEnabled}
            last />
          
        </Section>

        {/* ── 2. Reminder ─────────────────────────────────────── */}
        <Section
          title="Reminder"
          hint={!reminderOn && !permDenied ?
          'A gentle nudge once a day. Off by default.' :
          null}>
          
          <Row
            label="Daily reminder"
            sub={reminderOn ? 'Nudge me to study every day.' : 'You decide when to come back.'}
            right={<Toggle on={reminderOn} />} />
          
          <Row
            icon="clock"
            label="Reminder time"
            right={
            <div style={{
              display: 'inline-flex', alignItems: 'center', gap: 6,
              fontSize: 14, fontWeight: 600, fontVariantNumeric: 'tabular-nums',
              color: reminderOn && !permDenied ? 'var(--memox-on-surface)' : 'var(--memox-on-surface-variant)'
            }}>
                {reminderTime}
                <Ic name="chevron-right" size={16} color="var(--memox-on-surface-variant)" />
              </div>
            }
            dim={!reminderOn || permDenied}
            last />
          

          {/* Permission-denied banner — actionable path to OS settings */}
          {permDenied &&
          <div style={{
            borderTop: 'var(--memox-border-ghost)',
            padding: '12px 14px',
            background: 'rgba(217,137,30,0.06)',
            display: 'flex', gap: 10, alignItems: 'flex-start'
          }}>
              <Ic name="bell-off" size={16} color="var(--memox-streak)" />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: '-0.1px' }}>
                  Notifications are blocked
                </div>
                <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)', marginTop: 2, lineHeight: 1.5 }}>
                  Allow MemoX in your phone’s notification settings to receive the reminder.
                </div>
                <button className="pill-btn primary" style={{
                marginTop: 10, height: 34, fontSize: 12, padding: '0 14px', borderRadius: 9
              }}>
                  <Ic name="external-link" size={13} color="#fff" />
                  Open system settings
                </button>
              </div>
            </div>
          }
        </Section>

        {/* ── 3. Tags ─────────────────────────────────────────── */}
        <Section title="Tags">
          <Row
            icon="tag"
            label="Manage tags"
            sub="14 tags across all decks"
            right={<Ic name="chevron-right" size={18} color="var(--memox-on-surface-variant)" />}
            last
            onTap={() => go && go('tags')} />
          
        </Section>

        {/* ── 4. Study defaults (future) ──────────────────────── */}
        <Section
          title="Study defaults"
          hint="Available in a future update.">
          
          {[
          { ic: 'shuffle', label: 'Default shuffle', sub: 'Randomize card order in every session' },
          { ic: 'layers', label: 'Default study mode', sub: 'Review, Match, Guess, Recall, or Fill' },
          { ic: 'eye', label: 'Show example sentence', sub: 'Reveal the example with the meaning' }].
          map((r, i, a) =>
          <Row
            key={r.label}
            icon={r.ic}
            label={r.label}
            sub={r.sub}
            right={
            <span style={{
              height: 22, padding: '0 8px', borderRadius: 999,
              background: 'var(--memox-surface-container)',
              color: 'var(--memox-on-surface-variant)',
              fontSize: 10, fontWeight: 700,
              letterSpacing: 0.4, textTransform: 'uppercase',
              display: 'inline-flex', alignItems: 'center'
            }}>Soon</span>
            }
            dim
            last={i === a.length - 1} />

          )}
        </Section>

        <div style={{
          textAlign: 'center',
          fontSize: 11, color: 'var(--memox-on-surface-variant)',
          padding: '4px 0 16px'
        }}>
          Changes save automatically.
        </div>
      </div>
    </div>);

}

/* ─────── Screen: Audio & Speech settings ───────
   Sub-page of Settings. Per-language TTS configuration with safe preview.

   Variants ('state' prop):
     loaded   - Korean voices loaded, default selection
     loading  - voice list spinner for selected language
     empty    - no voices installed for selected language
     engineErr- TTS engine unavailable
     playing  - preview audio playing (visualizer + Stop)
     english  - English tab active to show independence
     saving   - autosave chip in app bar
*/
function AudioSpeechScreen({ go, state = 'loaded' }) {
  const lang = state === 'english' ? 'en' : 'ko';
  const loading = state === 'loading';
  const empty = state === 'empty';
  const engineErr = state === 'engineErr';
  const playing = state === 'playing';
  const showSaved = state === 'saving';

  // Per-language sample data — Korean and English are independent
  // (selecting a voice in KO does NOT change EN).
  const data = {
    ko: {
      flag: '한',
      label: 'Korean',
      voices: [
      { id: 'sys', name: 'System default', meta: 'Uses your phone’s default Korean voice', sys: true },
      { id: 'k-suji', name: 'Suji', meta: 'Female · neural · offline' },
      { id: 'k-minho', name: 'Minho', meta: 'Male · neural · offline' },
      { id: 'k-eun', name: 'Eunha', meta: 'Female · standard' }],

      selected: 'k-suji',
      sample: '오늘도 한 단어 더 외워봐요.',
      sampleHint: 'Today, let’s remember one more word.',
      rate: 0.5, pitch: 1.0, volume: 0.85
    },
    en: {
      flag: 'EN',
      label: 'English',
      voices: [
      { id: 'sys', name: 'System default', meta: 'Uses your phone’s default English voice', sys: true },
      { id: 'e-emma', name: 'Emma', meta: 'Female · neural · offline' },
      { id: 'e-ryan', name: 'Ryan', meta: 'Male · neural · offline' }],

      selected: 'e-emma',
      sample: 'One word a day keeps forgetting away.',
      sampleHint: null,
      rate: 0.55, pitch: 1.0, volume: 0.9
    }
  }[lang];

  // ── inline widgets ───────────────────────────────────────────────
  const Toggle = ({ on, disabled }) =>
  <span role="switch" aria-checked={on} tabIndex={disabled ? -1 : 0} aria-disabled={disabled || undefined} style={{
    display: 'inline-block', position: 'relative',
    width: 44, height: 26, borderRadius: 999,
    background: on ? 'var(--memox-primary)' : 'var(--memox-surface-container-high)',
    opacity: disabled ? 0.45 : 1,
    flexShrink: 0,
    transition: 'background 180ms cubic-bezier(0.2,0,0,1)'
  }}>
      <span style={{
      position: 'absolute', top: 3, left: on ? 21 : 3,
      width: 20, height: 20, borderRadius: 999,
      background: '#fff',
      boxShadow: '0 1px 3px rgba(0,0,0,0.18)',
      transition: 'left 180ms cubic-bezier(0.2,0,0,1)'
    }} />
    </span>;


  const Section = ({ title, children, hint }) =>
  <div style={{ marginBottom: 18 }}>
      {title && <div className="ov" style={{ padding: '0 4px 8px' }}>{title}</div>}
      {children}
      {hint &&
    <div style={{
      fontSize: 11, color: 'var(--memox-on-surface-variant)',
      padding: '8px 6px 0', lineHeight: 1.5
    }}>{hint}</div>
    }
    </div>;


  // Continuous slider with thumb + caption.
  // min/max define the *displayed* range; the value is clamped per spec.
  const Slider = ({ value, min, max, step, format, label, sublabels }) => {
    const pct = (value - min) / (max - min) * 100;
    return (
      <div style={{ padding: '14px 14px', borderBottom: 'var(--memox-border-ghost)' }}>
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
          marginBottom: 10
        }}>
          <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: '-0.1px' }}>{label}</div>
          <div style={{
            fontSize: 14, fontWeight: 700, fontVariantNumeric: 'tabular-nums',
            color: 'var(--memox-primary)'
          }}>{format(value)}</div>
        </div>
        <div style={{ position: 'relative', height: 22, marginBottom: 6 }}>
          <div style={{
            position: 'absolute', top: '50%', left: 0, right: 0, height: 5,
            transform: 'translateY(-50%)',
            background: 'var(--memox-surface-container-high)',
            borderRadius: 999
          }} />
          <div style={{
            position: 'absolute', top: '50%', left: 0, height: 5,
            width: `${pct}%`,
            transform: 'translateY(-50%)',
            background: 'var(--memox-primary)',
            borderRadius: 999
          }} />
          <div style={{
            position: 'absolute', top: '50%', left: `${pct}%`,
            transform: 'translate(-50%, -50%)',
            width: 20, height: 20, borderRadius: 999,
            background: '#fff',
            border: '2px solid var(--memox-primary)',
            boxShadow: '0 2px 6px rgba(82,101,245,0.22)'
          }} />
        </div>
        <div style={{
          display: 'flex', justifyContent: 'space-between',
          fontSize: 10, color: 'var(--memox-on-surface-variant)',
          fontVariantNumeric: 'tabular-nums',
          padding: '0 2px'
        }}>
          {sublabels.map((s, i) => <span key={i}>{s}</span>)}
        </div>
      </div>);

  };

  // Animated bars while preview plays
  const VoiceBars = () =>
  <div style={{ display: 'inline-flex', alignItems: 'flex-end', gap: 3, height: 14 }}>
      {[0, 1, 2, 3].map((i) =>
    <span key={i} style={{
      display: 'inline-block', width: 3, borderRadius: 2,
      background: '#fff',
      height: 4 + i % 3 * 4,
      animation: `memoxVoiceBar 0.9s ease-in-out ${i * 0.12}s infinite alternate`
    }} />
    )}
    </div>;


  return (
    <div className="app">
      <StatusBar />
      <div className="appbar">
        <button className="icon-btn" onClick={() => go('settings')}>
          <Ic name="arrow-left" size={20} />
        </button>
        <div className="title" style={{ fontSize: 16, fontWeight: 700 }}>Audio & speech</div>
        <div style={{
          opacity: showSaved ? 1 : 0,
          transition: 'opacity 200ms ease',
          display: 'inline-flex', alignItems: 'center', gap: 5,
          fontSize: 11, fontWeight: 600,
          color: 'var(--memox-mastery)',
          padding: '4px 9px', borderRadius: 999,
          background: 'rgba(31,138,91,0.10)',
          pointerEvents: 'none'
        }}>
          <Ic name="check" size={11} color="var(--memox-mastery)" />
          Saved
        </div>
      </div>

      <div className="scroll">

        {/* Engine error — sits above everything when present */}
        {engineErr &&
        <div style={{
          background: 'rgba(220,72,72,0.06)',
          border: '1px solid rgba(220,72,72,0.22)',
          borderRadius: 12,
          padding: '12px 14px',
          display: 'flex', gap: 10, alignItems: 'flex-start',
          marginBottom: 16
        }}>
            <Ic name="alert-circle" size={16} color="var(--memox-error)" />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: '-0.1px' }}>
                Text-to-speech is unavailable
              </div>
              <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)', marginTop: 2, lineHeight: 1.5 }}>
                Install a TTS engine in your phone’s settings to enable voice playback.
              </div>
              <button className="pill-btn primary" style={{
              marginTop: 10, height: 34, fontSize: 12, padding: '0 14px', borderRadius: 9
            }}>
                <Ic name="external-link" size={13} color="#fff" />
                Open system settings
              </button>
            </div>
          </div>
        }

        {/* ── 1. General ──────────────────────────────────────── */}
        <Section title="General">
          <div className="card" style={{ padding: 0, overflow: 'hidden', opacity: engineErr ? 0.5 : 1, pointerEvents: engineErr ? 'none' : 'auto' }}>
            <div style={{
              display: 'grid', gridTemplateColumns: '34px 1fr auto',
              gap: 12, alignItems: 'center', padding: '13px 14px',
              borderBottom: 'var(--memox-border-ghost)'
            }}>
              <div style={{
                width: 30, height: 30, borderRadius: 9,
                background: 'rgba(82,101,245,0.08)',
                color: 'var(--memox-primary)',
                display: 'flex', alignItems: 'center', justifyContent: 'center'
              }}>
                <Ic name="play" size={14} color="var(--memox-primary)" />
              </div>
              <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 600, letterSpacing: '-0.1px' }}>Auto-play on reveal</div>
                <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)', marginTop: 2, lineHeight: 1.45 }}>
                  Speak the front when a new card appears.
                </div>
              </div>
              <Toggle on={false} />
            </div>

            {/* Reserved future row */}
            <div style={{
              display: 'grid', gridTemplateColumns: '34px 1fr auto',
              gap: 12, alignItems: 'center', padding: '13px 14px',
              opacity: 0.5, pointerEvents: 'none'
            }}>
              <div style={{
                width: 30, height: 30, borderRadius: 9,
                background: 'var(--memox-surface-container)',
                color: 'var(--memox-on-surface-variant)',
                display: 'flex', alignItems: 'center', justifyContent: 'center'
              }}>
                <Ic name="award" size={14} color="var(--memox-on-surface-variant)" />
              </div>
              <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 600, letterSpacing: '-0.1px' }}>Play after grading</div>
                <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)', marginTop: 2, lineHeight: 1.45 }}>
                  Replay the term after you rate the card.
                </div>
              </div>
              <span style={{
                height: 22, padding: '0 8px', borderRadius: 999,
                background: 'var(--memox-surface-container)',
                color: 'var(--memox-on-surface-variant)',
                fontSize: 10, fontWeight: 700,
                letterSpacing: 0.4, textTransform: 'uppercase',
                display: 'inline-flex', alignItems: 'center'
              }}>Soon</span>
            </div>
          </div>
        </Section>

        {/* ── 2. Languages (tabs) ─────────────────────────────── */}
        <Section title="Language">
          <div style={{ display: 'flex', gap: 6 }}>
            {[
            { id: 'ko', flag: '한', label: 'Korean' },
            { id: 'en', flag: 'EN', label: 'English' }].
            map((t) => {
              const active = lang === t.id;
              return (
                <button key={t.id} className="pill-btn" style={{
                  flex: 1, height: 40, borderRadius: 12, padding: '0 12px',
                  background: active ? 'var(--memox-primary)' : 'var(--memox-surface-container-lowest)',
                  color: active ? '#fff' : 'var(--memox-on-surface)',
                  border: active ? 'none' : 'var(--memox-border-ghost)',
                  fontSize: 13, fontWeight: 600, gap: 8
                }}>
                  <span style={{
                    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                    width: 24, height: 24, borderRadius: 7,
                    background: active ? 'rgba(255,255,255,0.18)' : 'rgba(82,101,245,0.10)',
                    color: active ? '#fff' : 'var(--memox-primary)',
                    fontSize: 11, fontWeight: 700,
                    letterSpacing: 0.2
                  }}>{t.flag}</span>
                  {t.label}
                </button>);

            })}
          </div>
        </Section>

        {/* ── 3. Voice for selected language ──────────────────── */}
        <Section title={`Voice · ${data.label}`}>
          <div className="card" style={{
            padding: 0, overflow: 'hidden',
            opacity: engineErr ? 0.4 : 1,
            pointerEvents: engineErr ? 'none' : 'auto'
          }}>
            {/* Voice list / states */}
            {empty ?
            <div style={{ padding: '28px 18px', textAlign: 'center' }}>
                <div style={{
                width: 44, height: 44, borderRadius: 12,
                background: 'var(--memox-surface-container)',
                color: 'var(--memox-on-surface-variant)',
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                marginBottom: 12
              }}>
                  <Ic name="mic-off" size={20} color="var(--memox-on-surface-variant)" />
                </div>
                <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>
                  No {data.label} voices installed
                </div>
                <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)', lineHeight: 1.5, padding: '0 12px', marginBottom: 14 }}>
                  Download a {data.label} voice from your phone’s speech settings to enable playback.
                </div>
                <button className="pill-btn primary" style={{
                height: 36, fontSize: 12, padding: '0 16px', borderRadius: 10
              }}>
                  <Ic name="external-link" size={13} color="#fff" />
                  Open system speech
                </button>
              </div> :
            loading ?
            <div style={{ padding: '8px 0' }}>
                {[0, 1, 2, 3].map((i) =>
              <div key={i} style={{
                display: 'grid', gridTemplateColumns: '22px 1fr 30px',
                gap: 12, alignItems: 'center', padding: '13px 14px',
                borderBottom: i < 3 ? 'var(--memox-border-ghost)' : 'none'
              }}>
                    <span style={{
                  width: 18, height: 18, borderRadius: 999,
                  background: 'var(--memox-surface-container-high)',
                  opacity: 0.6, animation: 'memoxSkelPulse 1.4s ease-in-out infinite'
                }} />
                    <div>
                      <span style={{
                    display: 'inline-block', height: 11, width: i === 0 ? 120 : 90 + i * 10,
                    borderRadius: 6, background: 'var(--memox-surface-container-high)',
                    opacity: 0.6, animation: 'memoxSkelPulse 1.4s ease-in-out infinite'
                  }} />
                      <span style={{
                    display: 'block', height: 9, width: 60 + i * 20,
                    borderRadius: 6, background: 'var(--memox-surface-container-high)',
                    opacity: 0.4, marginTop: 6,
                    animation: 'memoxSkelPulse 1.4s ease-in-out infinite'
                  }} />
                    </div>
                    <span />
                  </div>
              )}
              </div> :

            data.voices.map((v, i, a) => {
              const sel = v.id === data.selected;
              return (
                <div key={v.id} style={{
                  display: 'grid', gridTemplateColumns: '22px 1fr 32px',
                  gap: 12, alignItems: 'center', padding: '12px 14px',
                  borderBottom: i < a.length - 1 ? 'var(--memox-border-ghost)' : 'none',
                  background: sel ? 'rgba(82,101,245,0.04)' : 'transparent'
                }}>
                    {/* Radio */}
                    <span style={{
                    width: 18, height: 18, borderRadius: 999,
                    border: sel ? '5px solid var(--memox-primary)' : '2px solid var(--memox-outline-variant)',
                    background: sel ? '#fff' : 'transparent',
                    boxSizing: 'border-box'
                  }} />
                    <div style={{ minWidth: 0 }}>
                      <div style={{
                      fontSize: 14, fontWeight: sel ? 700 : 600,
                      letterSpacing: '-0.1px',
                      display: 'inline-flex', alignItems: 'center', gap: 6
                    }}>
                        {v.name}
                        {v.sys &&
                      <span style={{
                        height: 18, padding: '0 6px', borderRadius: 999,
                        background: 'rgba(82,101,245,0.10)',
                        color: 'var(--memox-primary)',
                        fontSize: 9, fontWeight: 700,
                        letterSpacing: 0.4, textTransform: 'uppercase',
                        display: 'inline-flex', alignItems: 'center'
                      }}>Default</span>
                      }
                      </div>
                      <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 2, lineHeight: 1.4 }}>
                        {v.meta}
                      </div>
                    </div>
                    <button className="icon-btn" title={`Preview ${v.name}`} style={{ width: 30, height: 30 }}>
                      <Ic name="volume-2" size={14} color={sel ? 'var(--memox-primary)' : 'var(--memox-on-surface-variant)'} />
                    </button>
                  </div>);

            })
            }

            {/* Sliders — only when we have voices */}
            {!empty && !loading &&
            <>
                <Slider
                label="Speech rate"
                value={data.rate}
                min={0.3} max={0.7} step={0.05}
                format={(v) => `${v.toFixed(2)}×`}
                sublabels={['0.3×', 'Default', '0.7×']} />
              
                <Slider
                label="Pitch"
                value={data.pitch}
                min={0.7} max={1.5} step={0.05}
                format={(v) => v.toFixed(2)}
                sublabels={['0.70', '1.00', '1.50']} />
              
                <Slider
                label="Volume"
                value={data.volume}
                min={0.0} max={1.0} step={0.05}
                format={(v) => `${Math.round(v * 100)}%`}
                sublabels={['0%', '50%', '100%']} />
              

                {/* Reset row */}
                <div style={{
                padding: '12px 14px',
                display: 'flex', justifyContent: 'space-between', alignItems: 'center'
              }}>
                  <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)' }}>
                    Reset {data.label} voice settings
                  </div>
                  <button className="pill-btn outline" style={{
                  height: 32, fontSize: 12, padding: '0 12px', borderRadius: 9
                }}>
                    <Ic name="rotate-ccw" size={13} color="var(--memox-primary)" />
                    Reset
                  </button>
                </div>
              </>
            }
          </div>
        </Section>

        {/* ── 4. Preview ──────────────────────────────────────── */}
        {!empty && !loading &&
        <Section title="Preview" hint="A short safe phrase. Only the front of cards is spoken.">
            <div className="card" style={{
            padding: '16px',
            opacity: engineErr ? 0.4 : 1,
            pointerEvents: engineErr ? 'none' : 'auto'
          }}>
              <div style={{
              fontSize: 17, fontWeight: 600, letterSpacing: '-0.2px',
              lineHeight: 1.4, marginBottom: data.sampleHint ? 6 : 14
            }}>
                {data.sample}
              </div>
              {data.sampleHint &&
            <div style={{
              fontSize: 12, color: 'var(--memox-on-surface-variant)',
              fontStyle: 'italic', marginBottom: 14, lineHeight: 1.4
            }}>
                  {data.sampleHint}
                </div>
            }
              <button className="pill-btn primary" style={{
              width: '100%', height: 40, borderRadius: 11,
              background: playing ? 'var(--memox-mastery)' : 'var(--memox-primary)',
              gap: 10
            }}>
                {playing ?
              <>
                    <VoiceBars />
                    Playing… tap to stop
                  </> :

              <>
                    <Ic name="play" size={15} color="#fff" />
                    Preview voice
                  </>
              }
              </button>
            </div>
          </Section>
        }

        {/* ── 5. Unsupported languages explainer ──────────────── */}
        <Section title="About supported languages">
          <div style={{
            padding: '12px 14px',
            background: 'rgba(82,101,245,0.05)',
            border: '1px solid rgba(82,101,245,0.16)',
            borderRadius: 12,
            display: 'flex', gap: 10, alignItems: 'flex-start'
          }}>
            <Ic name="info" size={16} color="var(--memox-primary)" />
            <div style={{ flex: 1, fontSize: 12, color: 'var(--memox-on-surface)', lineHeight: 1.55 }}>
              MemoX currently speaks <strong style={{ fontWeight: 700 }}>Korean</strong> and <strong style={{ fontWeight: 700 }}>English</strong>. Other-language cards stay silent and never read the back.
            </div>
          </div>
        </Section>

        <div style={{
          textAlign: 'center',
          fontSize: 11, color: 'var(--memox-on-surface-variant)',
          padding: '4px 0 16px'
        }}>
          Changes save automatically.
        </div>
      </div>

      <style>{`
        @keyframes memoxVoiceBar { from { transform: scaleY(0.4); } to { transform: scaleY(1.4); } }
      `}</style>
    </div>);

}

/* ─────── Screen: Tag management ───────
   Sub-page of Settings → Learning. Inspect, search, sort, rename, merge,
   delete tags. Tags are global and case-insensitive; deleting a tag
   never deletes the cards under it.

   Variants ('state' prop):
     loaded       - normal list (default)
     loading      - skeleton list
     empty        - no tags at all
     searchEmpty  - search query has no matches
     sheet        - tag action sheet open
     rename       - rename dialog open
     renameMerge  - rename dialog with conflict warning ("will merge")
     merge        - merge sheet open with target picker
     del          - delete confirmation dialog
     busy         - operation in progress on a tag row
     opError      - transaction failure toast
*/
function TagManagementScreen({ go, state = 'loaded' }) {

  const isOverlay = ['sheet', 'rename', 'renameMerge', 'merge', 'del'].includes(state);
  const searchActive = state === 'searchEmpty';

  // Mock tag data — varied counts so the layout shows realistic widths
  const tags = [
  { name: 'TOPIK II', count: 142, hot: true },
  { name: 'noun', count: 88 },
  { name: 'verb', count: 71 },
  { name: 'people', count: 46 },
  { name: 'food', count: 34 },
  { name: 'adjective', count: 28 },
  { name: 'business', count: 22, busy: state === 'busy' },
  { name: 'travel', count: 18 },
  { name: 'idioms', count: 11 },
  { name: 'numbers', count: 6 },
  { name: 'archive 2023', count: 3 }];


  const totalTags = 14;
  const selectedTag = { name: 'people', count: 46 };

  // ── inline widgets ───────────────────────────────────────────────
  const Section = ({ title, children }) =>
  <div style={{ marginBottom: 16 }}>
      {title && <div className="ov" style={{ padding: '0 4px 8px' }}>{title}</div>}
      {children}
    </div>;


  // Sheet/dialog scrim — softens the underlying screen
  const Scrim = ({ onTap }) =>
  <div onClick={onTap} style={{
    position: 'absolute', inset: 0,
    background: 'rgba(25,28,30,0.45)',
    zIndex: 50,
    animation: 'memoxScrimIn 220ms ease'
  }} />;


  // Generic bottom sheet container with handle. Uses surface-container-high
  // so the sheet has clear elevation contrast against the page in dark mode.
  const Sheet = ({ children }) =>
  <div style={{
    position: 'absolute', left: 0, right: 0, bottom: 0,
    background: 'var(--memox-surface-container-high)',
    color: 'var(--memox-on-surface)',
    borderTopLeftRadius: 20, borderTopRightRadius: 20,
    zIndex: 51,
    animation: 'memoxSheetIn 260ms cubic-bezier(0.2,0,0,1)',
    boxShadow: '0 -10px 30px rgba(0,0,0,0.32)',
    maxHeight: '85%',
    overflow: 'hidden',
    display: 'flex', flexDirection: 'column'
  }}>
      <div style={{ display: 'flex', justifyContent: 'center', padding: '8px 0 4px' }}>
        <span style={{ width: 36, height: 4, borderRadius: 999, background: 'var(--memox-outline-variant)' }} />
      </div>
      {children}
    </div>;


  // Centered modal dialog
  const Dialog = ({ children }) =>
  <div style={{
    position: 'absolute', inset: 0,
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    padding: '24px 18px',
    zIndex: 51,
    pointerEvents: 'none'
  }}>
      <div style={{
      width: '100%', maxWidth: 340,
      background: 'var(--memox-surface)',
      borderRadius: 18,
      boxShadow: '0 16px 40px rgba(25,28,30,0.22)',
      animation: 'memoxDialogIn 200ms cubic-bezier(0.2,0,0,1)',
      pointerEvents: 'auto',
      overflow: 'hidden'
    }}>
        {children}
      </div>
    </div>;


  // Tag chip used inside dialogs/sheets to refer to a tag concretely
  const TagPill = ({ name, count, tone = 'indigo' }) => {
    const tones = {
      indigo: { bg: 'rgba(82,101,245,0.10)', col: 'var(--memox-primary)' },
      neutral: { bg: 'var(--memox-surface-container)', col: 'var(--memox-on-surface)' },
      red: { bg: 'rgba(220,72,72,0.10)', col: 'var(--memox-error)' }
    }[tone];
    return (
      <span style={{
        display: 'inline-flex', alignItems: 'center', gap: 6,
        height: 26, padding: '0 10px',
        background: tones.bg, color: tones.col,
        borderRadius: 999,
        fontSize: 12, fontWeight: 600
      }}>
        <Ic name="tag" size={11} color={tones.col} />
        {name}
        {count != null &&
        <span style={{
          fontSize: 10, fontWeight: 700, opacity: 0.7,
          fontVariantNumeric: 'tabular-nums'
        }}>· {count}</span>
        }
      </span>);

  };

  // Single tag list row
  const TagRow = ({ tag, last, dim }) =>
  <div style={{
    display: 'grid',
    gridTemplateColumns: '32px 1fr auto auto',
    gap: 12, alignItems: 'center',
    padding: '12px 14px',
    borderBottom: last ? 'none' : 'var(--memox-border-ghost)',
    opacity: dim ? 0.5 : 1
  }}>
      <div style={{
      width: 28, height: 28, borderRadius: 8,
      background: 'rgba(82,101,245,0.08)',
      color: 'var(--memox-primary)',
      display: 'flex', alignItems: 'center', justifyContent: 'center'
    }}>
        <Ic name="tag" size={13} color="var(--memox-primary)" />
      </div>
      <div style={{ minWidth: 0 }}>
        <div style={{ fontSize: 14, fontWeight: 600, letterSpacing: '-0.1px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
          {tag.name}
        </div>
        <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 1, fontVariantNumeric: 'tabular-nums' }}>
          {tag.count} card{tag.count === 1 ? '' : 's'}
        </div>
      </div>

      width: 14, height: 14, borderRadius: 999,
      border: '2px solid var(--memox-primary)',
      borderTopColor: 'transparent',

      </div>

      <div className="scroll">

        {/* Search input — sticky-feel field, calm */}

          display: 'flex', alignItems: 'center', gap: 10,
          height: 44, padding: '0 14px',
          background: 'var(--memox-surface-container-lowest)',
          border: 'var(--memox-border-ghost)',

          marginBottom: 14
        }}>
          <Ic name="search" size={16} color="var(--memox-on-surface-variant)" />
          <span style={{
            flex: 1, fontSize: 14,
            color: searchActive ? 'var(--memox-on-surface)' : 'var(--memox-on-surface-variant)',
            opacity: searchActive ? 1 : 0.7,
            whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'
          }}>
            {searchActive ? 'phras' : 'Search tags'}
          </span>
          {searchActive &&
          <button className="icon-btn" style={{ width: 26, height: 26 }} title="Clear">
              <Ic name="x" size={14} color="var(--memox-on-surface-variant)" />
            </button>
          }
        </div>

        {/* Count + sort row */}
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          padding: '0 4px 10px'
        }}>
          <span className="ov">
            {state === 'empty' ? 'No tags' :
            searchActive ? 'No matches' :
            `${totalTags} tags`}
          </span>
          <button className="pill-btn" style={{
            height: 30, padding: '0 12px', borderRadius: 999, fontSize: 12, gap: 6,
            background: 'var(--memox-surface-container-lowest)',
            border: 'var(--memox-border-ghost)',
            color: 'var(--memox-on-surface)'

            <Ic name="arrow-down-up" size={12} color="var(--memox-on-surface-variant)" />

        </div>

        {/* Body — empty, search-empty, loading, or list */}

            width: 56, height: 56, borderRadius: 16,
            background: 'rgba(82,101,245,0.10)',

      {/* Transaction failure toast */}

      <div style={{

        borderRadius: 12,
        padding: '12px 14px',
        display: 'flex', gap: 10, alignItems: 'flex-start',

      {/* ───── Overlays ─────────────────────────────────────── */}

      {/* Tag action sheet */}

          <div style={{ padding: '6px 8px 14px' }}>
            {[
          { ic: 'play', label: 'Study cards with this tag', sub: `Start a session with the ${selectedTag.count} cards` },
          { ic: 'list', label: 'View cards with this tag', sub: 'Open the global tag-filtered list' },
          { ic: 'pencil', label: 'Rename tag', sub: null },
          { ic: 'git-merge', label: 'Merge into another tag', sub: null }].
          map((a, i) =>
          <button key={a.label} style={{
            width: '100%', display: 'grid',
            gridTemplateColumns: '32px 1fr auto', gap: 12,
            alignItems: 'center', padding: '12px 10px',
            background: 'transparent', border: 'none',
            color: 'var(--memox-on-surface)',
            borderRadius: 10, fontFamily: 'inherit', cursor: 'pointer',
            textAlign: 'left'
          }}>
                <div style={{
              width: 30, height: 30, borderRadius: 9,
              background: 'rgba(82,101,245,0.08)',
              display: 'flex', alignItems: 'center', justifyContent: 'center'
            }}>
                  <Ic name={a.ic} size={14} color="var(--memox-primary)" />
                </div>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 600, letterSpacing: '-0.1px' }}>{a.label}</div>
                  {a.sub && <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 2 }}>{a.sub}</div>}
                </div>
                <Ic name="chevron-right" size={16} color="var(--memox-on-surface-variant)" />
              </button>
          )}

            {/* Destructive — visually separated */}
            <div style={{ height: 1, background: 'var(--memox-outline-variant)', margin: '8px 10px' }} />
            <button style={{
            width: '100%', display: 'grid',
            gridTemplateColumns: '32px 1fr', gap: 12,
            alignItems: 'center', padding: '12px 10px',
            background: 'transparent', border: 'none',
            color: 'var(--memox-on-surface)',
            borderRadius: 10, fontFamily: 'inherit', cursor: 'pointer',
            textAlign: 'left'
          }}>
              <div style={{
              width: 30, height: 30, borderRadius: 9,
              background: 'rgba(220,72,72,0.10)',
              display: 'flex', alignItems: 'center', justifyContent: 'center'
            }}>
                <Ic name="trash-2" size={14} color="var(--memox-error)" />
              </div>
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--memox-error)', letterSpacing: '-0.1px' }}>
                  Delete tag
                </div>
                <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 2 }}>
                  Keeps all {selectedTag.count} cards
                </div>
              </div>
            </button>

      }

      {(state === 'rename' || state === 'renameMerge') &&
      <Dialog>
          <div style={{ padding: '18px 18px 6px' }}>
            <div style={{ fontSize: 16, fontWeight: 700, letterSpacing: '-0.2px', marginBottom: 4 }}>
              Rename tag
            </div>
            <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)', lineHeight: 1.5 }}>
              Renaming updates every card that uses <strong style={{ color: 'var(--memox-on-surface)', fontWeight: 700 }}>{selectedTag.name}</strong>.
            </div>
          </div>

          {/* Input */}
          <div style={{ padding: '12px 18px 4px' }}>
            <div className="ov" style={{ marginBottom: 6 }}>New name</div>
            <div style={{
            height: 44, padding: '0 12px',
            background: 'var(--memox-surface-container-lowest)',
            border: state === 'renameMerge' ?
            '1px solid var(--memox-streak)' :
            '1px solid var(--memox-primary)',
            borderRadius: 11,
            display: 'flex', alignItems: 'center', gap: 8,
            fontSize: 14, fontWeight: 600,
            color: 'var(--memox-on-surface)',
            fontVariantNumeric: 'tabular-nums'
          }}>
              <span>{state === 'renameMerge' ? 'noun' : 'humans'}</span>
              <span style={{
              display: 'inline-block', width: 2, height: 18,
              background: 'var(--memox-primary)',
              animation: 'memoxBlink 1s infinite'
            }} />
            </div>
            <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 6, padding: '0 2px' }}>
              Tag names are case-insensitive.
            </div>
          </div>

          {/* Conflict warning — explicit, no silent merge */}
          {state === 'renameMerge' &&
        <div style={{ padding: '8px 18px 0' }}>
              <div style={{
            background: 'rgba(217,137,30,0.08)',
            border: '1px solid rgba(217,137,30,0.22)',
            borderRadius: 12,
            padding: '12px 12px'
          }}>
                <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start', marginBottom: 10 }}>
                  <Ic name="git-merge" size={15} color="var(--memox-streak)" />
                  <div style={{ flex: 1, fontSize: 12, lineHeight: 1.5, color: 'var(--memox-on-surface)' }}>
                    A tag called <strong style={{ fontWeight: 700 }}>noun</strong> already exists. Continuing will <strong style={{ fontWeight: 700 }}>merge</strong> these two tags.
                  </div>
                </div>
                <div style={{
              display: 'flex', alignItems: 'center', gap: 8,
              padding: '8px 10px', borderRadius: 10,
              background: 'rgba(255,255,255,0.5)',
              flexWrap: 'wrap'
            }}>
                  <TagPill name="people" count={46} tone="neutral" />
                  <Ic name="arrow-right" size={14} color="var(--memox-on-surface-variant)" />
                  <TagPill name="noun" count={88 + 46} />
                </div>
                <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 8, lineHeight: 1.5 }}>
                  No cards are deleted. The combined tag will hold all 134 cards.
                </div>
              </div>
            </div>
        }

          {/* Footer buttons */}
          <div style={{ padding: '14px 14px 14px', display: 'flex', gap: 8 }}>
            <button className="pill-btn outline" style={{ flex: 1, height: 40, borderRadius: 11, fontSize: 13 }}>

            </button>
            <button className="pill-btn primary" style={{
            flex: 1.4, height: 40, borderRadius: 11, fontSize: 13,
            background: state === 'renameMerge' ? 'var(--memox-streak)' : 'var(--memox-primary)'

              {state === 'renameMerge' ?
            <>
                  <Ic name="git-merge" size={14} color="#fff" />
                  Merge tags
                </> :
            'Rename'}
            </button>
          </div>
        </Dialog>
      }

      {/* Merge sheet — pick target tag */}
      {state === 'merge' &&
      <Sheet>
          <div style={{ padding: '4px 18px 12px' }}>
            <div style={{ fontSize: 16, fontWeight: 700, letterSpacing: '-0.2px', marginBottom: 4 }}>
              Merge "{selectedTag.name}" into…
            </div>
            <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)', lineHeight: 1.5 }}>
              Cards under <strong style={{ color: 'var(--memox-on-surface)', fontWeight: 700 }}>{selectedTag.name}</strong> will move to the tag you pick. No cards are deleted.
            </div>
          </div>

          {/* Search inside sheet */}
          <div style={{ padding: '0 18px 10px' }}>
            <div style={{
            display: 'flex', alignItems: 'center', gap: 10,
            height: 40, padding: '0 12px',
            background: 'var(--memox-surface-container-lowest)',
            border: 'var(--memox-border-ghost)',
            borderRadius: 10
          }}>
              <Ic name="search" size={14} color="var(--memox-on-surface-variant)" />
              <span style={{ fontSize: 13, color: 'var(--memox-on-surface-variant)', opacity: 0.7 }}>
                Search tags
              </span>
            </div>
          </div>

          <div className="hide-scroll" style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', padding: '0 8px 14px' }}>
            {[
          { name: 'noun', count: 88, sel: true },
          { name: 'verb', count: 71 },
          { name: 'food', count: 34 },
          { name: 'business', count: 22 }].
          map((t) =>
          <button key={t.name} style={{
            width: '100%', display: 'grid',
            gridTemplateColumns: '22px 1fr auto', gap: 12,
            alignItems: 'center', padding: '12px 10px',
            background: t.sel ? 'rgba(82,101,245,0.06)' : 'transparent',
            border: 'none', borderRadius: 10,
            color: 'var(--memox-on-surface)',
            fontFamily: 'inherit', textAlign: 'left', cursor: 'pointer'
          }}>
                <span style={{
              width: 18, height: 18, borderRadius: 999,
              border: t.sel ? '5px solid var(--memox-primary)' : '2px solid var(--memox-outline-variant)',
              background: t.sel ? '#fff' : 'transparent',
              boxSizing: 'border-box'
            }} />
                <div>
                  <div style={{ fontSize: 14, fontWeight: t.sel ? 700 : 600 }}>{t.name}</div>
                  <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 1 }}>{t.count} cards</div>
                </div>
                <Ic name="tag" size={14} color="var(--memox-on-surface-variant)" />
              </button>
          )}
          </div>

          {/* Result preview */}
          <div style={{ padding: '0 18px 12px' }}>
            <div style={{
            padding: '10px 12px',
            background: 'rgba(82,101,245,0.06)',
            border: '1px solid rgba(82,101,245,0.16)',
            borderRadius: 11,
            display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap'
          }}>
              <TagPill name={selectedTag.name} count={selectedTag.count} tone="neutral" />
              <Ic name="arrow-right" size={14} color="var(--memox-on-surface-variant)" />
              <TagPill name="noun" count={88 + selectedTag.count} />
            </div>
          </div>

          <div style={{ padding: '0 14px 16px', display: 'flex', gap: 8 }}>
            <button className="pill-btn outline" style={{ flex: 1, height: 40, borderRadius: 11, fontSize: 13 }}>
              Cancel
            </button>
            <button className="pill-btn primary" style={{ flex: 1.4, height: 40, borderRadius: 11, fontSize: 13 }}>
              <Ic name="git-merge" size={14} color="#fff" />
              Merge {selectedTag.count} cards
            </button>
          </div>
        </Sheet>
      }

      {/* Delete confirmation — tag-only, NOT card deletion */}
      {state === 'del' &&
      <Dialog>
          <div style={{ padding: '18px 18px 4px', textAlign: 'center' }}>
            <div style={{
            width: 48, height: 48, borderRadius: 14,
            background: 'rgba(220,72,72,0.10)',
            color: 'var(--memox-error)',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            marginBottom: 12
          }}>
              <Ic name="tag" size={22} color="var(--memox-error)" />
            </div>
            <div style={{ fontSize: 17, fontWeight: 700, letterSpacing: '-0.2px', marginBottom: 6 }}>
              Delete this tag?
            </div>
            <div style={{ fontSize: 13, color: 'var(--memox-on-surface-variant)', lineHeight: 1.55, padding: '0 6px' }}>
              The tag <strong style={{ color: 'var(--memox-on-surface)', fontWeight: 700 }}>{selectedTag.name}</strong> will be removed from {selectedTag.count} cards.
            </div>
          </div>

          {/* Reassurance pill — emphasises cards survive */}
          <div style={{ padding: '14px 18px 4px' }}>
            <div style={{
            padding: '10px 12px',
            background: 'rgba(31,138,91,0.08)',
            border: '1px solid rgba(31,138,91,0.20)',
            borderRadius: 11,
            display: 'flex', gap: 8, alignItems: 'center'
          }}>
              <Ic name="shield-check" size={15} color="var(--memox-mastery)" />
              <div style={{ flex: 1, fontSize: 12, color: 'var(--memox-on-surface)', lineHeight: 1.5 }}>
                Your <strong style={{ fontWeight: 700 }}>{selectedTag.count} cards are kept</strong>. Only the tag label is removed.
              </div>
            </div>
          </div>

          <div style={{ padding: '14px 14px 14px', display: 'flex', gap: 8 }}>
            <button className="pill-btn outline" style={{ flex: 1, height: 40, borderRadius: 11, fontSize: 13 }}>
              Cancel
            </button>
            <button className="pill-btn" style={{
            flex: 1.2, height: 40, borderRadius: 11, fontSize: 13,
            background: 'var(--memox-error-fill)', color: '#fff', border: 'none', fontWeight: 600,
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6
          }}>
              <Ic name="trash-2" size={14} color="#fff" />
              Delete tag
            </button>
          </div>
        </Dialog>
      }

      <style>{`
        @keyframes memoxScrimIn  { from { opacity: 0; } to { opacity: 1; } }
        @keyframes memoxSheetIn  { from { transform: translateY(20%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes memoxDialogIn { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes memoxBlink    { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }
        @keyframes memoxSpin     { to { transform: rotate(360deg); } }
      `}</style>
    </div>);

}

   The top-level content browser. Shows ROOT FOLDERS only — never decks
   or cards directly (those live in folder detail).

   Variants ('state' prop):
     loaded   - normal list of root folders (default)
     loading  - skeleton folder rows
     empty    - first-time user, no folders yet
     error    - load failed, retry CTA
     search   - search bar focused, empty query
     overflow - folder long-press / kebab opens action sheet
*/

    sub: 'Genki · kana · kanji'
  },
  {
    name: 'Mandarin',

    sub: 'Sino-Korean character roots'
  }];


  // ── inline widgets ───────────────────────────────────────────────
  const Scrim = () =>
  <div style={{
    position: 'absolute', inset: 0,
    background: 'rgba(25,28,30,0.45)',
    zIndex: 50,
    animation: 'memoxScrimIn 220ms ease'
  }} />;


  // Folder card — used for populated rows. Compact: icon tile, name+sub,
  // 2-line counts row, slim mastery bar.
  const FolderCard = ({ f }) =>
  <div className="card" style={{
    marginBottom: 10,
    display: 'grid', gridTemplateColumns: '48px 1fr 24px',
    gap: 14, alignItems: 'center',
    padding: '14px 14px',
    cursor: 'pointer'
  }}>
      <div style={{
      width: 44, height: 44, borderRadius: 12,
      background: `${f.seed}1F`,

      display: 'flex', alignItems: 'center', justifyContent: 'center'
    }}>
        <Ic name={f.ic} size={20} color={f.seed} />

                      background: 'var(--memox-primary)',

              width: '100%', height: 40, borderRadius: 12, fontSize: 14

        state === 'loading' ?

        mode === 'unlocked' ?

        <div style={{ marginTop: 6 }}>
            <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 8,
            padding: '6px 14px 6px 10px',
            background: 'rgba(82,101,245,0.08)',

            <div style={{ display: 'flex', gap: 10, marginBottom: 14 }}>

                <Ic name="layers" size={18} color="#fff" />
                <span>New deck</span>
              </button>
              <button className="pill-btn" style={{
              flex: 1, height: 44, borderRadius: 13, fontSize: 13, gap: 7,
              background: 'rgba(82,101,245,0.10)',
              color: 'var(--memox-primary)',
              border: 'none',
              flexDirection: 'column', padding: '8px 0', justifyContent: 'center',
              lineHeight: 1.1
            }}>
                <Ic name="folder-plus" size={18} color="var(--memox-primary)" />

              </button>
            </div>
            <div style={{
            padding: '10px 12px',
            background: 'var(--memox-surface-container-lowest)',
            borderRadius: 10, border: 'var(--memox-border-ghost)',
            fontSize: 11, color: 'var(--memox-on-surface-variant)',

            display: 'flex', gap: 8, alignItems: 'flex-start'
          }}>
              <Ic name="info" size={13} color="var(--memox-on-surface-variant)" />

            </div>
          </div> :

        mode === 'subfolders' ?
        subfolders.map((f) => <SubfolderRow key={f.name} f={f} />) :

        decks.map((d) => <DeckRow key={d.n} d={d} />)
        }
      </div>

      {/* Mode-aware FAB.
                  - subfolders mode: New subfolder (primary)
                  - decks mode:      New card (primary; Start study lives in the summary card)
                  - unlocked:        no FAB (dual CTA above does the job)
                  - error/loading/overlays: no FAB
               */}
      {!isOverlay && state !== 'error' && state !== 'loading' && state !== 'searchEmpty' && mode !== 'unlocked' &&
      <button style={{
        position: 'absolute', bottom: 24, right: 16,
        height: 52, padding: '0 18px 0 16px',
        borderRadius: 16,
        background: 'var(--memox-primary)', color: '#fff',

        display: 'inline-flex', alignItems: 'center', gap: 8,

          <Ic name={mode === 'subfolders' ? 'folder-plus' : 'plus'} size={18} color="#fff" />
