            <div style={{ display: 'flex', gap: 10 }}>
                  {[
              { l: 'Current', v: '11 days', ic: 'flame', c: 'var(--memox-streak)' },
              { l: 'Longest', v: '42 days', ic: 'award', c: 'var(--memox-primary)' }].
              map((s) =>
              <div key={s.l} style={{
                flex: 1, padding: '12px',
                background: 'var(--memox-surface-container-lowest)',
                border: 'var(--memox-border-ghost)',
                borderRadius: 11,
                display: 'flex', alignItems: 'center', gap: 10
              }}>
                      <div style={{
                  width: 32, height: 32, borderRadius: 9,
                  background: `${s.c}1F`, color: s.c,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  flexShrink: 0
                }}>
                        <Ic name={s.ic} size={15} color={s.c} />
                      </div>
                      <div style={{ minWidth: 0 }}>
                        <div style={{ fontSize: 10, color: 'var(--memox-on-surface-variant)', letterSpacing: 0.3, textTransform: 'uppercase', fontWeight: 700 }}>{s.l}</div>
                        <div style={{ fontSize: 14, fontWeight: 700, marginTop: 1, fontVariantNumeric: 'tabular-nums' }}>{s.v}</div>
                      </div>
                    </div>
              )}
                </div>
            }
            </Card>

            {/* 5. Suspended + buried — list rows, tap to filtered library */}
            <div className="ov" style={{ padding: '2px 4px 8px' }}>Card states</div>
            <div className="card" style={{ padding: 0, overflow: 'hidden', marginBottom: 14 }}>
              {[
            {
              ic: 'pause-circle',
              c: 'var(--memox-on-surface-variant)',
              label: 'Suspended',
              sub: 'Out of rotation until you resume them',
              count: allEmpty ? 0 : 8,
              scope: 'in your library'
            },
            {
              ic: 'moon',
              c: 'var(--memox-on-surface-variant)',
              label: 'Buried today',
              sub: 'Skipped until tomorrow',
              count: allEmpty ? 0 : 4,
              scope: 'today only'
            }].
            map((r, i, a) =>
            <div key={r.label} style={{
              display: 'grid', gridTemplateColumns: '32px 1fr auto auto',
              gap: 12, alignItems: 'center', padding: '12px 14px',
              borderBottom: i < a.length - 1 ? 'var(--memox-border-ghost)' : 'none',
              cursor: 'pointer'
            }}>
                  <div style={{
                width: 30, height: 30, borderRadius: 9,
                background: 'var(--memox-surface-container)', color: r.c,
                display: 'flex', alignItems: 'center', justifyContent: 'center'
              }}>
                    <Ic name={r.ic} size={14} color={r.c} />
                  </div>
                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: '-0.1px' }}>{r.label}</div>
                    <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 1, lineHeight: 1.4 }}>{r.sub}</div>
                  </div>
                  <div style={{ textAlign: 'right' }}>
                    <div style={{ fontSize: 15, fontWeight: 700, fontVariantNumeric: 'tabular-nums' }}>{r.count}</div>
                    <div style={{ fontSize: 10, color: 'var(--memox-on-surface-variant)', marginTop: 1 }}>{r.scope}</div>
                  </div>
                  <Ic name="chevron-right" size={15} color="var(--memox-on-surface-variant)" />
                </div>
            )}
            </div>

            <div style={{
            textAlign: 'center',
            fontSize: 11, color: 'var(--memox-on-surface-variant)',
            padding: '4px 0 12px'
          }}>
              Read-only summary · {range === 'week' ? 'last 7 days' : range === 'month' ? 'last 28 days' : 'all time'}
            </div>
          </>
        }
      </div>

      <BottomNav active="stats" onChange={go} />

      <style>{`@keyframes memoxSkelPulse { 0%, 100% { opacity:0.45; } 50% { opacity:0.75; } }`}</style>
    </div>);

}

/* ─────── Screen: Study result ───────
   End-of-session summary. Calm celebration, scannable stats, clear Done.
   Spec: Done is ALWAYS available. Even if finalization retry fails the
   user can leave; only the "save my history" action retries.

   Variants ('state' prop):
     loaded     - normal result (default)
     loading    - skeletons
     goalOff    - goal disabled → hide streak/goal block
     finFailed  - finalization save failed (banner; Done still works)
     defensive  - session ended with no graded answers
     toughEmpty - no tough cards from this session
*/
function StudyResultScreen({ go, state = 'loaded' }) {
  const loading = state === 'loading';
  const goalOff = state === 'goalOff';
  const finFailed = state === 'finFailed';
  const defensive = state === 'defensive';
  const toughEmpty = state === 'toughEmpty';

  // Sample data
  const result = defensive ? {
    reviewed: 0, durationS: 12,
    correct: 0, recovered: 0, forgot: 0, accuracy: 0,
    boxesUp: 0, boxesHeld: 0, boxesDown: 0,
    tough: 0
  } : {
    reviewed: 20, durationS: 14 * 60 + 8,
    correct: 14, recovered: 4, forgot: 2, accuracy: 0.78,
    boxesUp: 14, boxesHeld: 3, boxesDown: 3,
    tough: toughEmpty ? 0 : 3
  };
  const fmtDur = (s) => `${Math.floor(s / 60)}m ${s % 60}s`;

  const streakDays = 12; // including today
  const dailyGoal = 20;
  const completedTotal = 23; // including this session

  // ── helpers ─────────────────────────────────────────────────────
  const Skel = ({ w = '100%', h = 12, op = 0.5, r = 6 }) =>
  <span style={{
    display: 'block', width: w, height: h, borderRadius: r,
    background: 'var(--memox-surface-container-high)',
    opacity: op, animation: 'memoxSkelPulse 1.4s ease-in-out infinite'
  }} />;


  // Result breakdown row — single-direction (correct / recovered / forgot)
  // Per spec we DO NOT show Hard / Easy breakdown.
  const ResultRow = ({ ic, color, label, value, sub, last }) =>
  <div style={{
    display: 'grid', gridTemplateColumns: '32px 1fr auto',
    gap: 12, alignItems: 'center', padding: '12px 14px',
    borderBottom: last ? 'none' : 'var(--memox-border-ghost)'
  }}>
      <div style={{
      width: 30, height: 30, borderRadius: 9,
      background: `${color}1F`, color: color,
      display: 'flex', alignItems: 'center', justifyContent: 'center'
    }}>
        <Ic name={ic} size={14} color={color} />
      </div>
      <div style={{ minWidth: 0 }}>
        <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: '-0.1px' }}>{label}</div>
        {sub && <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 2 }}>{sub}</div>}
      </div>
      <div style={{
      fontSize: 16, fontWeight: 700, color: color,
      fontVariantNumeric: 'tabular-nums'
    }}>{value}</div>
    </div>;


  return (
    <div className="app" style={{ position: 'relative' }}>
      <StatusBar />

      {/* Minimal app bar — no back button on result screen.
                  Per spec: result must not be re-enterable via back after Done. */}
      <div className="appbar" style={{ justifyContent: 'space-between' }}>
        <div className="title" style={{ fontSize: 14, fontWeight: 600, color: 'var(--memox-on-surface-variant)' }}>
          Session complete
        </div>
        <button className="icon-btn" title="Share summary" disabled={loading || defensive} style={{
          opacity: loading || defensive ? 0.4 : 1
        }}>
          <Ic name="share-2" size={16} color="var(--memox-on-surface-variant)" />
        </button>
      </div>

      <div className="scroll" style={{ padding: '0 14px 14px' }}>

        {loading ?
        <>
            {/* Hero skeleton */}
            <div className="card" style={{ padding: '28px 22px', textAlign: 'center', marginBottom: 14 }}>
              <Skel w={56} h={56} r={16} />
              <div style={{ height: 14 }} />
              <Skel w={180} h={20} r={6} />
              <div style={{ height: 6 }} />
              <Skel w={120} h={11} op={0.4} />
              <div style={{ height: 18 }} />
              <Skel w="100%" h={50} r={11} />
            </div>
            <div className="card" style={{ padding: '14px', marginBottom: 12 }}>
              <Skel w={80} h={10} />
              <div style={{ height: 12 }} />
              {[0, 1, 2].map((i) =>
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: i < 2 ? 14 : 0 }}>
                  <Skel w={28} h={28} r={8} />
                  <div style={{ flex: 1 }}>
                    <Skel w={80} h={11} />
                    <div style={{ height: 5 }} />
                    <Skel w={120} h={9} op={0.4} />
                  </div>
                  <Skel w={30} h={15} />
                </div>
            )}
            </div>
          </> :

        <>
            {/* Completion hero — calm, no confetti */}
            <div className="card" style={{
            padding: '24px 22px 20px', textAlign: 'center', marginBottom: 14,
            background: defensive ?
            'var(--memox-surface-container-lowest)' :
            'linear-gradient(135deg, rgba(31,138,91,0.10) 0%, rgba(82,101,245,0.10) 100%)',
            border: defensive ?
            '1px solid var(--memox-outline-variant)' :
            '1px solid rgba(31,138,91,0.22)'
          }}>
              <div style={{
              width: 60, height: 60, borderRadius: 18,
              background: defensive ? 'var(--memox-surface-container)' : 'rgba(31,138,91,0.16)',
              color: defensive ? 'var(--memox-on-surface-variant)' : 'var(--memox-mastery)',
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              marginBottom: 14
            }}>
                <Ic name={defensive ? 'pause-circle' : 'check-circle-2'} size={28}
              color={defensive ? 'var(--memox-on-surface-variant)' : 'var(--memox-mastery)'} />
              </div>
              <div style={{
              fontSize: defensive ? 18 : 22, fontWeight: 700, letterSpacing: '-0.4px',
              marginBottom: 6, lineHeight: 1.15
            }}>
                {defensive ? 'Session ended early' : 'Nice session.'}
              </div>
              <div style={{
              fontSize: 13, color: 'var(--memox-on-surface-variant)',
              lineHeight: 1.55, marginBottom: defensive ? 0 : 16
            }}>
                {defensive ?
              'You exited before answering any cards. Nothing has changed.' :
              <>You worked through <strong style={{ color: 'var(--memox-on-surface)', fontWeight: 700 }}>{result.reviewed} cards</strong> in TOPIK II — Vocab.</>}
              </div>

              {!defensive &&
            <div style={{
              display: 'flex', gap: 10, padding: '0 6px',
              fontVariantNumeric: 'tabular-nums'
            }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.4px' }}>
                      {result.reviewed}
                    </div>
                    <div style={{ fontSize: 10, color: 'var(--memox-on-surface-variant)', letterSpacing: 0.3, textTransform: 'uppercase', fontWeight: 700 }}>
                      Reviewed
                    </div>
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.4px' }}>
                      {fmtDur(result.durationS)}
                    </div>
                    <div style={{ fontSize: 10, color: 'var(--memox-on-surface-variant)', letterSpacing: 0.3, textTransform: 'uppercase', fontWeight: 700 }}>
                      Duration
                    </div>
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{
                  fontSize: 22, fontWeight: 700, letterSpacing: '-0.4px',
                  color: 'var(--memox-mastery)'
                }}>
                      {Math.round(result.accuracy * 100)}%
                    </div>
                    <div style={{ fontSize: 10, color: 'var(--memox-on-surface-variant)', letterSpacing: 0.3, textTransform: 'uppercase', fontWeight: 700 }}>
                      Accuracy
                    </div>
                  </div>
                </div>
            }
            </div>

            {/* Finalization failure banner — visible but not panicky.
            Done is still enabled (per spec). */}
            {finFailed &&
          <div style={{
            padding: '12px 14px',
            background: 'rgba(217,137,30,0.08)',
            border: '1px solid rgba(217,137,30,0.22)',
            borderRadius: 12,
            display: 'flex', gap: 10, alignItems: 'flex-start',
            marginBottom: 14
          }}>
                <Ic name="cloud-off" size={15} color="var(--memox-streak)" />
                <div style={{ flex: 1, fontSize: 12, lineHeight: 1.55, color: 'var(--memox-on-surface)' }}>
                  <div style={{ fontWeight: 700, marginBottom: 2 }}>
                    Couldn't save this summary
                  </div>
                  <div style={{ color: 'var(--memox-on-surface-variant)' }}>
                    Your answers are saved on this device. The summary will sync next time.
                  </div>
                </div>
                <button style={{
              height: 30, padding: '0 12px', borderRadius: 8,
              background: 'rgba(217,137,30,0.14)',
              color: 'var(--memox-streak)',
              border: 'none', fontSize: 11, fontWeight: 600,
              fontFamily: 'inherit', cursor: 'pointer',
              display: 'inline-flex', alignItems: 'center', gap: 5,
              flexShrink: 0
            }}>
                  <Ic name="refresh-cw" size={11} color="var(--memox-streak)" />
                  Retry
                </button>
              </div>
          }

            {/* Defensive empty — skip the analytical cards */}
            {defensive ?
          <div style={{
            padding: '10px 12px',
            background: 'var(--memox-surface-container-lowest)',
            border: 'var(--memox-border-ghost)',
            borderRadius: 11,
            fontSize: 11, color: 'var(--memox-on-surface-variant)',
            lineHeight: 1.5,
            display: 'flex', gap: 8, alignItems: 'flex-start',
            marginBottom: 14
          }}>
                <Ic name="info" size={13} color="var(--memox-on-surface-variant)" />
                <span>No reviews counted. Your streak and goal are unchanged.</span>
              </div> :

          <>
                {/* Result breakdown — correct / recovered / forgot only */}
                <div className="ov" style={{ padding: '0 4px 8px' }}>Result breakdown</div>
                <div className="card" style={{ padding: 0, overflow: 'hidden', marginBottom: 14 }}>
                  <ResultRow
                ic="check" color="var(--memox-mastery)"
                label="Correct" sub="Answered confidently"
                value={result.correct} />
                  <ResultRow
                ic="corner-up-right" color="var(--memox-streak)"
                label="Recovered" sub="Got it after a slip"
                value={result.recovered} />
                  <ResultRow
                ic="rotate-ccw" color="var(--memox-error)"
                label="Forgot" sub="Will come back sooner"
                value={result.forgot} last />
                </div>

                {/* Box changes */}
                <div className="ov" style={{ padding: '0 4px 8px' }}>Box changes</div>
                <div className="card" style={{ padding: '14px', marginBottom: 14 }}>
                  <div style={{
                display: 'flex', height: 8, borderRadius: 999, overflow: 'hidden',
                background: 'var(--memox-surface-container)', marginBottom: 14
              }}>
                    <div style={{
                  width: `${result.boxesUp / result.reviewed * 100}%`,
                  background: 'var(--memox-mastery)'
                }} />
                    <div style={{
                  width: `${result.boxesHeld / result.reviewed * 100}%`,
                  background: 'var(--memox-primary)'
                }} />
                    <div style={{
                  width: `${result.boxesDown / result.reviewed * 100}%`,
                  background: 'var(--memox-error)',
                  opacity: 0.85
                }} />
                  </div>
                  <div style={{ display: 'flex', gap: 6 }}>
                    {[
                { l: 'Moved up', v: result.boxesUp, c: 'var(--memox-mastery)', ic: 'arrow-up' },
                { l: 'Held', v: result.boxesHeld, c: 'var(--memox-primary)', ic: 'minus' },
                { l: 'Moved down', v: result.boxesDown, c: 'var(--memox-error)', ic: 'arrow-down' }].
                map((b) =>
                <div key={b.l} style={{
                  flex: 1, padding: '8px 10px',
                  background: 'var(--memox-surface-container-lowest)',
                  border: 'var(--memox-border-ghost)',
                  borderRadius: 10
                }}>
                        <div style={{
                    display: 'inline-flex', alignItems: 'center', gap: 4,
                    fontSize: 10, fontWeight: 700, letterSpacing: 0.3,
                    textTransform: 'uppercase', color: b.c
                  }}>
                          <Ic name={b.ic} size={10} color={b.c} />
                          {b.l}
                        </div>
                        <div style={{
                    fontSize: 16, fontWeight: 700, marginTop: 3,
                    fontVariantNumeric: 'tabular-nums'
                  }}>{b.v}</div>
                      </div>
                )}
                  </div>
                </div>

                {/* Streak + goal block — ONLY when goal is enabled (per spec) */}
                {!goalOff &&
            <>
                    <div className="ov" style={{ padding: '0 4px 8px' }}>Streak and goal</div>
                    <div className="card" style={{ padding: '14px', marginBottom: 14 }}>
                      <div style={{ display: 'flex', gap: 10, marginBottom: 14 }}>
                        <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 10 }}>
                          <div style={{
                      width: 36, height: 36, borderRadius: 11,
                      background: 'rgba(217,137,30,0.12)', color: 'var(--memox-streak)',
                      display: 'flex', alignItems: 'center', justifyContent: 'center'
                    }}>
                            <Ic name="flame" size={16} color="var(--memox-streak)" />
                          </div>
                          <div>
                            <div className="ov">Streak</div>
                            <div style={{
                        fontSize: 16, fontWeight: 700, letterSpacing: '-0.3px',
                        fontVariantNumeric: 'tabular-nums', marginTop: 1
                      }}>
                              {streakDays} days
                              <span style={{
                          fontSize: 10, color: 'var(--memox-mastery)', fontWeight: 700,
                          marginLeft: 6, padding: '1px 5px', borderRadius: 999,
                          background: 'rgba(31,138,91,0.12)'
                        }}>+1</span>
                            </div>
                          </div>
                        </div>
                        <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 10 }}>
                          <svg width="36" height="36" viewBox="0 0 40 40" style={{ flexShrink: 0 }}>
                            <circle cx="20" cy="20" r="16" fill="none"
                      stroke="var(--memox-surface-container)" strokeWidth="3.5" />
                            <circle cx="20" cy="20" r="16" fill="none"
                      stroke="var(--memox-primary)" strokeWidth="3.5"
                      strokeLinecap="round" strokeDasharray="100.5"
                      strokeDashoffset={(1 - Math.min(completedTotal / dailyGoal, 1)) * 100.5}
                      transform="rotate(-90 20 20)" />
                          </svg>
                          <div>
                            <div className="ov">Today’s goal</div>
                            <div style={{
                        fontSize: 16, fontWeight: 700, letterSpacing: '-0.3px',
                        fontVariantNumeric: 'tabular-nums', marginTop: 1
                      }}>
                              {completedTotal}<span style={{
                          fontSize: 11, color: 'var(--memox-on-surface-variant)', fontWeight: 600
                        }}> / {dailyGoal}</span>
                            </div>
                          </div>
                        </div>
                      </div>

                      {/* Goal complete sub-line if applicable */}
                      {completedTotal >= dailyGoal &&
                <div style={{
                  padding: '8px 10px',
                  background: 'rgba(31,138,91,0.08)',
                  border: '1px solid rgba(31,138,91,0.20)',
                  borderRadius: 9,
                  fontSize: 11, lineHeight: 1.5,
                  display: 'flex', gap: 6, alignItems: 'center',
                  color: 'var(--memox-on-surface)'
                }}>
                          <Ic name="check" size={12} color="var(--memox-mastery)" />
                          <span>Daily goal hit. New cards are still available if you want a head start.</span>
                        </div>
                }
                    </div>
                  </>
            }

                {/* Tough cards — entry row */}
                <div className="ov" style={{ padding: '0 4px 8px' }}>Tough cards</div>
                <div className="card" style={{
              padding: '14px',
              marginBottom: 18,
              opacity: toughEmpty ? 0.75 : 1
            }}>
                  {toughEmpty ?
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                      <div style={{
                  width: 36, height: 36, borderRadius: 11,
                  background: 'rgba(31,138,91,0.10)', color: 'var(--memox-mastery)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  flexShrink: 0
                }}>
                        <Ic name="leaf" size={16} color="var(--memox-mastery)" />
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: '-0.1px' }}>
                          No tough cards from this session
                        </div>
                        <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 2, lineHeight: 1.4 }}>
                          You handled everything cleanly.
                        </div>
                      </div>
                    </div> :

              <div style={{ display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer' }}>
                      <div style={{
                  width: 36, height: 36, borderRadius: 11,
                  background: 'rgba(220,72,72,0.10)', color: 'var(--memox-error)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  flexShrink: 0
                }}>
                        <Ic name="alert-circle" size={16} color="var(--memox-error)" />
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: '-0.1px' }}>
                          {result.tough} cards to revisit
                        </div>
                        <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 2, lineHeight: 1.4 }}>
                          Forgot or struggled with these. A quick re-pass tomorrow helps.
                        </div>
                      </div>
                      <Ic name="chevron-right" size={16} color="var(--memox-on-surface-variant)" />
                    </div>
              }
                </div>
              </>
          }
          </>
        }
      </div>

      {/* Final action bar — Done always available */}
      <div style={{
        padding: '10px 14px 16px',
        borderTop: 'var(--memox-border-ghost)',
        background: 'var(--memox-surface)',
        display: 'flex', flexDirection: 'column', gap: 8
      }}>
        <div style={{ display: 'flex', gap: 10 }}>
          {!defensive && !loading &&
          <button className="pill-btn outline" style={{
            flex: 1, height: 40, borderRadius: 12, fontSize: 13, gap: 7
          }}>
              <Ic name="play" size={14} color="var(--memox-primary)" />
              Study more
            </button>
          }
          <button className="pill-btn primary" disabled={loading} style={{
            flex: defensive || loading ? 1 : 1.2,
            height: 40, borderRadius: 12, fontSize: 14, gap: 8,
            opacity: loading ? 0.45 : 1,
            pointerEvents: loading ? 'none' : 'auto'
          }}>
            <Ic name="check" size={16} color="#fff" />
            Done
          </button>
        </div>
        <div style={{
          fontSize: 10, color: 'var(--memox-on-surface-variant)',
          textAlign: 'center', opacity: 0.7
        }}>
          {loading ? 'Saving your session…' :
          finFailed ? 'Done returns you home — summary syncs later.' :
          defensive ? 'No progress saved. Done returns you home.' :
          'Done returns you to where you started.'}
        </div>
      </div>

      <style>{`@keyframes memoxSkelPulse { 0%, 100% { opacity:0.45; } 50% { opacity:0.75; } }`}</style>
    </div>);

}

/* ─────── Screen: Onboarding (zero-content Dashboard) ───────
   NOT a separate permanent route — this is the Dashboard's empty state
   plus the inline flows that branch from it.

   Variants ('state' prop):
     welcome       - one-time first-launch hero (suppress after firstLaunchCompletedAt)
     zero          - zero-content Dashboard state with 3 paths (default)
     createDeck    - bottom sheet: create first deck
     createForImp  - inline form: create deck for incoming import
     signingIn     - Google sign-in in progress
     restorePrompt - after sign-in, ask before restoring
     restoring     - restore in progress
     restoreFailed - restore error
     importHandoff - bridge state before opening import screen
*/
function OnboardingScreen({ go, state = 'zero' }) {
  const v = state;

  // ── helpers ─────────────────────────────────────────────────────
  const Scrim = () =>
  <div style={{
    position: 'absolute', inset: 0,
    background: 'rgba(25,28,30,0.45)', zIndex: 50,
    animation: 'memoxScrimIn 220ms ease'
  }} />;

  const Spinner = ({ color = 'var(--memox-primary)', size = 14 }) =>
  <span style={{
    display: 'inline-block', width: size, height: size, borderRadius: 999,
    border: `2px solid ${color}`, borderTopColor: 'transparent',
    animation: 'memoxSpin 0.8s linear infinite', verticalAlign: 'middle'
  }} />;


  // ── 1. WELCOME — one-screen, no carousel (per spec) ──────────
  if (v === 'welcome') {
    return (
      <div className="app" style={{
        background: 'linear-gradient(180deg, var(--memox-surface) 0%, rgba(82,101,245,0.04) 100%)'
      }}>
        <StatusBar />
        <div className="appbar" style={{ justifyContent: 'flex-end' }}>
          <button style={{
            background: 'transparent', border: 'none', padding: '8px 12px',
            color: 'var(--memox-on-surface-variant)',
            fontSize: 13, fontWeight: 600,
            fontFamily: 'inherit', cursor: 'pointer'
          }}>
            Skip
          </button>
        </div>
        <div className="scroll" style={{
          padding: '20px 22px 0',
          display: 'flex', flexDirection: 'column', justifyContent: 'center'
        }}>
          {/* Single-screen hero. The brand-mark sits at the centre. */}
          <div style={{ textAlign: 'center', marginBottom: 24 }}>
            <div style={{
              width: 80, height: 80, borderRadius: 22,
              background: 'var(--memox-primary)', color: '#fff',
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              marginBottom: 18,
              boxShadow: '0 12px 32px rgba(82,101,245,0.32)'
            }}>
              <Ic name="sparkles" size={36} color="#fff" />
            </div>
            <div style={{ fontSize: 26, fontWeight: 700, letterSpacing: '-0.6px', marginBottom: 8, lineHeight: 1.15 }}>
              Remember more,<br />at your own pace.
            </div>
            <div style={{
              fontSize: 14, color: 'var(--memox-on-surface-variant)', lineHeight: 1.55,
              padding: '0 4px'
            }}>
              Calm flashcards that surface what you need each day. Local-first — your cards live on this device.
            </div>
          </div>

          {/* Three values. NOT a tutorial; just principles. */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 20 }}>
            {[
            { ic: 'cloud', l: 'Local-first', s: 'No sign-in needed. Sync is optional, anytime.' },
            { ic: 'sun', l: 'A daily rhythm', s: 'Short sessions, surfaced by what’s due.' },
            { ic: 'shield-check', l: 'No streak pressure', s: 'Skip a day. Your progress is safe.' }].
            map((b) =>
            <div key={b.l} className="card" style={{
              padding: '12px 14px',
              display: 'grid', gridTemplateColumns: '34px 1fr', gap: 12, alignItems: 'center'
            }}>
                <div style={{
                width: 30, height: 30, borderRadius: 9,
                background: 'rgba(82,101,245,0.10)', color: 'var(--memox-primary)',
                display: 'flex', alignItems: 'center', justifyContent: 'center'
              }}>
                  <Ic name={b.ic} size={14} color="var(--memox-primary)" />
                </div>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: '-0.1px' }}>{b.l}</div>
                  <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 1, lineHeight: 1.45 }}>{b.s}</div>
                </div>
              </div>
            )}
          </div>
        </div>

        <div style={{ padding: '10px 18px 18px' }}>
          <button className="pill-btn primary" style={{
            width: '100%', height: 44, borderRadius: 14, fontSize: 15, gap: 8
          }}>
            Let’s start
            <Ic name="arrow-right" size={16} color="#fff" />
          </button>
          <div style={{
            textAlign: 'center', marginTop: 10,
            fontSize: 11, color: 'var(--memox-on-surface-variant)'
          }}>
            You’re always in control. Sign-in is optional.
          </div>
        </div>
      </div>);

  }

  // ── 2. ZERO + sheets + flows ─────────────────────────────────
  // Underlying view in every non-welcome state is the empty Dashboard.
  const hasOverlay = ['createDeck', 'createForImp', 'signingIn', 'restorePrompt', 'restoring', 'restoreFailed', 'importHandoff'].includes(v);

  return (
    <div className="app" style={{ position: 'relative' }}>
      <StatusBar />

      <div className="appbar appbar-lg" style={{ flexDirection: 'column', alignItems: 'flex-start', gap: 2, paddingTop: 18, paddingBottom: 14, position: 'relative' }}>
        <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.5px' }}>
          Welcome to MemoX
        </div>
        <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)' }}>
          Let’s set up your first cards
        </div>
        <div style={{ position: 'absolute', right: 14, top: 18, display: 'flex', gap: 4 }}>
          <button className="icon-btn" title="Settings">
            <Ic name="settings" size={18} color="var(--memox-on-surface-variant)" />

/* ─────── App wrapper with multiple phones ─────── */
// Lazy-mounts its screen only while near the horizontal viewport. With 129 frames,
// mounting every React tree on load is what made the gallery heavy — this keeps just
// the handful of frames in (and near) view mounted, and tears the rest down so the DOM
// stays small while scrolling. The .phone box is a fixed 390×780, so the placeholder
// reserves identical space and the scroll position never jumps.
const noop = () => {};

// Robust lazy-mount: mount a row's frames once it scrolls within ~1.6 viewports.
// Uses getBoundingClientRect on scroll/resize + an interval fallback, so it works
// in every environment (the old IntersectionObserver gate never fired in some webviews).
function useNear(ref) {
  const [near, setNear] = React.useState(false);
  React.useEffect(() => {
    if (near) return;
    let raf = null, iv = null, done = false;
    const cleanup = () => {
      window.removeEventListener('scroll', onScroll, true);
      window.removeEventListener('resize', onScroll);
      if (iv) clearInterval(iv);
      if (raf) cancelAnimationFrame(raf);
    };
    const check = () => {
      const n = ref.current; if (!n || done) return;
      const r = n.getBoundingClientRect();
      const vh = window.innerHeight || 800;
      if (r.top < vh * 1.6 && r.bottom > -vh * 0.6) { done = true; setNear(true); cleanup(); }
    };
    const onScroll = () => { if (raf) return; raf = requestAnimationFrame(() => { raf = null; check(); }); };
    window.addEventListener('scroll', onScroll, true);
    window.addEventListener('resize', onScroll);
    iv = setInterval(check, 350);
    check();
    return cleanup;
  }, [near]);
  return near;
}

// One device frame in a chosen theme. Dark applies the scoped .memox-dark token block.
function Frame({ theme, children }) {
  const dark = theme === 'dark';
  return (
    <div className={'frame-wrap' + (dark ? ' memox-dark' : '')}>
      <div className="phone">{children}</div>
      <div className="theme-label">
        <span className="theme-dot" style={{ background: dark ? '#8B9AFF' : '#5265F5' }}></span>
        {dark ? 'Dark · Tokyo Nebula' : 'Light · Tokyo Pure'}
      </div>
    </div>);
}

// A screen shown as a light+dark pair with a state stepper. Both frames share one state index.
function ScreenRow({ group, view, num }) {
  const [i, setI] = React.useState(0);
  const ref = React.useRef(null);
  const near = useNear(ref);
  const total = group.states.length;
  const cur = group.states[i % total];
  const single = total <= 1;
  const make = () => {
    const props = group.prop ? { go: noop, [group.prop]: cur[0] } : { go: noop };
    // Key by the current state value so screens that take the state only as a
    // useState initializer (Recall, Fill) remount and re-init when the stepper
    // changes states — otherwise both states render identically. Single-state
    // screens keep a constant key, so their interactivity is preserved.
    return React.createElement(group.Comp, { key: 'st-' + String(cur[0]), ...props });
  };
  const showLight = view !== 'dark';
  const showDark = view !== 'light';
  return (
    <div className="row" ref={ref}>
      <div className="row-head">
        <span className="row-num">{num}</span>
        <span className="row-title">{group.title}</span>
        {!single &&
          <div className="stepper" role="group" aria-label={group.title + ' states'}>
            <button onClick={() => setI((i - 1 + total) % total)} aria-label="Previous state" title="Previous state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <span className="st-label">{cur[1]} · {(i % total) + 1}/{total}</span>
            <button onClick={() => setI((i + 1) % total)} aria-label="Next state" title="Next state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            </button>
          </div>}
        {single && <span className="st-label st-single">Single state</span>}
      </div>
      {near ?
        <div className="pair">
          {showLight ? <Frame theme="light">{make()}</Frame> : null}
          {showDark ? <Frame theme="dark">{make()}</Frame> : null}
        </div> :
        <div className="row-placeholder"></div>}
    </div>);
}

// luminance check so the inline hex label stays legible on its own swatch
function isDarkHex(hex) {
  if (!hex || hex[0] !== '#') return false;
  const h = hex.length === 4
    ? hex.slice(1).split('').map((c) => parseInt(c + c, 16))
    : [parseInt(hex.slice(1, 3), 16), parseInt(hex.slice(3, 5), 16), parseInt(hex.slice(5, 7), 16)];
  return (0.299 * h[0] + 0.587 * h[1] + 0.114 * h[2]) < 150;
}

// one color token = a card with a Light chip + Dark chip, role + Dart symbol
function ColorToken({ role, dart, light, dark, tags }) {
  const chip = (hex, isDark) => (
    <div className="chip" style={{ background: hex || (isDark ? '#0A0E27' : '#F7F9FE') }}>
      {hex
        ? <span className={isDarkHex(hex) ? 'is-dark' : ''}>{hex}</span>
        : <span className={isDark ? 'is-dark' : ''} style={{ opacity: 0.7 }}>inherits</span>}
    </div>);
  return (
    <div className="tok-color">
      <div className="chips">{chip(light, false)}{chip(dark, true)}</div>
      <div className="meta">
        <div className="role">{role}</div>
        <div className="dart">{dart}</div>
      </div>
      {tags && tags.length
        ? <div className="tok-corner-tags">{tags.map((t) => <em key={t}>{t}</em>)}</div>
        : null}
    </div>);
}

/* ════════════════════════════════════════════════════════════════════════
   COMPONENTS — Shared-widget library (Flutter handoff)
   Every reusable widget the 23 screens compose from, rendered as a real
   LIGHT + DARK specimen using live MemoX tokens, with its Flutter widget
   mapping and the variants/props a dev must implement. Nothing here is a
   mock-up: specimens use the same classes/tokens the screens do.
   ════════════════════════════════════════════════════════════════════════ */

// One widget card: header (name + Flutter map + desc), a dual-theme specimen
// stage (light + dark panes sharing one render fn, STACKED so each is full
// width), and variant chips. Which panes show follows the toolbar View toggle
// (light / dark / both) via WidgetViewCtx — so a single theme reads big & clean.
const WidgetViewCtx = React.createContext('both');
function WidgetCard({ nm, fl, ds, render, variants, span2 }) {
  const view = React.useContext(WidgetViewCtx);
  const showL = view !== 'dark';
  const showD = view !== 'light';
  return (
    <div className={'wid-card' + (span2 ? ' span2' : '')}>
      <div className="wid-head">
        <div className="nm">{nm}</div>
        <span className="fl">{fl}</span>
        {ds ? <div className="ds">{ds}</div> : null}
      </div>
      <div className="wid-stage">
        {showL ? <div className="wid-pane l"><span className="lab">Light</span>{render()}</div> : null}
        {showD ? <div className="wid-pane d memox-dark"><span className="lab">Dark</span>{render()}</div> : null}
      </div>
      {variants && variants.length
        ? <div className="wid-foot">{variants.map((v, i) => <span className="vt" key={i}>{v}</span>)}</div>
        : null}
    </div>);
}
const VT = (label, val) => <React.Fragment><b>{label}</b>{val ? ' ' + val : ''}</React.Fragment>;

// small reusable specimen helpers (real MemoX classes/tokens) ----------------
const ddot = (c, s = 8) => <span className="status-dot" style={{ background: c, width: s, height: s }} />;
function MasteryRing({ pct = 0.62, size = 44 }) {
  const col = pct < 0.34 ? 'var(--memox-status-learning)' : pct < 0.67 ? 'var(--memox-status-reviewing)' : 'var(--memox-status-mastered)';
  return (
    <div style={{ width: size, height: size, borderRadius: '50%', background: `conic-gradient(${col} ${pct * 360}deg, var(--memox-surface-container) 0deg)`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ width: size - 6, height: size - 6, borderRadius: '50%', background: 'var(--memox-surface-container-lowest)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, color: 'var(--memox-on-surface)' }}>{Math.round(pct * 100)}</div>
    </div>);
}

function WidgetSection({ n, title, note, children }) {
  return (
    <div className="tok-block">
      <div className="tok-block-head">
        <span className="n">{n}</span>
        <h3>{title}</h3>
        {note ? <span className="note">{note}</span> : null}
      </div>
      <div className="wid-grid">{children}</div>
    </div>);
}

          </div>}

      </WidgetSection>
    </div>

}

function App() {
  const [view, setView] = React.useState('both');
  const [width, setWidth] = React.useState(390);
  React.useEffect(() => { document.body.classList.toggle('stage-dark', view === 'dark'); }, [view]);
  const widths = [360, 375, 390, 412];
  const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
  return (
    <>
      <div className="controls">
        <div className="brandblock">
          <span className="brand">MemoX · Mobile UI Kit</span>
          <span className="sub">Tokens + shared widgets + 23 screens · light + dark · cycle states with the steppers</span>
        </div>
        <div className="ctl">
          <span className="seg-label">View</span>
          <div className="seg">
            {['both','light','dark'].map((v) => <button key={v} className={view === v ? 'active' : ''} onClick={() => setView(v)}>{cap(v)}</button>)}
          </div>
        </div>
        <div className="ctl">
          <span className="seg-label">Width</span>
          <div className="seg">
            {widths.map((w) => <button key={w} className={width === w ? 'active' : ''} onClick={() => setWidth(w)}>{w}</button>)}
          </div>
        </div>
      </div>
      <div className="gallery" style={{ '--phone-w': width + 'px' }}>
        <div className="section-head">0 · Foundations · Design tokens</div>
        <TokenReference />
        <div className="section-head">0 · Foundations · Shared widgets</div>
        <WidgetGallery view={view} />
        {GROUPS.map((g) => (
          <React.Fragment key={g.num}>
            {g.section ? <div className="section-head">{g.section}</div> : null}
            <ScreenRow group={g} view={view} num={g.num} />
          </React.Fragment>
        ))}
      </div>
    </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
