<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>

<style>
  * { box-sizing: border-box; }
  /* Mobile build — hide scrollbars everywhere (scroll still works) */
  * { scrollbar-width: none; -ms-overflow-style: none; }
  *::-webkit-scrollbar { width: 0; height: 0; background: transparent; }
  html, body { margin: 0; }
  body {
    background: var(--memox-bg);
    color: var(--memox-text);
    font-family: var(--memox-font-sans);
    -webkit-font-smoothing: antialiased;
    transition: background .25s ease, color .25s ease;
  }

  /* ---- Page header --------------------------------------------------- */
  .gallery-head {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; gap: var(--memox-space-4);
    padding: 18px 28px;
    background: color-mix(in srgb, var(--memox-bg) 86%, transparent);
    backdrop-filter: saturate(180%) blur(14px);
    border-bottom: 1px solid var(--memox-divider);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 9px;
    background: var(--memox-accent); color: var(--memox-accent-contrast);
    display: grid; place-items: center;
    font-weight: var(--memox-weight-extrabold); font-size: 17px;
    box-shadow: var(--memox-shadow-sm);
  }
  .brand-name { font-weight: var(--memox-weight-bold); font-size: 18px; letter-spacing: var(--memox-tracking-tight); }
  .brand-name b { color: var(--memox-accent); }
  .brand-sub { color: var(--memox-text-3); font-size: 13px; font-weight: 500; }
  .head-spacer { flex: 1; }

  .theme-toggle {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-radius: var(--memox-radius-pill);
    border: 1px solid var(--memox-border-strong);
    background: var(--memox-surface); color: var(--memox-text-2);
    font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
    transition: background .15s ease, border-color .15s ease, color .15s ease;
  }
  .theme-toggle:hover { border-color: var(--memox-accent); color: var(--memox-text); }
  .theme-toggle i { width: 16px; height: 16px; }

  /* ---- Rows ---------------------------------------------------------- */
  .gallery {
    max-width: 920px; margin: 0 auto; padding: 28px 28px 120px;
    display: flex; flex-direction: column; gap: 56px;
  }
  .row {
    display: flex; flex-direction: column;
    gap: 22px; align-items: flex-start;
  }
  .row-head {
    display: flex; flex-wrap: wrap; align-items: center;
    column-gap: 16px; row-gap: 12px; width: 100%;
  }
  .row-frames {
    display: flex; align-items: flex-start; gap: 28px;
  }
  .row-num {
    flex: none;
    font-family: var(--memox-font-mono); font-size: 13px; font-weight: 600;
    color: var(--memox-accent);
    background: var(--memox-accent-soft);
    padding: 4px 9px; border-radius: var(--memox-radius-sm);
  }
  .row-title {
    flex: 1 1 200px;
    font-size: 19px; font-weight: var(--memox-weight-bold);
    letter-spacing: var(--memox-tracking-tight);
  }
  .stepper {
    flex: none; display: inline-flex; align-items: center; gap: 4px;
    padding: 4px; border-radius: var(--memox-radius-pill);
    background: var(--memox-surface-2); border: 1px solid var(--memox-border);
  }
  .stepper button {
    width: 28px; height: 28px; border-radius: var(--memox-radius-pill);
    border: none; background: transparent; cursor: pointer;
    color: var(--memox-text-2); font-size: 18px; line-height: 1;
    display: grid; place-items: center;
    transition: background .12s ease, color .12s ease;
  }
  .stepper button:hover { background: var(--memox-surface); color: var(--memox-text); }
  .stepper button:active { transform: scale(0.92); }
  .st-label {
    min-width: 116px; text-align: center;
    font-size: 12.5px; font-weight: 600; color: var(--memox-text-2);
    font-variant-numeric: tabular-nums;
  }

  /* ---- Device frame -------------------------------------------------- */
  .frame-wrap {
    flex: 0 0 390px;
    background: var(--memox-bg);
    border-radius: 44px;
    padding: 10px;
    border: 1px solid var(--memox-border);
    box-shadow: var(--memox-shadow-lg);
  }
  .frame-wrap.memox-dark { box-shadow: var(--memox-shadow-lg); }
  .phone {
    width: 390px; height: 770px;
    background: var(--memox-bg);
    border-radius: 36px; overflow: hidden;
    position: relative;
    border: 1px solid var(--memox-divider);
    display: flex; flex-direction: column;
  }
  /* No mock OS chrome (time/battery). Just a slim top safe-area cushion so app
     content clears the rounded top corners and never butts the device edge. */
  .memox-statusbar {
    flex: none;
    min-height: calc(var(--memox-space-3) + var(--memox-safe-top));
  }
  .phone-canvas {
    flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden;
    background: var(--memox-bg);
  }
  .phone-canvas::-webkit-scrollbar { width: 0; height: 0; }

  .frame-tag {
    flex: 0 0 100%;
    margin-top: -8px;
    display: flex; gap: 390px; padding-left: 8px;
  }
</style>
</head>
<body>
  <header class="gallery-head">
    <div class="brand">
      <div class="brand-mark">M</div>
      <div>
        <div class="brand-name">Memo<b>X</b></div>
      </div>
      <span class="brand-sub">Mobile UI Kit</span>
    </div>
    <div class="head-spacer"></div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle chrome theme">
      <i data-lucide="moon"></i><span id="themeLabel">Dark chrome</span>
    </button>
  </header>

  <main class="gallery" id="gallery"></main>

  <!-- ================= ENGINE ================= -->
  <script>
  (function () {
    const queue = [];
    const rows = [];
    let ready = false;

    function libsReady() {
      return window.React && window.ReactDOM && window.ReactDOM.createRoot && window.lucide;
    }

    function refreshIcons() {
      // React 18 commits asynchronously (and initial Babel compile delays it),
      // so the <i data-lucide> nodes may not exist yet on early passes. Always
      // poll for a minimum window (~1s) to catch the commit, then keep going
      // while any unconverted icons remain — never stop on a momentary zero.
      var tries = 0;
      function run() {
        try { window.lucide.createIcons(); } catch (e) {}
        tries++;
        if (tries < 8 || (tries < 40 && document.querySelector('.phone i[data-lucide]'))) {
          setTimeout(run, 120);
        }
      }
      requestAnimationFrame(run);
    }

    function buildStatusbar() {
      // Slim top safe-area cushion only — no mock OS chrome (time/battery).
      const sb = document.createElement('div');
      sb.className = 'memox-statusbar';
      return sb;
    }

    function makePhone(themeClass) {
      const wrap = document.createElement('div');
      wrap.className = 'frame-wrap ' + themeClass;
      const phone = document.createElement('div');
      phone.className = 'phone';
      phone.appendChild(buildStatusbar());
      wrap.appendChild(phone);
      // fresh canvas + root is created on every render (see renderInto)
      return { wrap, phone, root: null };
    }

    // Discard any previous root/DOM and mount the element into a brand-new
    // canvas node. Fresh container per render means Lucide's <i>→<svg> swaps
    // never leave stale fibers for React to trip over on the next state.
    function renderInto(slot, el) {
      if (slot.root) { try { slot.root.unmount(); } catch (e) {} }
      if (slot.iconObs) { try { slot.iconObs.disconnect(); } catch (e) {} }
      const old = slot.phone.querySelector('.phone-canvas');
      if (old) old.remove();
      const canvas = document.createElement('div');
      canvas.className = 'phone-canvas';
      slot.phone.appendChild(canvas);
      slot.root = window.ReactDOM.createRoot(canvas);
      slot.root.render(el);
      // Event-driven icon conversion: convert <i data-lucide> the moment React
      // commits them (and after its dev double-render), with no timing guesses.
      // Converting removes the <i>, so the guard prevents an observer loop.
      var t = null;
      slot.iconObs = new MutationObserver(function () {
        if (canvas.querySelector('i[data-lucide]')) {
          clearTimeout(t);
          t = setTimeout(function () { try { window.lucide.createIcons(); } catch (e) {} }, 20);
        }
      });
      slot.iconObs.observe(canvas, { childList: true, subtree: true });
    }

    function buildRow(def) {
      const states = def.states || [];
      const multi = states.length > 1;
      const row = document.createElement('div');
      row.className = 'row';

      const head = document.createElement('div');
      head.className = 'row-head';
      const frames = document.createElement('div');
      frames.className = 'row-frames';
      row.appendChild(head);
      row.appendChild(frames);

      const num = document.createElement('span');
      num.className = 'row-num';
      num.textContent = def.num;

      const title = document.createElement('span');
      title.className = 'row-title';
      title.textContent = def.title;

      head.appendChild(num);
      head.appendChild(title);

      let label = null;
      const ctx = { idx: 0 };

      if (multi) {
        const stepper = document.createElement('div');
        stepper.className = 'stepper';
        const prev = document.createElement('button');
        prev.setAttribute('aria-label', 'Prev state');
        prev.textContent = '\u2039';
        label = document.createElement('span');
        label.className = 'st-label';
        const next = document.createElement('button');
        next.setAttribute('aria-label', 'Next state');
        next.textContent = '\u203A';
        stepper.appendChild(prev);
        stepper.appendChild(label);
        stepper.appendChild(next);
        head.appendChild(stepper);

        prev.addEventListener('click', function () {
          ctx.idx = (ctx.idx - 1 + states.length) % states.length;
          renderState();
        });
        next.addEventListener('click', function () {
          ctx.idx = (ctx.idx + 1) % states.length;
          renderState();
        });
      }

      const light = makePhone('memox-light');
      const dark = makePhone('memox-dark');
      frames.appendChild(light.wrap);
      frames.appendChild(dark.wrap);

      function renderState() {
        const st = states[ctx.idx];
        if (!st) return;
        if (label) {
          label.textContent = st.label + ' \u00B7 ' + (ctx.idx + 1) + '/' + states.length;
        }
        let el = null;
        try { el = st.render(); } catch (e) { console.error('render error in ' + def.num, e); }
        renderInto(light, el);
        renderInto(dark, el);
        refreshIcons();
      }

      rows.push({ row, renderState, rendered: false });
      document.getElementById('gallery').appendChild(row);
      return rows[rows.length - 1];
    }

    // Render rows on build. Also attach a lazy observer purely as a no-op
    // safety: rows are already rendered, so IO just re-confirms icons.
    const io = ('IntersectionObserver' in window) ? new IntersectionObserver(function (entries) {
      entries.forEach(function (en) {
        if (en.isIntersecting) { refreshIcons(); io.unobserve(en.target); }
      });
    }, { rootMargin: '200px 0px' }) : null;

    function flush() {
      while (queue.length) {
        const def = queue.shift();
        const rec = buildRow(def);
        rec.rendered = true;
        rec.renderState();
        if (io) io.observe(rec.row);
      }
    }

    window.MEMOX_KIT = {
      register: function (def) {
        queue.push(def);
        if (ready) flush();
      }
    };

    function boot() {
      if (!libsReady()) { setTimeout(boot, 40); return; }
      ready = true;
      flush();
      refreshIcons();
    }
    boot();

    // Theme toggle — chrome only; every row always shows BOTH frames.
    const toggle = document.getElementById('themeToggle');
    const label = document.getElementById('themeLabel');
    toggle.addEventListener('click', function () {
      const dark = document.documentElement.classList.toggle('memox-dark');
      label.textContent = dark ? 'Light chrome' : 'Dark chrome';
      toggle.querySelector('i').setAttribute('data-lucide', dark ? 'sun' : 'moon');
      refreshIcons();
    });
  })();
  </script>
