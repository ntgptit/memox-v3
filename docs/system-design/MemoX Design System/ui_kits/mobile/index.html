                background: s.done ? 'var(--memox-mastery)' :
                s.current ? 'var(--memox-primary)' :
                'var(--memox-surface-container)',
                color: s.done || s.current ? '#fff' : 'var(--memox-on-surface-variant)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 10, fontWeight: 700
              }}>
                  {s.done ? <Ic name="check" size={11} color="#fff" /> : s.n}
                </span>
                {s.label}
              </div>
              {i < a.length - 1 &&
            <div style={{
              flex: 1, height: 2, borderRadius: 999,
              background: a[i].done ? 'var(--memox-mastery)' : 'var(--memox-surface-container)'
            }} />
            }
            </React.Fragment>
          )}
        </div>

        {/* Deck destination */}
        <div style={{
          display: 'inline-flex', alignItems: 'center', gap: 8,
          padding: '6px 12px 6px 8px',
          background: 'var(--memox-surface-container-lowest)',
          border: 'var(--memox-border-ghost)',
          borderRadius: 999,
          fontSize: 12, fontWeight: 600,
          marginBottom: 14
        }}>
          <span style={{
            width: 22, height: 22, borderRadius: 7,
            background: 'rgba(82,101,245,0.10)', color: 'var(--memox-primary)',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center'
          }}>
            <Ic name="layers" size={13} color="var(--memox-primary)" />
          </span>
          <span>TOPIK II — Vocab · 142 cards</span>
        </div>

        {/* ── Step 1: source picker ─────────────────────────── */}
        <div className="ov" style={{ padding: '0 4px 8px' }}>1 · Choose a source</div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 14 }}>
          {[
          { id: 'file', ic: 'file-up', label: 'Upload file', sub: 'CSV, TSV, Anki' },
          { id: 'paste', ic: 'clipboard', label: 'Paste text', sub: 'TSV or CSV rows' }].
          map((s) => {
            const active = s.id === 'file';
            return (
              <button key={s.id} style={{
                padding: '14px 12px',
                background: active ? 'rgba(82,101,245,0.06)' : 'var(--memox-surface-container-lowest)',
                border: active ? '1px solid var(--memox-primary)' : 'var(--memox-border-ghost)',
                borderRadius: 13,
                display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: 6,
                fontFamily: 'inherit', cursor: 'pointer', textAlign: 'left',
                color: 'var(--memox-on-surface)'
              }}>
                <div style={{
                  width: 30, height: 30, borderRadius: 9,
                  background: `rgba(82,101,245,${active ? 0.14 : 0.08})`,
                  color: 'var(--memox-primary)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center'
                }}>
                  <Ic name={s.ic} size={15} color="var(--memox-primary)" />
                </div>
                <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: '-0.1px' }}>{s.label}</div>
                <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)' }}>{s.sub}</div>
              </button>);

          })}
        </div>

        {/* File picker / file chip */}
        {!fileChosen ?
        <div className="card" style={{
          padding: '24px 18px', textAlign: 'center', marginBottom: 14,
          borderStyle: 'dashed', borderColor: 'var(--memox-outline-variant)'
        }}>
            <div style={{
            width: 48, height: 48, borderRadius: 14,
            background: 'rgba(82,101,245,0.10)', color: 'var(--memox-primary)',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            marginBottom: 12
          }}>
              <Ic name="file-up" size={22} color="var(--memox-primary)" />
            </div>
            <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>
              Drop a file or tap to browse
            </div>
            <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', lineHeight: 1.5, marginBottom: 14 }}>
              Supports .csv, .tsv, and .apkg (Anki) · up to 5 MB
            </div>
            <button className="pill-btn primary" style={{
            height: 38, padding: '0 16px', borderRadius: 11, fontSize: 13
          }}>
              <Ic name="folder-open" size={14} color="#fff" />
              Choose file
            </button>
          </div> :

        <div className="card" style={{
          padding: '12px 14px', marginBottom: 14,
          display: 'grid', gridTemplateColumns: '36px 1fr auto', gap: 12, alignItems: 'center'
        }}>
            <div style={{
            width: 32, height: 32, borderRadius: 9,
            background: 'rgba(82,101,245,0.10)', color: 'var(--memox-primary)',
            display: 'flex', alignItems: 'center', justifyContent: 'center'
          }}>
              <Ic name="file-text" size={15} color="var(--memox-primary)" />
            </div>
            <div style={{ minWidth: 0 }}>
              <div style={{
              fontSize: 13, fontWeight: 700, letterSpacing: '-0.1px',
              whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'
            }}>topik-ii-vocab.tsv</div>
              <div style={{
              fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 2,
              fontVariantNumeric: 'tabular-nums'
            }}>
                TSV · 4.2 KB · {parsing ? 'parsing…' : isPreview ? `${rows.length} rows detected` : 'ready to preview'}
              </div>
            </div>
            <button className="icon-btn" title="Remove file" style={{ width: 30, height: 30 }}>
              <Ic name="x" size={15} color="var(--memox-on-surface-variant)" />
            </button>
          </div>
        }

        {/* Format helper — collapsed, calm */}
        {!isPreview && !importing &&
        <div style={{
          padding: '10px 12px',
          background: 'rgba(82,101,245,0.04)',
          border: '1px solid rgba(82,101,245,0.14)',
          borderRadius: 11,
          display: 'flex', gap: 8, alignItems: 'flex-start',
          marginBottom: 14
        }}>
            <Ic name="info" size={13} color="var(--memox-primary)" />
            <div style={{ flex: 1, fontSize: 11, lineHeight: 1.55, color: 'var(--memox-on-surface)' }}>
              <div style={{ fontWeight: 700, marginBottom: 3 }}>Each row makes one card</div>
              <div style={{ color: 'var(--memox-on-surface-variant)' }}>
                Column 1 = front · column 2 = back · column 3 = tags (optional, comma-separated). Quoted cells with commas are fine.
              </div>
            </div>
          </div>
        }

        {/* ── Step 2: preview ───────────────────────────────── */}
        {(isPreview || parsing) &&
        <>
            <div style={{
            display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
            padding: '8px 4px 8px'
          }}>
              <div className="ov">2 · Preview</div>
              {isPreview &&
            <span style={{
              fontSize: 11, color: 'var(--memox-on-surface-variant)',
              fontVariantNumeric: 'tabular-nums'
            }}>
                  {validCount} of {rows.length} ready
                </span>
            }
            </div>

            {parsing ?
          <div className="card" style={{ padding: '28px 18px', textAlign: 'center', marginBottom: 14 }}>
                <Spinner size={26} />
                <div style={{ fontSize: 14, fontWeight: 700, marginTop: 14, marginBottom: 4 }}>
                  Reading your file…
                </div>
                <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)', lineHeight: 1.5 }}>
                  No cards will be added until you tap Import.
                </div>
              </div> :

          <>
                {/* Summary chips */}
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 12 }}>
                  {[
              { l: 'Valid', v: validCount, c: 'var(--memox-mastery)', bg: 'rgba(31,138,91,0.10)', ic: 'check' },
              invalidCount > 0 ? { l: 'Invalid', v: invalidCount, c: 'var(--memox-error)', bg: 'rgba(220,72,72,0.10)', ic: 'alert-circle' } : null,
              duplicateCount > 0 ? { l: 'Duplicate', v: duplicateCount, c: 'var(--memox-streak)', bg: 'rgba(217,137,30,0.12)', ic: 'copy' } : null].
              filter(Boolean).map((c) =>
              <span key={c.l} style={{
                height: 26, padding: '0 10px 0 8px', borderRadius: 999,
                background: c.bg, color: c.c,
                fontSize: 11, fontWeight: 700,
                fontVariantNumeric: 'tabular-nums',
                display: 'inline-flex', alignItems: 'center', gap: 6
              }}>
                      <Ic name={c.ic} size={11} color={c.c} />
                      {c.l} · {c.v}
                    </span>
              )}
                </div>

                {/* Preview list */}
                <div className="card" style={{ padding: 0, overflow: 'hidden', marginBottom: 14 }}>
                  {rows.map((r, i, a) => {
                const flagColor = r.err ? 'var(--memox-error)' :
                r.dup ? 'var(--memox-streak)' :
                'var(--memox-mastery)';
                return (
                  <div key={i} style={{
                    display: 'grid', gridTemplateColumns: '24px 1fr 1fr 20px',
                    gap: 10, alignItems: 'center',
                    padding: '10px 12px',
                    borderBottom: i < a.length - 1 ? 'var(--memox-border-ghost)' : 'none',
                    background: r.err ? 'rgba(220,72,72,0.04)' :
                    r.dup ? 'rgba(217,137,30,0.04)' :
                    'transparent',
                    opacity: r.err ? 0.85 : 1
                  }}>
                        <span style={{
                      fontSize: 10, fontWeight: 700, color: 'var(--memox-on-surface-variant)',
                      fontVariantNumeric: 'tabular-nums'
                    }}>{i + 1}</span>
                        <div style={{ minWidth: 0 }}>
                          <div style={{
                        fontSize: 13, fontWeight: 600, letterSpacing: '-0.1px',
                        whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                        color: r.front ? 'var(--memox-on-surface)' : 'var(--memox-error)',
                        fontStyle: r.front ? 'normal' : 'italic'
                      }}>{r.front || '(empty)'}</div>
                          {(r.err || r.dup) &&
                      <div style={{
                        fontSize: 10, marginTop: 2,
                        color: flagColor, fontWeight: 600,
                        display: 'inline-flex', alignItems: 'center', gap: 3
                      }}>
                              <Ic name={r.err ? 'alert-circle' : 'copy'} size={9} color={flagColor} />
                              {r.err || r.dup}
                            </div>
                      }
                        </div>
                        <div style={{
                      fontSize: 12, color: 'var(--memox-on-surface-variant)',
                      whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                      fontStyle: r.back ? 'normal' : 'italic'
                    }}>{r.back || '(empty)'}</div>
                        <Ic name={r.ok ? 'check' : r.err ? 'x' : 'copy'} size={13} color={flagColor} />
                      </div>);

              })}
                </div>
              </>
          }

            {/* Invalid rows banner — explicit, calm */}
            {state === 'previewMix' &&
          <div style={{
            padding: '12px 14px',
            background: 'rgba(220,72,72,0.06)',
            border: '1px solid rgba(220,72,72,0.20)',
            borderRadius: 12,
            display: 'flex', gap: 10, alignItems: 'flex-start',
            marginBottom: 14
          }}>
                <Ic name="alert-circle" size={15} color="var(--memox-error)" />
                <div style={{ flex: 1, fontSize: 12, lineHeight: 1.55, color: 'var(--memox-on-surface)' }}>
                  <div style={{ fontWeight: 700, marginBottom: 2 }}>
                    {invalidCount + duplicateCount} rows will be skipped
                  </div>
                  <div style={{ color: 'var(--memox-on-surface-variant)' }}>
                    {invalidCount} have missing fields · {duplicateCount} match an existing card. Fix them in your file and import again to include them.
                  </div>
                </div>
              </div>
          }

            {/* Import options */}
            {isPreview &&
          <>
                <div className="ov" style={{ padding: '4px 4px 8px' }}>Import options</div>
                <div className="card" style={{ padding: 0, overflow: 'hidden', marginBottom: 14 }}>
                  {[
              { ic: 'tag', label: 'Apply tags from column 3', sub: 'Detected: TOPIK II, noun, verb', on: true },
              { ic: 'copy', label: 'Skip duplicates', sub: 'Cards matching front + back stay untouched', on: true },
              { ic: 'flag', label: 'Mark imported as new', sub: 'Reset progress for matching cards', on: false }].
              map((o, i, a) =>
              <div key={o.label} style={{
                display: 'grid', gridTemplateColumns: '32px 1fr 44px',
                gap: 12, alignItems: 'center', padding: '12px 14px',
                borderBottom: i < a.length - 1 ? 'var(--memox-border-ghost)' : 'none'
              }}>
                      <div style={{
                  width: 30, height: 30, borderRadius: 9,
                  background: 'rgba(82,101,245,0.08)', color: 'var(--memox-primary)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center'
                }}>
                        <Ic name={o.ic} size={14} color="var(--memox-primary)" />
                      </div>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: '-0.1px' }}>{o.label}</div>
                        <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 2, lineHeight: 1.4 }}>{o.sub}</div>
                      </div>
                      <span style={{
                  display: 'inline-block', position: 'relative',
                  width: 44, height: 26, borderRadius: 999,
                  background: o.on ? 'var(--memox-primary)' : 'var(--memox-surface-container-high)'
                }}>
                        <span style={{
                    position: 'absolute', top: 3, left: o.on ? 21 : 3,
                    width: 20, height: 20, borderRadius: 999,
                    background: '#fff',
                    boxShadow: '0 1px 3px rgba(0,0,0,0.18)'
                  }} />
                      </span>
                    </div>
              )}
                </div>
              </>
          }
          </>
        }

        {/* Importing state */}
        {importing &&
        <div className="card" style={{ padding: '28px 18px', textAlign: 'center', marginTop: 8 }}>
            <Spinner size={28} />
            <div style={{ fontSize: 14, fontWeight: 700, marginTop: 14, marginBottom: 4 }}>
              Adding {validCount} cards…
            </div>
            <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)', lineHeight: 1.5 }}>
              Saving to this device. Don't close the app yet.
            </div>
            {/* Progress bar */}
            <div style={{
            marginTop: 18, height: 5, background: 'var(--memox-surface-container)',
            borderRadius: 999, overflow: 'hidden'
          }}>
              <div style={{
              height: '100%', width: '62%',
              background: 'var(--memox-primary)',
              borderRadius: 999,
              animation: 'memoxProgPulse 1.4s ease-in-out infinite'
            }} />
            </div>
            <div style={{
            fontSize: 11, color: 'var(--memox-on-surface-variant)',
            marginTop: 8, fontVariantNumeric: 'tabular-nums'
          }}>29 of 47</div>
          </div>
        }
      </div>

      {/* Bottom commit bar */}
      <div style={{
        padding: '10px 14px 16px',
        borderTop: 'var(--memox-border-ghost)',
        background: 'var(--memox-surface)',
        display: 'flex', flexDirection: 'column', gap: 8
      }}>
        <div style={{ display: 'flex', gap: 10 }}>
          <button className="pill-btn outline" style={{
            height: 40, padding: '0 18px', borderRadius: 12, fontSize: 13,
            flexShrink: 0
          }}>
            Cancel
          </button>
          {!isPreview && !importing ?
          // Step 1 → Step 2: Preview button (only enabled with file)
          <button className="pill-btn primary" disabled={!fileChosen || parsing} style={{
            flex: 1, height: 40, borderRadius: 12, fontSize: 14, gap: 8,
            opacity: !fileChosen || parsing ? 0.45 : 1,
            pointerEvents: !fileChosen || parsing ? 'none' : 'auto'
          }}>
              {parsing ? <><Spinner color="#fff" size={14} /> Parsing…</> :
            <><Ic name="eye" size={15} color="#fff" /> Preview import</>}
            </button> :
          importing ?
          <button className="pill-btn primary" disabled style={{
            flex: 1, height: 40, borderRadius: 12, fontSize: 14, gap: 8,
            opacity: 0.6, pointerEvents: 'none'
          }}>
              <Spinner color="#fff" size={14} />
              Importing…
            </button> :

          // Step 2 → commit
          <button className="pill-btn primary" disabled={validCount === 0} style={{
            flex: 1, height: 40, borderRadius: 12, fontSize: 14, gap: 8,
            opacity: validCount === 0 ? 0.45 : 1,
            pointerEvents: validCount === 0 ? 'none' : 'auto'
          }}>
              <Ic name="download" size={15} color="#fff" />
              Import {validCount} valid {validCount === 1 ? 'card' : 'cards'}
            </button>
          }
        </div>
        <div style={{
          fontSize: 10, color: 'var(--memox-on-surface-variant)',
          textAlign: 'center', opacity: 0.7
        }}>
          {!fileChosen ? 'Pick a file or paste text to continue.' :
          parsing ? 'Reading file — no changes yet.' :
          !isPreview ? 'Next you’ll preview every row before anything is imported.' :
          state === 'previewMix' ? `Only the ${validCount} valid rows will be imported.` :
          importing ? 'Imports save to this device only.' :
          'No cards are added until you tap Import.'}
        </div>
      </div>

      <style>{`
        @keyframes memoxSpin       { to { transform: rotate(360deg); } }
        @keyframes memoxProgPulse  { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
      `}</style>
    </div>);

}

/* ─────── Screen: Library search ───────
   Cross-type search: folders, decks, flashcards, tags. Groups results
   visually so each type is scannable without scrolling past noise.

   Variants ('state' prop):
     emptyQuery  - search bar focused, recents + suggestions (default)
     loading     - debounced search running
     results     - grouped results
     noResults   - query has no matches
     error       - search failed
*/
function LibrarySearchScreen({ go, state = 'emptyQuery' }) {
  const empty = state === 'emptyQuery';
  const loading = state === 'loading';
  const error = state === 'error';
  const noRes = state === 'noResults';
  const showResults = state === 'results';

  const query = empty ? '' : noRes ? 'phras' : '연구';

  // ── shared ──────────────────────────────────────────────────────
  const Skel = ({ w = '100%', h = 11, op = 0.5, r = 6 }) =>
  <span style={{
    display: 'block', width: w, height: h, borderRadius: r,
    background: 'var(--memox-surface-container-high)',
    opacity: op, animation: 'memoxSkelPulse 1.4s ease-in-out infinite'
  }} />;


  // Group of results — header counts on the right; "See all" if > 3
  const Group = ({ title, ic, color, count, more, children }) =>
  <div style={{ marginBottom: 16 }}>
      <div style={{
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '0 4px 8px'
    }}>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
          <Ic name={ic} size={11} color={color} />
          <span style={{
          fontSize: 11, fontWeight: 700, letterSpacing: 0.4, textTransform: 'uppercase',
          color: color
        }}>{title}</span>
          <span style={{
          fontSize: 10, fontWeight: 700,
          color: 'var(--memox-on-surface-variant)',
          padding: '0 6px', borderRadius: 999,
          background: 'var(--memox-surface-container)',
          fontVariantNumeric: 'tabular-nums'
        }}>{count}</span>
        </div>
        {more &&
      <button style={{
        background: 'transparent', border: 'none', padding: 0,
        color: 'var(--memox-primary)', fontSize: 11, fontWeight: 600,
        fontFamily: 'inherit', cursor: 'pointer',
        display: 'inline-flex', alignItems: 'center', gap: 3
      }}>
            See all
            <Ic name="chevron-right" size={11} color="var(--memox-primary)" />
          </button>
      }
      </div>
      <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
        {children}
      </div>
    </div>;


  // Highlighted query inside text
  const Highlight = ({ text, q }) => {
    if (!q) return <>{text}</>;
    const i = text.toLowerCase().indexOf(q.toLowerCase());
    if (i < 0) return <>{text}</>;
    return (
      <>
        {text.slice(0, i)}
        <mark style={{
          background: 'rgba(82,101,245,0.18)',
          color: 'var(--memox-primary)',
          padding: '0 2px', borderRadius: 3,
          fontWeight: 700
        }}>{text.slice(i, i + q.length)}</mark>
        {text.slice(i + q.length)}
      </>);

  };

  // Result row — generic shell with type-specific icon/leading
  const Row = ({ ic, color, title, sub, trailing, last }) =>
  <div style={{
    display: 'grid', gridTemplateColumns: '30px 1fr auto',
    gap: 12, alignItems: 'center', padding: '11px 14px',
    borderBottom: last ? 'none' : 'var(--memox-border-ghost)',
    cursor: 'pointer'
  }}>
      <div style={{
      width: 26, height: 26, borderRadius: 8,
      background: `${color}1F`, color: color,
      display: 'flex', alignItems: 'center', justifyContent: 'center'
    }}>
        <Ic name={ic} size={13} color={color} />
      </div>
      <div style={{ minWidth: 0 }}>
        <div style={{
        fontSize: 13, fontWeight: 600, letterSpacing: '-0.1px',
        whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'
      }}>{title}</div>
        {sub &&
      <div style={{
        fontSize: 11, color: 'var(--memox-on-surface-variant)',
        marginTop: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'
      }}>{sub}</div>
      }
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        {trailing}
      </div>
    </div>;


  // Type color tokens
  const T_FOLDER = '#5265F5'; // primary indigo
  const T_DECK = '#8B6FF5'; // accent
  const T_CARD = 'var(--memox-mastery)';
  const T_TAG = 'var(--memox-streak)';

  return (
    <div className="app">
      <StatusBar />

      {/* Search app bar — prominent, focused */}
      <div className="appbar" style={{ justifyContent: 'flex-start', gap: 8 }}>
        <button className="icon-btn" onClick={() => go('library')}>
          <Ic name="arrow-left" size={20} />
        </button>
        <div style={{
          flex: 1,
          display: 'flex', alignItems: 'center', gap: 8,
          height: 38, padding: '0 12px',
          background: 'var(--memox-surface-container-lowest)',
          border: '1px solid var(--memox-primary)',
          borderRadius: 11
        }}>
          <Ic name="search" size={15} color="var(--memox-primary)" />
          <span style={{
            flex: 1, fontSize: 14,
            color: empty ? 'var(--memox-on-surface-variant)' : 'var(--memox-on-surface)',
            fontWeight: empty ? 500 : 600,
            display: 'inline-flex', alignItems: 'center',
            whiteSpace: 'nowrap', overflow: 'hidden'
          }}>
            {empty ? 'Search library' : query}
            <span style={{
              display: 'inline-block', width: 2, height: 16,
              background: 'var(--memox-primary)',
              animation: 'memoxBlink 1s infinite',
              marginLeft: empty ? 4 : 2
            }} />
          </span>
          {!empty &&
          <button className="icon-btn" style={{ width: 24, height: 24 }} title="Clear">
              <Ic name="x-circle" size={14} color="var(--memox-on-surface-variant)" />
            </button>
          }
        </div>
      </div>

      {/* Filter chips — type filter (only when not empty/error) */}
      {!error && !empty &&
      <div style={{ padding: '0 14px 10px' }}>
          <div className="scroll-x" style={{ display: 'flex', gap: 6 }}>
            {[
          { label: 'All', active: true, count: noRes ? 0 : 18 },
          { label: 'Folders', ic: 'folder', count: noRes ? 0 : 1, c: T_FOLDER },
          { label: 'Decks', ic: 'layers', count: noRes ? 0 : 2, c: T_DECK },
          { label: 'Flashcards', ic: 'copy', count: noRes ? 0 : 12, c: T_CARD },
          { label: 'Tags', ic: 'tag', count: noRes ? 0 : 3, c: T_TAG }].
          map((f) =>
          <button key={f.label} style={{
            height: 28, padding: '0 10px', borderRadius: 999, fontSize: 11,
            background: f.active ? 'var(--memox-primary)' : 'var(--memox-surface-container-lowest)',
            color: f.active ? '#fff' : 'var(--memox-on-surface)',
            border: f.active ? 'none' : 'var(--memox-border-ghost)',
            display: 'inline-flex', alignItems: 'center', gap: 5,
            fontFamily: 'inherit', fontWeight: 600, flexShrink: 0, cursor: 'pointer'
          }}>
                {f.ic && !f.active && <Ic name={f.ic} size={11} color={f.c || 'var(--memox-on-surface-variant)'} />}
                {f.label}
                <span style={{
              fontSize: 10, fontWeight: 700, opacity: f.active ? 0.75 : 0.6,
              fontVariantNumeric: 'tabular-nums'
            }}>{f.count}</span>
              </button>
          )}
          </div>
        </div>
      }

      <div className="scroll" style={{ padding: '0 14px 14px' }}>

        {/* ── EMPTY QUERY — recents + suggestions ─────────── */}
        {empty &&
        <>
            <div style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            padding: '2px 4px 8px'
          }}>
              <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                <Ic name="clock" size={11} color="var(--memox-on-surface-variant)" />
                <span className="ov">Recent searches</span>
              </div>
              <button style={{
              background: 'transparent', border: 'none', padding: 0,
              color: 'var(--memox-on-surface-variant)', fontSize: 11, fontWeight: 600,
              fontFamily: 'inherit', cursor: 'pointer'
            }}>
                Clear
              </button>
            </div>
            <div className="card" style={{ padding: 0, overflow: 'hidden', marginBottom: 18 }}>
              {[
            { q: '연구자', meta: '12 results' },
            { q: 'TOPIK II', meta: '7 results · folder' },
            { q: 'verb', meta: '1 tag · 71 cards' },
            { q: '도서관', meta: '1 card' }].
            map((r, i, a) =>
            <div key={r.q} style={{
              display: 'grid', gridTemplateColumns: '24px 1fr 24px',
              gap: 12, alignItems: 'center', padding: '10px 14px',
              borderBottom: i < a.length - 1 ? 'var(--memox-border-ghost)' : 'none',
              cursor: 'pointer'
            }}>
                  <Ic name="rotate-ccw" size={13} color="var(--memox-on-surface-variant)" />
                  <div style={{ minWidth: 0 }}>
                    <div style={{
                  fontSize: 13, fontWeight: 600,
                  whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'
                }}>{r.q}</div>
                    <div style={{
                  fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 1
                }}>{r.meta}</div>
                  </div>
                  <button className="icon-btn" style={{ width: 24, height: 24 }} title="Remove">
                    <Ic name="x" size={12} color="var(--memox-on-surface-variant)" />
                  </button>
                </div>
            )}
            </div>

            {/* Suggestions */}
            <div style={{ padding: '2px 4px 8px' }}>
              <div className="ov" style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                <Ic name="sparkles" size={11} color="var(--memox-on-surface-variant)" />
                Try searching
              </div>
            </div>
            <div className="card" style={{ padding: 0, overflow: 'hidden', marginBottom: 14 }}>
              {[
            { ic: 'folder', c: T_FOLDER, l: 'a folder name', ex: 'Korean, Japanese' },
            { ic: 'layers', c: T_DECK, l: 'a deck', ex: 'TOPIK II — Vocab' },
            { ic: 'copy', c: T_CARD, l: 'a card term or meaning', ex: '연구자, library' },
            { ic: 'tag', c: T_TAG, l: 'a tag', ex: 'noun, verb, food' }].
            map((s, i, a) =>
            <Row key={s.l}
            ic={s.ic} color={s.c}
            title={s.l} sub={s.ex}
            trailing={<Ic name="arrow-up-left" size={14} color="var(--memox-on-surface-variant)" />}
            last={i === a.length - 1} />

            )}
            </div>

            <div style={{
            padding: '10px 12px',
            background: 'var(--memox-surface-container-lowest)',
            border: 'var(--memox-border-ghost)',
            borderRadius: 11,
            fontSize: 11, color: 'var(--memox-on-surface-variant)',
            lineHeight: 1.5,
            display: 'flex', gap: 8, alignItems: 'flex-start'
          }}>
              <Ic name="info" size={13} color="var(--memox-on-surface-variant)" />
              <span>Search is case-insensitive. Korean, English, and Vietnamese all work.</span>
            </div>
          </>
        }

        {/* ── LOADING ─────────────────────────────────────── */}
        {loading &&
        <>
            <div style={{ padding: '4px 4px 8px' }}>
              <span className="ov">Searching for "{query}"…</span>
            </div>
            {[0, 1].map((g) =>
          <div key={g} style={{ marginBottom: 14 }}>
                <div style={{ padding: '2px 4px 8px', display: 'flex', gap: 6 }}>
                  <Skel w={70} h={9} op={0.4} />
                </div>
                <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
                  {[0, 1, 2].map((i) =>
              <div key={i} style={{
                display: 'grid', gridTemplateColumns: '30px 1fr 20px',
                gap: 12, alignItems: 'center', padding: '12px 14px',
                borderBottom: i < 2 ? 'var(--memox-border-ghost)' : 'none'
              }}>
                      <span style={{
                  width: 26, height: 26, borderRadius: 8,
                  background: 'var(--memox-surface-container-high)', opacity: 0.5,
                  animation: 'memoxSkelPulse 1.4s ease-in-out infinite'
                }} />
                      <div>
                        <Skel w={90 + i * 30} h={11} />
                        <div style={{ height: 6 }} />
                        <Skel w={60 + i * 20} h={9} op={0.4} />
                      </div>
                      <span />
                    </div>
              )}
                </div>
              </div>
          )}
          </>
        }

        {/* ── ERROR ───────────────────────────────────────── */}
        {error &&
        <div className="card" style={{ padding: '40px 22px', textAlign: 'center', marginTop: 8 }}>
            <div style={{
            width: 52, height: 52, borderRadius: 14,
            background: 'rgba(220,72,72,0.10)', color: 'var(--memox-error)',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            marginBottom: 14
          }}>
              <Ic name="cloud-off" size={22} color="var(--memox-error)" />
            </div>
            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 6 }}>
              Search didn't run
            </div>
            <div style={{ fontSize: 13, color: 'var(--memox-on-surface-variant)', lineHeight: 1.55, marginBottom: 16 }}>
              Your library is safe on this device. Try again in a moment.
            </div>
            <button className="pill-btn primary" style={{ height: 40, padding: '0 18px', borderRadius: 11, fontSize: 13 }}>
              <Ic name="refresh-cw" size={14} color="#fff" />
              Retry
            </button>
          </div>
        }

        {/* ── NO RESULTS ──────────────────────────────────── */}
        {noRes &&
        <div className="card" style={{ padding: '36px 22px', textAlign: 'center', marginTop: 8 }}>
            <div style={{
            width: 52, height: 52, borderRadius: 14,
            background: 'var(--memox-surface-container)',
            color: 'var(--memox-on-surface-variant)',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            marginBottom: 14
          }}>
              <Ic name="search-x" size={22} color="var(--memox-on-surface-variant)" />
            </div>
            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 6 }}>
              No matches for "{query}"
            </div>
            <div style={{ fontSize: 13, color: 'var(--memox-on-surface-variant)', lineHeight: 1.55, marginBottom: 16, padding: '0 8px' }}>
              Check the spelling, or try a shorter keyword. Search runs across folders, decks, cards, and tags.
            </div>
            <div style={{ display: 'flex', gap: 6, justifyContent: 'center', flexWrap: 'wrap' }}>
              {['phrase', 'phrasal', 'phrasing'].map((s) =>
            <button key={s} style={{
              height: 28, padding: '0 12px', borderRadius: 999, fontSize: 12,
              background: 'rgba(82,101,245,0.10)', color: 'var(--memox-primary)',
              border: 'none', fontWeight: 600,
              fontFamily: 'inherit', cursor: 'pointer',
              display: 'inline-flex', alignItems: 'center', gap: 5
            }}>
                  <Ic name="search" size={11} color="var(--memox-primary)" />
                  {s}
                </button>
            )}
            </div>
          </div>
        }

        {/* ── RESULTS — grouped by type ───────────────────── */}
        {showResults &&
        <>
            <div style={{ padding: '2px 4px 10px' }}>
              <span className="ov" style={{ fontVariantNumeric: 'tabular-nums' }}>
                18 results for "{query}"
              </span>
            </div>

            {/* Folders */}
            <Group title="Folders" ic="folder" color={T_FOLDER} count={1}>
              <Row ic="folder" color={T_FOLDER}
            title={<Highlight text="Korean 연구 — TOPIK roots" q={query} />}
            sub="4 subfolders · 286 cards"
            trailing={<Ic name="chevron-right" size={15} color="var(--memox-on-surface-variant)" />}
            last />
            </Group>

            {/* Decks */}
            <Group title="Decks" ic="layers" color={T_DECK} count={2}>
              <Row ic="layers" color={T_DECK}
            title={<Highlight text="연구 vocabulary" q={query} />}
            sub="62 cards · Korean / TOPIK II"
            trailing={
            <span style={{
              height: 18, padding: '0 7px', borderRadius: 999,
              background: 'rgba(82,101,245,0.10)', color: 'var(--memox-primary)',
              fontSize: 10, fontWeight: 700, fontVariantNumeric: 'tabular-nums',
              display: 'inline-flex', alignItems: 'center'
            }}>8 due</span>
            } />
              <Row ic="layers" color={T_DECK}
            title={<Highlight text="Academic 연구 terms" q={query} />}
            sub="34 cards · Korean / Advanced"
            trailing={<Ic name="chevron-right" size={15} color="var(--memox-on-surface-variant)" />}
            last />
            </Group>

            {/* Flashcards — terse: front + meaning preview only */}
            <Group title="Flashcards" ic="copy" color={T_CARD} count={12} more>
              {[
            { front: '연구자', back: 'researcher / nhà nghiên cứu' },
            { front: '연구하다', back: 'to research, to study' },
            { front: '연구실', back: 'lab, research room' }].
            map((c, i, a) =>
            <Row key={c.front} ic="copy" color={T_CARD}
            title={<Highlight text={c.front} q={query} />}
            sub={c.back}
            trailing={
            <Ic name="chevron-right" size={15} color="var(--memox-on-surface-variant)" />
            }
            last={i === a.length - 1} />
            )}
            </Group>

            {/* Tags — global tag-filtered behavior (not deck-scoped) */}
            <Group title="Tags" ic="tag" color={T_TAG} count={3}>
              {[
            { name: 'research', count: 24 },
            { name: 'researcher', count: 8 },
            { name: 'research-lab', count: 5 }].
            map((t, i, a) =>
            <Row key={t.name} ic="tag" color={T_TAG}
            title={<Highlight text={t.name} q={query} />}
            sub={`${t.count} cards across all decks`}
            trailing={<Ic name="arrow-up-right" size={14} color="var(--memox-on-surface-variant)" />}
            last={i === a.length - 1} />
            )}
            </Group>

            <div style={{
            textAlign: 'center',
            fontSize: 11, color: 'var(--memox-on-surface-variant)',
            padding: '4px 0 12px'
          }}>
              Showing top results · matches are case-insensitive
            </div>
          </>
        }
      </div>

      <style>{`
        @keyframes memoxBlink     { 0%, 50% { opacity:1; } 50.01%, 100% { opacity:0; } }
        @keyframes memoxSkelPulse { 0%, 100% { opacity:0.45; } 50% { opacity:0.75; } }
      `}</style>
    </div>);

}

/* ─────── Screen: Dashboard ───────
   Home tab. Not a content browser — Library owns that. Surfaces:
   greeting, resume, today's review, streak/goal, recent decks.

   Variants ('state' prop):
     loaded         - populated, due cards, resumable, goal+streak on (default)
     loading        - section-level skeletons
     onboarding     - zero content (no decks, no cards)
     goalOff        - goal disabled → hide ring, no nudging
     resumeOnly     - resumable session but no due cards
     streakBroken   - one-time banner: streak reset
     error          - data load failure
     multiResume    - multiple paused sessions → bottom sheet entry chip
*/
function DashboardScreen({ go, state = 'loaded' }) {
  const onboarding = state === 'onboarding';
  const loading = state === 'loading';
  const error = state === 'error';
  const offline = state === 'offline';
  const goalOff = state === 'goalOff';
  const resumeOnly = state === 'resumeOnly';
  const streakBroken = state === 'streakBroken';
  const multiResume = state === 'multiResume';

  // Local greeting (kept fixed for screenshot consistency)
  const greeting = 'Good evening, Alex';
  const subgreeting = 'Tuesday, May 27';

  // Surface flags driven by state
  const hasResume = !onboarding && !error;
  const hasDue = !onboarding && !error && !resumeOnly;
  const hasStreak = !onboarding && !goalOff;
  const showGoal = !onboarding && !goalOff;

  // Data
  const summary = {
    streak: streakBroken ? 0 : 11,
    dailyGoal: 20,
    completedToday: streakBroken ? 0 : 12,
    dueTotal: hasDue ? 23 : 0,
    freshTotal: 6,
    minutesEst: 14
  };
  const goalPct = Math.min(summary.completedToday / summary.dailyGoal, 1);

  // Helpers
  const Skel = ({ w = '100%', h = 12, op = 0.5, r = 6 }) =>
  <span style={{
    display: 'block', width: w, height: h, borderRadius: r,
    background: 'var(--memox-surface-container-high)',
    opacity: op, animation: 'memoxSkelPulse 1.4s ease-in-out infinite'
  }} />;


  // ── ERROR — replaces body (everything else still loads independently) ──
  // Spec: "Do not block Dashboard on Drive sync status" but error here is
  // about Dashboard data itself, so we render an inline card on top.
  const ErrorCard = () =>
  <div className="card" style={{
    padding: '18px',
    marginBottom: 14,
    background: 'rgba(220,72,72,0.05)',
    border: '1px solid rgba(220,72,72,0.20)',
    display: 'flex', gap: 12, alignItems: 'flex-start'
  }}>
      <div style={{
      width: 36, height: 36, borderRadius: 10,
      background: 'rgba(220,72,72,0.12)', color: 'var(--memox-error)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      flexShrink: 0
    }}>
        <Ic name="cloud-off" size={16} color="var(--memox-error)" />
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 14, fontWeight: 700, letterSpacing: '-0.1px', marginBottom: 4 }}>
          Couldn't load today's summary
        </div>
        <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)', lineHeight: 1.55, marginBottom: 12 }}>
          Your cards are safe on this device. You can still open Library directly.
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="pill-btn primary" style={{ height: 34, padding: '0 14px', borderRadius: 10, fontSize: 12 }}>
            <Ic name="refresh-cw" size={13} color="#fff" />
            Retry
          </button>
          <button className="pill-btn outline" style={{ height: 34, padding: '0 14px', borderRadius: 10, fontSize: 12 }}>
            Open Library
          </button>
        </div>
      </div>
    </div>;


  return (
    <div className="app">
      <StatusBar />

      {/* App bar — greeting on the left, two icons right */}
      <div className="appbar appbar-lg" style={{
        flexDirection: 'column', alignItems: 'flex-start', gap: 2,
        paddingTop: 18, paddingBottom: 14, position: 'relative'
      }}>
        {loading ?
        <>
            <Skel w={180} h={22} />
            <div style={{ height: 6 }} />
            <Skel w={120} h={11} op={0.4} />
          </> :

        <>
            <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.5px' }}>
              {onboarding ? 'Welcome to MemoX' : greeting}
            </div>
            <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)' }}>
              {onboarding ? 'Let’s build your first deck' : subgreeting}
            </div>
          </>
        }
        <div style={{
          position: 'absolute', right: 14, top: 18,
          display: 'flex', gap: 4
        }}>
          <button className="icon-btn" title="Search" aria-label="Search">
            <Ic name="search" size={18} color="var(--memox-on-surface-variant)" />
          </button>
          <button className="icon-btn" title="Settings" aria-label="Settings">
            <Ic name="settings" size={18} color="var(--memox-on-surface-variant)" />
          </button>
        </div>
      </div>

      <div className="scroll" style={{ padding: '0 14px 14px' }}>

        {offline && <OfflineBanner />}
        {error && <ErrorCard />}

        {/* ── ONBOARDING — zero content branch ─────────────── */}
        {onboarding &&
        <div style={{ marginTop: 8 }}>
            <div className="card" style={{ padding: '32px 22px 28px', textAlign: 'center', marginBottom: 14 }}>
              <div style={{
              width: 64, height: 64, borderRadius: 18,
              background: 'rgba(82,101,245,0.10)', color: 'var(--memox-primary)',
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              marginBottom: 14
            }}>
                <Ic name="sparkles" size={28} color="var(--memox-primary)" />
              </div>
              <div style={{ fontSize: 19, fontWeight: 700, letterSpacing: '-0.3px', marginBottom: 8 }}>
                Ready to remember more?
              </div>
              <div style={{
              fontSize: 13, color: 'var(--memox-on-surface-variant)', lineHeight: 1.55,
              marginBottom: 18, padding: '0 6px'
            }}>
                Create your first deck and add a handful of cards. MemoX will surface the right ones to review each day — calmly, on your schedule.
              </div>
              <button className="pill-btn primary" style={{
              height: 40, padding: '0 18px', borderRadius: 12, fontSize: 14, marginBottom: 8,
              width: '100%'
            }}>
                <Ic name="layers" size={16} color="#fff" />
                Create first deck
              </button>
              <button className="pill-btn" style={{
              height: 40, padding: '0 18px', borderRadius: 12, fontSize: 13,
              background: 'rgba(82,101,245,0.08)', color: 'var(--memox-primary)',
              border: 'none', width: '100%', gap: 7
            }}>
                <Ic name="upload" size={14} color="var(--memox-primary)" />
                Import a deck
              </button>
            </div>

            {/* Three reassurance points — calm, no gamification */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {[
            { ic: 'cloud', l: 'Local first', s: 'Your cards live on this device. Sync is optional.' },
            { ic: 'sun', l: 'A daily rhythm', s: 'Short sessions; we pick what’s due each day.' },
            { ic: 'shield-check', l: 'No streak pressure', s: 'Skip a day and your progress is safe.' }].
            map((b) =>
            <div key={b.l} className="card" style={{
              padding: '12px 14px',
              display: 'grid', gridTemplateColumns: '32px 1fr', gap: 12, alignItems: 'center'
            }}>
                  <div style={{
                width: 28, height: 28, borderRadius: 8,
                background: 'rgba(82,101,245,0.08)', color: 'var(--memox-primary)',
                display: 'flex', alignItems: 'center', justifyContent: 'center'
              }}>
                    <Ic name={b.ic} size={13} color="var(--memox-primary)" />
                  </div>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: '-0.1px' }}>{b.l}</div>
                    <div style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 1, lineHeight: 1.4 }}>{b.s}</div>
                  </div>
                </div>
            )}
            </div>
          </div>
        }

        {/* ── STREAK BROKEN banner — one-time, gentle ─────── */}
        {streakBroken && !onboarding &&
        <div style={{
          display: 'flex', alignItems: 'flex-start', gap: 10,
          padding: '12px 14px',
          background: 'var(--memox-surface-container-lowest)',
          border: 'var(--memox-border-ghost)',
          borderRadius: 12,
          marginBottom: 14
        }}>
            <Ic name="leaf" size={16} color="var(--memox-mastery)" />
            <div style={{ flex: 1, fontSize: 12, lineHeight: 1.55, color: 'var(--memox-on-surface)' }}>
              <strong style={{ fontWeight: 700 }}>Streak paused at 11 days.</strong>{' '}
              <span style={{ color: 'var(--memox-on-surface-variant)' }}>That's fine — pick up whenever you're ready. Your cards waited for you.</span>
            </div>
            <button className="icon-btn" style={{ width: 24, height: 24 }} title="Dismiss">
              <Ic name="x" size={13} color="var(--memox-on-surface-variant)" />
            </button>
          </div>
        }

        {/* ── CONTINUE STUDYING — top placement when present ──── */}
        {!onboarding && !loading && hasResume &&
        <div style={{ marginBottom: 14 }}>
            <div className="ov" style={{
            padding: '0 4px 8px',
            display: 'inline-flex', alignItems: 'center', gap: 6
          }}>
              <span style={{
              width: 6, height: 6, borderRadius: 999,
              background: 'var(--memox-streak)',
              display: 'inline-block',
              animation: 'memoxPulseDot 1.8s ease-in-out infinite'
            }} />
              Continue studying
            </div>
            <div className="card" style={{
            padding: '14px',
            background: 'linear-gradient(135deg, rgba(217,137,30,0.08) 0%, rgba(82,101,245,0.08) 100%)',
            border: '1px solid rgba(217,137,30,0.20)'
          }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
                <div style={{
                width: 42, height: 42, borderRadius: 12,
                background: 'var(--memox-streak)', color: '#fff',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                flexShrink: 0
              }}>
                  <Ic name="pause" size={18} color="#fff" />
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{
                  fontSize: 14, fontWeight: 700, letterSpacing: '-0.1px',
                  whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'
                }}>TOPIK II — Vocab</div>
                  <div style={{
                  fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 2,
                  display: 'inline-flex', alignItems: 'center', gap: 6
                }}>
                    <span>Recall · 7 / 20 cards</span>
                    <span style={{ opacity: 0.5 }}>·</span>
                    <span>paused 32m ago</span>
                  </div>
                  {/* Progress mini */}
                  <div style={{
                  marginTop: 8, height: 4, background: 'rgba(82,101,245,0.15)',
                  borderRadius: 999, overflow: 'hidden', width: '100%'
                }}>
                    <div style={{ height: '100%', width: '35%', background: 'var(--memox-primary)' }} />
                  </div>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="pill-btn primary" style={{
                flex: 1, height: 40, borderRadius: 11, fontSize: 13, gap: 7
              }}>
                  <Ic name="play" size={14} color="#fff" />
                  Resume
                </button>
                <button className="pill-btn outline" style={{
                height: 40, padding: '0 14px', borderRadius: 11, fontSize: 12,
                color: 'var(--memox-on-surface-variant)',
                borderColor: 'var(--memox-outline-variant)'
              }}>
                  Discard
                </button>
              </div>
              {/* Multiple paused — bottom sheet entry */}
              {multiResume &&
            <button style={{
              marginTop: 10, width: '100%',
              height: 32, borderRadius: 9, fontSize: 11, fontWeight: 600,
              background: 'rgba(82,101,245,0.08)',
              color: 'var(--memox-primary)',
              border: 'none', cursor: 'pointer', fontFamily: 'inherit',
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 5
            }}>
                  3 other paused sessions
                  <Ic name="chevron-right" size={12} color="var(--memox-primary)" />
                </button>
            }
            </div>
          </div>
        }

        {/* ── LOADING — section skeletons ─────────────────── */}
        {loading &&
        <>
            {/* Streak/goal skeleton */}
            <div style={{ display: 'flex', gap: 10, marginBottom: 14 }}>
              <div className="card" style={{ padding: '14px', flex: 1 }}>
                <Skel w={60} h={9} op={0.4} />
                <div style={{ height: 10 }} />
                <Skel w={80} h={22} />
              </div>
              <div className="card" style={{ padding: '14px', width: 120, textAlign: 'center' }}>
                <Skel w={60} h={60} r={999} />
                <div style={{ height: 8 }} />
                <Skel w={50} h={9} op={0.4} />
              </div>
            </div>
            {/* Hero CTA skeleton */}
            <div className="card" style={{ padding: '14px', marginBottom: 10 }}>
              <Skel w={120} h={11} />
              <div style={{ height: 8 }} />
              <Skel w="60%" h={20} />
              <div style={{ height: 14 }} />
              <Skel w="100%" h={44} r={11} />
            </div>
            {/* Recents skeleton */}
            <div style={{ padding: '8px 4px 8px' }}>
              <Skel w={80} h={9} op={0.4} />
            </div>
            {[0, 1].map((i) =>
          <div key={i} className="card" style={{
            marginBottom: 8, padding: '12px 14px',
            display: 'grid', gridTemplateColumns: '36px 1fr 18px',
            gap: 12, alignItems: 'center'
          }}>
                <span style={{
              width: 32, height: 32, borderRadius: 9,
              background: 'var(--memox-surface-container-high)', opacity: 0.5,
              animation: 'memoxSkelPulse 1.4s ease-in-out infinite'
            }} />
                <div>
                  <Skel w={120 + i * 30} h={11} />
                  <div style={{ height: 6 }} />
                  <Skel w={70} h={9} op={0.4} />
                </div>
                <span />
              </div>
          )}
          </>
        }

        {/* ── STREAK + GOAL — calm summary, side by side ─── */}
        {!onboarding && !loading && (hasStreak || showGoal) &&
        <div style={{ display: 'flex', gap: 10, marginBottom: 14 }}>

            {/* Streak chip — only if streak >= 1 (per spec hide at 0) */}
            {hasStreak && summary.streak > 0 &&
          <div className="card" style={{
            padding: '12px 14px', flex: 1,
            display: 'flex', alignItems: 'center', gap: 12
          }}>
                <div style={{
              width: 38, height: 38, borderRadius: 11,
              background: 'rgba(217,137,30,0.12)', color: 'var(--memox-streak)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              flexShrink: 0
            }}>
                  <Ic name="flame" size={18} color="var(--memox-streak)" />
                </div>
                <div style={{ minWidth: 0 }}>
                  <div className="ov">Streak</div>
                  <div style={{
                fontSize: 18, fontWeight: 700, letterSpacing: '-0.3px',
                fontVariantNumeric: 'tabular-nums', marginTop: 1
              }}>{summary.streak} <span style={{ fontSize: 11, color: 'var(--memox-on-surface-variant)', fontWeight: 600 }}>days</span></div>
                </div>
              </div>
          }

            {/* Goal ring — only if goal enabled (per spec) */}
            {showGoal &&
          <div className="card" style={{
            padding: '12px 14px', flex: 1,
            display: 'flex', alignItems: 'center', gap: 12
          }}>
                <svg width="38" height="38" viewBox="0 0 40 40" style={{ flexShrink: 0 }}>
                  <circle cx="20" cy="20" r="16" fill="none"
              stroke="var(--memox-surface-container)" strokeWidth="3.5" />
                  <circle cx="20" cy="20" r="16" fill="none"
              stroke="var(--memox-primary)" strokeWidth="3.5"
              strokeLinecap="round"
              strokeDasharray="100.5"
              strokeDashoffset={(1 - goalPct) * 100.5}
              transform="rotate(-90 20 20)" />
                </svg>
                <div style={{ minWidth: 0 }}>
                  <div className="ov">Today’s goal</div>
                  <div style={{
                fontSize: 18, fontWeight: 700, letterSpacing: '-0.3px',
                fontVariantNumeric: 'tabular-nums', marginTop: 1
              }}>
                    {summary.completedToday}<span style={{
                  fontSize: 11, color: 'var(--memox-on-surface-variant)', fontWeight: 600
                }}> / {summary.dailyGoal}</span>
                  </div>
                </div>
              </div>
          }
          </div>
        }

        {/* ── PRIMARY CTA — Today's review (strongest when due) ── */}
        {!onboarding && !loading && !error &&
        <>
            {hasDue ?
          <div className="card" style={{
            padding: '16px',
            marginBottom: 10,
            background: 'linear-gradient(135deg, rgba(82,101,245,0.10) 0%, rgba(139,111,245,0.10) 100%)',
            border: '1px solid rgba(82,101,245,0.22)'
          }}>
                <div className="ov" style={{
              display: 'inline-flex', alignItems: 'center', gap: 6,
              color: 'var(--memox-primary)', marginBottom: 10
            }}>
                  <Ic name="zap" size={11} color="var(--memox-primary)" />
                  Today’s review
                </div>
                <div style={{
              fontSize: 24, fontWeight: 700, letterSpacing: '-0.5px', lineHeight: 1.1,
              fontVariantNumeric: 'tabular-nums', marginBottom: 4
            }}>
                  {summary.dueTotal} cards due
                </div>
                <div style={{
              fontSize: 12, color: 'var(--memox-on-surface-variant)', lineHeight: 1.5,
              marginBottom: 14
            }}>
                  Across 3 decks · about {summary.minutesEst} minutes
                </div>
                <button className="pill-btn primary" style={{
              width: '100%', height: 40, borderRadius: 12, fontSize: 14, gap: 8
            }}>
                  <Ic name="play" size={16} color="#fff" />
                  Start today’s review
                </button>
              </div> :

          // No due cards — calm "all caught up"
          <div className="card" style={{
            padding: '18px 16px', marginBottom: 10, textAlign: 'center'
          }}>
                <div style={{
              width: 44, height: 44, borderRadius: 12,
              background: 'rgba(31,138,91,0.10)', color: 'var(--memox-mastery)',
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              marginBottom: 10
            }}>
                  <Ic name="check-circle-2" size={20} color="var(--memox-mastery)" />
                </div>
                <div style={{ fontSize: 15, fontWeight: 700, letterSpacing: '-0.2px', marginBottom: 4 }}>
                  All caught up for today
                </div>
                <div style={{ fontSize: 12, color: 'var(--memox-on-surface-variant)', lineHeight: 1.5 }}>
                  Nothing is due. New cards are still available if you want a head start.
                </div>
              </div>
          }

            {/* Secondary: start new learning */}
            <button className="pill-btn" style={{
            width: '100%', height: 40, borderRadius: 11, fontSize: 13,
            background: 'rgba(82,101,245,0.08)', color: 'var(--memox-primary)',
            border: 'none', gap: 7, marginBottom: 18
          }}>
              <Ic name="sparkles" size={14} color="var(--memox-primary)" />
              Start new learning
              <span style={{
              fontSize: 10, fontWeight: 700, padding: '1px 6px', borderRadius: 999,
              background: 'rgba(82,101,245,0.14)',
              color: 'var(--memox-primary)',
              fontVariantNumeric: 'tabular-nums'
            }}>{summary.freshTotal} new</span>
            </button>
          </>
        }

        {/* ── RECENT DECKS ────────────────────────────────── */}
        {!onboarding && !loading &&
        <>
            <div style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            padding: '0 4px 8px'
          }}>
              <div className="ov">Recent decks</div>
              <button style={{
              background: 'transparent', border: 'none', padding: 0,
              color: 'var(--memox-primary)', fontSize: 11, fontWeight: 600,
              fontFamily: 'inherit', cursor: 'pointer',
              display: 'inline-flex', alignItems: 'center', gap: 3
            }}>
                Library
                <Ic name="chevron-right" size={11} color="var(--memox-primary)" />
              </button>
            </div>
            <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
              {[
            { n: 'TOPIK II — Vocab', cards: 142, due: 23, last: '2h ago', col: '#5265F5' },
            { n: 'Idioms', cards: 34, due: 3, last: 'yesterday', col: '#8B6FF5' },
            { n: 'Verb conjugation', cards: 148, due: 0, last: 'a week ago', col: '#2BA88B' }].
            map((d, i, a) =>
            <div key={d.n} style={{
              display: 'grid', gridTemplateColumns: '34px 1fr auto',
              gap: 12, alignItems: 'center', padding: '12px 14px',
              borderBottom: i < a.length - 1 ? 'var(--memox-border-ghost)' : 'none',
              cursor: 'pointer'
            }}>
                  <div style={{
                width: 30, height: 30, borderRadius: 9,
                background: `${d.col}1F`, color: d.col,
                display: 'flex', alignItems: 'center', justifyContent: 'center'
              }}>
                    <Ic name="layers" size={14} color={d.col} />
                  </div>
                  <div style={{ minWidth: 0 }}>
                    <div style={{
                  fontSize: 13, fontWeight: 600, letterSpacing: '-0.1px',
                  whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'
                }}>{d.n}</div>
                    <div style={{
                  fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 1,
                  fontVariantNumeric: 'tabular-nums'
                }}>
                      {d.cards} cards · last {d.last}
                    </div>
                  </div>
                  {d.due > 0 ?
              <span style={{
                height: 20, padding: '0 7px', borderRadius: 999,
                background: 'rgba(82,101,245,0.10)', color: 'var(--memox-primary)',
                fontSize: 10, fontWeight: 700, fontVariantNumeric: 'tabular-nums',
                display: 'inline-flex', alignItems: 'center'
              }}>{d.due} due</span> :

              <Ic name="chevron-right" size={15} color="var(--memox-on-surface-variant)" />
              }
                </div>
            )}
            </div>
          </>
        }
      </div>

      <BottomNav active="home" onChange={go} />

      <style>{`
        @keyframes memoxPulseDot { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.6; } }
        @keyframes memoxSkelPulse { 0%, 100% { opacity:0.45; } 50% { opacity:0.75; } }
      `}</style>
    </div>);

}

/* ─────── Screen: Progress ───────
   Read-only trend analytics. Different from Dashboard (today-focused).
   Each chart has its own empty/insufficient-data state — never one
   generic empty placeholder over the whole screen.

   Variants ('state' prop):
     loaded         - populated week range (default)
     month          - populated month range
     loading        - per-card skeletons
     empty          - no study data at all
     insufficient   - some data but not enough for trend
     partial        - one chart has data, others don't
     error          - aggregate load failed
*/
function ProgressScreen({ go, state = 'loaded' }) {
  const loading = state === 'loading';
  const error = state === 'error';
  const allEmpty = state === 'empty';
  const insufficient = state === 'insufficient';
  const partial = state === 'partial';
  const range = state === 'month' ? 'month' : 'week';

  // Sample data per range
  const studied = {
    week: [12, 18, 0, 22, 14, 9, 17],
    month: [11, 14, 18, 16, 0, 9, 21, 19, 12, 16, 22, 14, 13, 18, 8, 11, 16, 19, 15, 12, 17, 14, 0, 13, 16, 22, 18, 14]
  };
  const accuracy = {
    week: [0.62, 0.68, null, 0.71, 0.78, 0.74, 0.82],
    month: [0.58, 0.61, 0.65, 0.64, null, 0.68, 0.72, 0.74, 0.71, 0.76, 0.78, 0.80, 0.78, 0.82, 0.79, 0.77, 0.80, 0.82, 0.85, 0.83, 0.79, 0.81, null, 0.84, 0.86, 0.88, 0.87, 0.85]
  };

  // Box distribution — 8 boxes (Leitner-style). ALWAYS sorted by box number.
  const boxes = [
  { n: 1, count: 24, label: 'New / lapsed' },
  { n: 2, count: 38, label: 'Learning' },
  { n: 3, count: 54, label: 'Short-term' },
  { n: 4, count: 71, label: 'Reviewing' },
  { n: 5, count: 86, label: 'Reinforcing' },
  { n: 6, count: 62, label: 'Strong' },
  { n: 7, count: 48, label: 'Long-term' },
  { n: 8, count: 31, label: 'Mastered' }];

  const maxBox = Math.max(...boxes.map((b) => b.count));

  const dayLabels = {
    week: ['M', 'T', 'W', 'T', 'F', 'S', 'S'],
    month: ['1', '', '', '', '5', '', '', '', '', '10', '', '', '', '', '15', '', '', '', '', '20', '', '', '', '', '25', '', '', '']
  };

  const labels = dayLabels[range];
  const studyArr = studied[range];
  const accArr = accuracy[range];

  const totalStudied = studyArr.reduce((a, b) => a + b, 0);
  const avgAcc = (() => {
    const valid = accArr.filter((v) => v != null);
    return valid.reduce((a, b) => a + b, 0) / valid.length;
  })();
  const accDelta = +0.04; // vs previous range

  // ── helpers ─────────────────────────────────────────────────────
  const Skel = ({ w = '100%', h = 12, op = 0.5, r = 6 }) =>
  <span style={{
    display: 'block', width: w, height: h, borderRadius: r,
    background: 'var(--memox-surface-container-high)',
    opacity: op, animation: 'memoxSkelPulse 1.4s ease-in-out infinite'
  }} />;


  // Card chrome — gives each chart a consistent shell
  const Card = ({ title, value, sub, children, dim }) =>
  <div className="card" style={{
    padding: '14px', marginBottom: 12,
    opacity: dim ? 0.6 : 1
  }}>
      <div style={{
      display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
      gap: 8, marginBottom: 12
    }}>
        <div style={{ minWidth: 0 }}>
          <div className="ov">{title}</div>
          {value != null &&
        <div style={{
          fontSize: 24, fontWeight: 700, letterSpacing: '-0.5px',
          lineHeight: 1.1, marginTop: 4, fontVariantNumeric: 'tabular-nums'
        }}>{value}</div>
        }
          {sub &&
        <div style={{
          fontSize: 11, color: 'var(--memox-on-surface-variant)', marginTop: 3
        }}>{sub}</div>
        }
        </div>
      </div>
      {children}
    </div>;


  // Per-chart empty state — never re-used as a global empty
  const ChartEmpty = ({ line }) =>
  <div style={{
    padding: '24px 16px', textAlign: 'center',
    background: 'var(--memox-surface-container-lowest)',
    borderRadius: 11,
    border: '1px dashed var(--memox-outline-variant)',
    fontSize: 12, color: 'var(--memox-on-surface-variant)',
    lineHeight: 1.5
  }}>
      {line}
    </div>;


  const InsufficientHint = ({ needed }) =>
  <div style={{
    padding: '10px 12px',
    background: 'rgba(82,101,245,0.04)',
    border: '1px solid rgba(82,101,245,0.14)',
    borderRadius: 11,
    fontSize: 11, color: 'var(--memox-on-surface-variant)',
    lineHeight: 1.5,
    display: 'flex', gap: 8, alignItems: 'flex-start',
    marginTop: 10
  }}>
      <Ic name="info" size={13} color="var(--memox-primary)" />
      <span>Trend appears after <strong style={{ color: 'var(--memox-on-surface)', fontWeight: 700 }}>{needed}</strong> of data.</span>
    </div>;


  // ── ERROR — replaces body ─────────────────────────────────────
  if (error) {
    return (
      <div className="app">
        <StatusBar />
        <div className="appbar appbar-lg">
          <div style={{ fontSize: 24, fontWeight: 700, letterSpacing: '-0.5px' }}>Progress</div>
        </div>
        <div className="scroll" style={{ padding: '24px 22px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div className="card" style={{ padding: '36px 22px', textAlign: 'center', width: '100%' }}>
            <div style={{
              width: 52, height: 52, borderRadius: 14,
              background: 'rgba(220,72,72,0.10)', color: 'var(--memox-error)',
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              marginBottom: 14
            }}>
              <Ic name="cloud-off" size={22} color="var(--memox-error)" />
            </div>
            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 6 }}>
              Couldn't summarise your progress
            </div>
            <div style={{ fontSize: 13, color: 'var(--memox-on-surface-variant)', lineHeight: 1.55, marginBottom: 16 }}>
              Your study history is safe on this device. Try again in a moment.
            </div>
            <button className="pill-btn primary" style={{ height: 40, padding: '0 18px', borderRadius: 11, fontSize: 13 }}>
              <Ic name="refresh-cw" size={14} color="#fff" />
              Retry
            </button>
          </div>
        </div>
        <BottomNav active="stats" onChange={go} />
      </div>);

  }

  return (
    <div className="app">
      <StatusBar />

      <div className="appbar appbar-lg" style={{ justifyContent: 'space-between' }}>
        <div style={{ fontSize: 24, fontWeight: 700, letterSpacing: '-0.5px' }}>Progress</div>
        <button className="icon-btn" title="About these numbers">
          <Ic name="help-circle" size={18} color="var(--memox-on-surface-variant)" />
        </button>
      </div>

      <div className="scroll" style={{ padding: '0 14px 14px' }}>

        {/* Range selector */}
        <div style={{
          display: 'inline-flex', padding: 3, gap: 2,
          background: 'var(--memox-surface-container)', borderRadius: 11,
          marginBottom: 14
        }}>
          {[
          { id: 'week', label: 'Week' },
          { id: 'month', label: 'Month' },
          { id: 'all', label: 'All time' }].
          map((t) => {
            const active = t.id === range;
            return (
              <button key={t.id} style={{
                height: 32, padding: '0 16px', borderRadius: 9,
                background: active ? 'var(--memox-surface-container-lowest)' : 'transparent',
                border: 'none',
                color: active ? 'var(--memox-on-surface)' : 'var(--memox-on-surface-variant)',
                fontSize: 12, fontWeight: 600,
                fontFamily: 'inherit', cursor: 'pointer',
                boxShadow: active ? '0 1px 2px rgba(25,28,30,0.06)' : 'none'
              }}>{t.label}</button>);

          })}
        </div>

        {/* ── LOADING — per-card skeletons ─────────────────── */}
        {loading &&
        <>
            {[0, 1, 2].map((i) =>
          <div key={i} className="card" style={{ padding: '14px', marginBottom: 12 }}>
                <Skel w={80} h={9} op={0.4} />
                <div style={{ height: 8 }} />
                <Skel w={120} h={20} />
                <div style={{ height: 14 }} />
                <Skel w="100%" h={70} r={10} />
              </div>
          )}
          </>
        }

        {/* ── POPULATED / EMPTY / INSUFFICIENT / PARTIAL ─── */}
        {!loading &&
        <>
            {/* 1. Cards studied (bar chart) */}
            <Card
            title="Cards studied"
            value={allEmpty || insufficient ? null : totalStudied}
            sub={allEmpty || insufficient ? null : `over the past ${range === 'week' ? '7 days' : '28 days'}`}>
            
              {allEmpty ?
            <ChartEmpty line="No study sessions in this range yet. Start any deck to begin tracking trends." /> :
            insufficient ?
            <>
                  <ChartEmpty line="Only 1 day of data so far." />
                  <InsufficientHint needed="3 days" />
                </> :

            <>
                  <div style={{
                display: 'flex', alignItems: 'flex-end', gap: range === 'month' ? 3 : 8,
                height: 78,
                padding: '0 2px'
              }}>
                    {studyArr.map((v, i) => {
                  const max = Math.max(...studyArr);
                  const pct = max > 0 ? v / max : 0;
                  const isToday = i === studyArr.length - 1;
                  return (
                    <div key={i} style={{
                      flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'flex-end',
                      height: '100%'
                    }}>
                          <div style={{
                        width: '100%',
                        height: v === 0 ? 2 : `${Math.max(pct * 100, 6)}%`,
                        borderRadius: 4,
                        background: v === 0 ?
                        'var(--memox-surface-container-high)' :
                        isToday ? 'var(--memox-primary)' : 'rgba(82,101,245,0.55)'
                      }} />
                        </div>);

                })}
                  </div>
                  <div style={{
                display: 'flex', gap: range === 'month' ? 3 : 8,
                marginTop: 6, padding: '0 2px',
                fontSize: 10, color: 'var(--memox-on-surface-variant)',
                fontVariantNumeric: 'tabular-nums'
              }}>
                    {labels.map((l, i) =>
                <span key={i} style={{ flex: 1, textAlign: 'center' }}>{l}</span>
                )}
                  </div>
                </>
            }
            </Card>

            {/* 2. Accuracy (line chart) */}
            <Card
            title="Accuracy"
            value={allEmpty ? null : partial ? null : `${Math.round(avgAcc * 100)}%`}
            sub={allEmpty || partial ? null :
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                  <Ic name={accDelta >= 0 ? 'trending-up' : 'trending-down'} size={11}
              color={accDelta >= 0 ? 'var(--memox-mastery)' : 'var(--memox-error)'} />
                  <span style={{ color: accDelta >= 0 ? 'var(--memox-mastery)' : 'var(--memox-error)', fontWeight: 600 }}>
                    {accDelta >= 0 ? '+' : ''}{Math.round(accDelta * 100)}%
                  </span>
                  <span style={{ opacity: 0.7 }}>vs previous {range}</span>
                </span>
            }>
            
              {allEmpty ?
            <ChartEmpty line="Accuracy appears once you've answered cards." /> :
            partial ?
            <ChartEmpty line="Not enough answered cards yet to show accuracy." /> :

            <svg viewBox={`0 0 ${range === 'month' ? 280 : 280} 80`} style={{ width: '100%', height: 80, display: 'block' }}>
                  {/* Gridlines */}
                  {[0, 0.25, 0.5, 0.75, 1].map((t) =>
              <line key={t} x1="0" x2="280" y1={t * 70 + 5} y2={t * 70 + 5}
              stroke="var(--memox-surface-container)" strokeWidth="1" />
              )}
                  {/* Path */}
                  {(() => {
                const w = 280;
                const pts = accArr.map((v, i) => {
                  const x = i / (accArr.length - 1) * w;
                  const y = v == null ? null : (1 - v) * 70 + 5;
                  return { x, y, v };
                });
                const validSegs = [];
                let cur = [];
                pts.forEach((p) => {
                  if (p.y == null) {
                    if (cur.length) {validSegs.push(cur);cur = [];}
                  } else cur.push(p);
                });
                if (cur.length) validSegs.push(cur);
                return validSegs.map((seg, si) =>
                <polyline key={si}
                fill="none"
                stroke="var(--memox-primary)"
                strokeWidth="2"
                strokeLinecap="round"
                strokeLinejoin="round"
                points={seg.map((p) => `${p.x},${p.y}`).join(' ')} />
                );
              })()}
                  {/* Last point */}
                  {(() => {
                const last = accArr[accArr.length - 1];
                if (last == null) return null;
                const w = 280;
                const x = w;
                const y = (1 - last) * 70 + 5;
                return (
                  <>
                        <circle cx={x} cy={y} r="4" fill="var(--memox-surface)" stroke="var(--memox-primary)" strokeWidth="2" />
                      </>);

              })()}
                </svg>
            }
            </Card>

            {/* 3. Box distribution — ALWAYS sorted by box number 1..8 */}
            <Card
            title="Box distribution"
            value={allEmpty ? null : boxes.reduce((a, b) => a + b.count, 0)}
            sub={allEmpty ? null : 'total cards across boxes'}>
            
              {allEmpty ?
            <ChartEmpty line="Cards spread across boxes as you study them." /> :

            <>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
                    {boxes.map((b) => {
                  const pct = b.count / maxBox * 100;
                  return (
                    <div key={b.n} style={{
                      display: 'grid', gridTemplateColumns: '18px 1fr 32px',
                      gap: 8, alignItems: 'center'
                    }}>
                          <span style={{
                        fontSize: 11, fontWeight: 700,
                        color: 'var(--memox-on-surface-variant)',
                        fontVariantNumeric: 'tabular-nums', textAlign: 'right'
                      }}>B{b.n}</span>
                          <div style={{
                        height: 14, borderRadius: 5, position: 'relative',
                        background: 'var(--memox-surface-container)',
                        overflow: 'hidden'
                      }}>
                            <div style={{
                          height: '100%', width: `${pct}%`,
                          background: b.n >= 6 ? 'var(--memox-mastery)' : 'var(--memox-primary)',
                          opacity: 0.35 + b.n / 8 * 0.65,
                          transition: 'width 200ms ease'
                        }} />
                          </div>
                          <span style={{
                        fontSize: 11, fontWeight: 700,
                        fontVariantNumeric: 'tabular-nums', textAlign: 'right'
                      }}>{b.count}</span>
                        </div>);

                })}
                  </div>
                  <div style={{
                marginTop: 10,
                fontSize: 10, color: 'var(--memox-on-surface-variant)',
                display: 'flex', justifyContent: 'space-between',
                padding: '0 22px 0 22px'
              }}>
                    <span>B1 · least known</span>
                    <span>B8 · best known</span>
                  </div>
                </>
            }
            </Card>

            {/* 4. Streak — calm, no gamification */}
            <Card title="Streak">
              {allEmpty ?
            <ChartEmpty line="A streak starts after one study session." /> :
