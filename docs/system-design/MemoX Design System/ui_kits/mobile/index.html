<style>

  /* ─────────────────────────────────────────────────────────────────────
     SHARED MOBILE LAYOUT SYSTEM  (Flutter mapping in mind — see LAYOUT.md)
     Every screen is a column: [ AppBar ] [ ScreenScroll (Expanded) ] [ BottomBar ].
     Pinned chrome (FAB, sheets, scrims, toasts) is the ONLY absolutely-
     positioned layer. All bottom clearance is derived from the tokens below —
     never hand-tuned per screen.
       .app           → Flutter  Scaffold + SafeArea
       .scroll        → Flutter  Expanded( SingleChildScrollView )
       .bottom-nav    → Flutter  Scaffold.bottomNavigationBar
       sticky footer  → Flutter  Scaffold.bottomNavigationBar / persistentFooterButtons
       .fab           → Flutter  Scaffold.floatingActionButton
     ───────────────────────────────────────────────────────────────────── */
  .app {
    height: 100%; width: 100%; display: flex; flex-direction: column;
    background: var(--memox-bg); color: var(--memox-text-primary);
    position: relative; overflow: hidden;
    /* ── Layout constants (the single source of truth for spacing/clearance) ── */
    --screen-gutter: 14px;                          /* one shared horizontal screen padding (matches app bars + footers) */
    --safe-bottom: env(safe-area-inset-bottom, 0px);/* device safe area → Flutter SafeArea  */
    --fab-h: 52px;                                  /* extended-FAB height                   */
    --fab-inset: var(--memox-space-xl);             /* FAB offset from the screen bottom (24)*/
    --fab-nav-gap: 4px;                             /* FAB lift above the bottom-nav block   */
    --clear-comfort: var(--memox-space-xl);         /* breathing room above any pinned UI(24)*/
    /* Composite bottom clearances — measured from the scroll container's own bottom edge.
       The bottom nav & sticky footers are in-flow siblings (they do NOT overlap scroll),
       so a scroll only ever needs to clear the FAB, which is the lone overlapping chrome. */
    --clear-base:    calc(var(--clear-comfort) + var(--safe-bottom));                           /* nav / footer / plain */
    --clear-fab:     calc(var(--fab-inset) + var(--fab-h) + var(--clear-comfort) + var(--safe-bottom)); /* FAB, no nav     */
    --clear-fab-nav: calc(var(--fab-nav-gap) + var(--fab-h) + var(--clear-comfort) + var(--safe-bottom)); /* FAB above nav */
  }
  .statusbar { height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; font-size: 14px; font-weight: 600; }
  .appbar { height: var(--memox-size-appbar); display: flex; align-items: center; padding: 0 8px; gap: 4px; }
  .appbar .title { font-size: var(--memox-fs-title-medium); font-weight: 700; letter-spacing: -0.3px; flex: 1; }
  .appbar-lg { height: 56px; padding: 0 14px; }
  /* ScreenScroll — the one scrollable region per screen. Horizontal gutter + bottom
     clearance both come from tokens; clearance variant set by a modifier class, never
     a per-screen pixel value. */
  .scroll { flex: 1; overflow-y: auto; padding: 0 var(--screen-gutter) var(--clear-base); scrollbar-width: none; -ms-overflow-style: none; }
  .scroll.scroll-fab     { padding-bottom: var(--clear-fab); }      /* screen has a FAB, no bottom nav */
  .scroll.scroll-fab-nav { padding-bottom: var(--clear-fab-nav); } /* screen has a FAB above the nav  */
  .scroll::-webkit-scrollbar { display: none; }
  /* Shared FloatingActionButton — pinned chrome. Position is token-derived so it
     clears the device safe area (and the bottom nav, via .fab-above-nav) on every screen. */
  .fab {
    position: absolute; right: 16px; bottom: calc(var(--fab-inset) + var(--safe-bottom));
    height: var(--fab-h); padding: 0 18px 0 16px; border-radius: var(--memox-radius-lg);
    background: var(--memox-primary); color: var(--memox-on-primary); border: none;
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
    box-shadow: var(--memox-shadow-fab);
    z-index: 30;
  }
  .fab.fab-above-nav { bottom: calc(var(--memox-size-bottom-nav) + var(--fab-nav-gap) + var(--safe-bottom)); }
  .fab svg { width: 18px; height: 18px; }
  /* Lighter overline: lower weight + tighter tracking so section labels whisper, not shout */
  .ov { font-size: 11px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: var(--memox-text-secondary); }
  /* Flatter card: no border, pure-white on the tinted page, whisper shadow, roomier radius.
     This is the core of the lighter language — removes the boxed/bordered clutter across every screen. */
  .card { background: var(--memox-surface-raised); border: none; border-radius: 20px; padding: 18px; box-shadow: var(--memox-shadow-soft); }
  .memox-dark .card { box-shadow: var(--memox-shadow-none); border: var(--memox-border-ghost); } /* ghost edge defines cards on the near-adjacent dark surface ladder */
  .icon-btn { width: 36px; height: 36px; border-radius: 999px; display:inline-flex; align-items:center; justify-content:center; background: transparent; border: none; padding: 0; color: var(--memox-text-primary); cursor: pointer; }
  .icon-btn:hover { background: color-mix(in srgb, var(--memox-primary) 8%, transparent); }
  .memox-dark .icon-btn:hover { background: color-mix(in srgb, var(--memox-primary) 14%, transparent); }
  .icon-btn svg { width: 20px; height: 20px; }
  /* Scroll row — hide scrollbar but keep scrolling */
  .scroll-x { overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
  .scroll-x::-webkit-scrollbar { display: none; }
  /* Bottom-nav block — in-flow chrome (Flutter Scaffold.bottomNavigationBar).
     Bottom padding carries the device safe-area inset so the nav clears the home bar. */
  .bottom-nav-wrap { padding: 4px 10px calc(12px + env(safe-area-inset-bottom, 0px)); }
  .bottom-nav {
    height: 64px;
    background: var(--memox-chrome);
    backdrop-filter: var(--memox-chrome-blur);
    -webkit-backdrop-filter: var(--memox-chrome-blur);
    border: var(--memox-border-ghost);
    border-radius: var(--memox-radius-lg);

    grid-template-columns: repeat(4, 1fr);
    align-items: center;
  }
  .bn-item { display:flex; flex-direction:column; align-items:center; gap: 3px; color: var(--memox-text-secondary); font-size: 11px; font-weight: 600; cursor: pointer; }
  .bn-item svg { width: 20px; height: 20px; }
  .bn-item.active { color: var(--memox-primary); }
  /* Dark: lift active label/icon to the AA-safe indigo (brand #5265F5 text fails AA on navy) */
  .memox-dark .bn-item.active { color: var(--memox-primary-bright); }
  .bn-item.active .bn-pill { background: color-mix(in srgb, var(--memox-primary) 14%, transparent); padding: 4px 14px; border-radius: 999px; }
  .memox-dark .bn-item.active .bn-pill { background: color-mix(in srgb, var(--memox-primary) 20%, transparent); }
  button { font-family: inherit; cursor: pointer; }
  .pill-btn {

  .pill-btn.outline { background: transparent; color: var(--memox-primary); border: 1px solid var(--memox-outline-variant); }

  /* ── Dark mode (scoped, not via media query so users can toggle per preview) ── */
  /* Tokyo Nebula — deep navy night, paper indigo cards, violet accent */
  .memox-dark {
    --memox-surface:                    #0A0E27;
    --memox-surface-bright:             #232B5A;
    --memox-surface-dim:                #060925;
    --memox-surface-container-lowest:   #131A3A;
    --memox-surface-container-low:      #1B2249;
    --memox-surface-container:          #232B5A;
    --memox-surface-container-high:     #2C356E;
    --memox-surface-container-highest:  #353D7E;
    --memox-on-surface:          #E4E8FA;
    --memox-on-surface-variant:  #A4ACD0;
    --memox-outline:             #5A6BAE;
    --memox-outline-variant:     #2A3267;
    --memox-mastery: #6FE0BD;
    --memox-error:   #FF8FA3;

    --memox-on-error-fill: #FFFFFF;  /* unchanged — fill is dark in both modes */
    --memox-on-streak:     #FFFFFF;  /* unchanged — streak always warm, needs white text */
    --memox-streak:  #FFAE6E;
    --memox-chrome-glass: rgba(10, 14, 39, 0.84);
    --memox-border-ghost: 1px solid rgba(139, 154, 255, 0.16);
    --memox-primary:    #8B9AFF;              /* Phase 0: accessible dark primary (was #5265F5) */
    --memox-on-primary: #11173A;              /* deep navy content on the light-indigo fill */
    --memox-primary-bright: #8B9AFF;          /* alias — equal to --memox-primary now */
    --memox-primary-container:    #2D346A;
    --memox-on-primary-container: #D9DFFF;
    --memox-secondary: #9DA8E8;
    --memox-accent:    #B5A0FF;
    --memox-on-accent: #0A0E27;
    --memox-success:   #6FE0BD;
    --memox-warning:   #FFC658;
    --memox-mastery-fixed:    #1F4A37;
    --memox-on-mastery-fixed: #C7F2D8;
    /* Card status + rating — dark values (previously fell back to light tokens) */
    --memox-status-new:        #6B75A3;
    --memox-status-learning:   #FFC658;
    --memox-status-reviewing:  #8B9AFF;
    --memox-status-mastered:   #6FE0BD;
    --memox-rating-again:      #FF8FA3;
    --memox-rating-hard:       #FFC658;
    --memox-rating-good:       #8B9AFF;
    --memox-rating-easy:       #6FE0BD;
    --memox-self-missed:  #FF8FA3;
    --memox-self-partial: #FFC658;
    --memox-self-gotit:   #6FE0BD;
    --memox-mastery-low:  #8B4F66;
    --memox-mastery-mid:  #8B7338;
    --memox-mastery-high: #3F8070;
    /* ── Phase 0 — semantic role layer (dark, mirrors colors_and_type.css) ── */
    --memox-bg:              var(--memox-surface);
    --memox-surface-raised:  var(--memox-surface-container-lowest); /* paper indigo — aligned with colors_and_type.css dark */
    --memox-surface-muted:   var(--memox-surface-container-low);
    --memox-surface-hero:    color-mix(in srgb, var(--memox-primary) 12%, var(--memox-surface));
    --memox-chrome:          var(--memox-chrome-glass);
    --memox-border:          var(--memox-outline-variant);
    --memox-text-primary:    var(--memox-on-surface);
    --memox-text-secondary:  var(--memox-on-surface-variant);
    --memox-text-muted:      var(--memox-outline);
    --memox-primary-hover:   #A6B2FF;
    --memox-primary-soft:    color-mix(in srgb, var(--memox-primary) 20%, transparent);

    --memox-danger:          var(--memox-error);
    --memox-on-danger:       #2A0A12;

    --memox-danger-border:   color-mix(in srgb, var(--memox-error) 32%, transparent);
    --memox-on-success:      #06231A;
    --memox-success-soft:    color-mix(in srgb, var(--memox-success) 18%, transparent);
    --memox-success-border:  color-mix(in srgb, var(--memox-success) 32%, transparent);
    --memox-on-warning:      #2A1E00;
    --memox-warning-soft:    color-mix(in srgb, var(--memox-warning) 18%, transparent);
    --memox-warning-border:  color-mix(in srgb, var(--memox-warning) 32%, transparent);
    --memox-progress-track:  var(--memox-surface-container-high);
    --memox-badge-bg:        var(--memox-surface-container);
    --memox-shadow-none:     none;
    --memox-shadow-soft:     none;
    --memox-shadow-card:     0 16px 40px rgba(0,0,0,0.42);
    --memox-shadow-chrome:   0 -2px 14px rgba(0,0,0,0.36);
    --memox-shadow-fab:      0 10px 28px rgba(0,0,0,0.5);
  }

  /* ── A11y layer (added in audit pass) ───────────────────────────────
     Applies uniformly to every screen via shared primitives.
     Flutter mapping: focus ring → Material focus highlight;
     44px hit floor → IconButton's default 48dp tap target. */
  /* Visible keyboard focus on every interactive control */
  .app button:focus-visible,
  .icon-btn:focus-visible,
  .pill-btn:focus-visible,
  .bn-item:focus-visible,
  [role="switch"]:focus-visible,
  [role="button"]:focus-visible {
    outline: 2px solid var(--memox-primary);
    outline-offset: 2px;
  }
  /* Expand icon-button tap target to >=44px without changing visual size.
     Covers buttons that inline-shrink the visual circle (e.g. 24px dismiss). */
  .icon-btn { position: relative; }
  .icon-btn::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    width: var(--memox-size-touch); height: var(--memox-size-touch); transform: translate(-50%, -50%);
  }
  /* Bottom-nav items are real <button>s now — reset native chrome + give a tall tap area */
  .bn-item { background: none; border: none; width: 100%; padding: 8px 0; font-family: inherit; }
  /* Hidden-scrollbar utility for in-screen scrollers (matches .scroll behavior).
     overflow-x pinned to hidden: setting only overflow-y:auto makes overflow-x
     compute to auto too, which produced a stray horizontal scrollbar. */
  .hide-scroll { overflow-x: hidden; scrollbar-width: none; -ms-overflow-style: none; }
  .hide-scroll::-webkit-scrollbar { display: none; }
  /* Shared caret blink (SearchField + focused text-field mocks) */
  @keyframes memoxBlink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
  /* Respect reduced-motion: quiet the infinite skeleton/pulse loops */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;

  /* ── Design-token reference panel (Foundations) ───────────────────────

  :root { --tok-mono: ui-monospace, "SF Mono", "JetBrains Mono", "Roboto Mono", Menlo, Consolas, monospace; }

  .tok-intro {

  .tok-intro code { font-family: var(--tok-mono); font-size: 12px; background: color-mix(in srgb, var(--memox-primary) 10%, transparent); color: #3346d6; /* doc-only code-syntax blue — not a theme token */ padding: 1px 6px; border-radius: 5px; }
  body.stage-dark .tok-intro code { background: rgba(139,154,255,0.16); color: #B5C0FF; }
  .tok-legend { display: flex; flex-wrap: wrap; gap: 8px 18px; margin-top: 14px; font-size: 11.5px; color: #6a6f82; }
  body.stage-dark .tok-legend { color: #8b91a8; }

  .tok-block { margin-top: 30px; }
  .tok-block-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .tok-block-head .n { font-size: 11px; font-weight: 800; letter-spacing: 1px; color: #9499ab; font-family: var(--tok-mono); }
  .tok-block-head h3 { font-size: 16px; font-weight: 800; letter-spacing: -0.2px; margin: 0; }
  .tok-block-head .dart { font-size: 11.5px; font-weight: 600; font-family: var(--tok-mono); color: #3346d6; /* doc-only code-syntax blue — not a theme token */ background: color-mix(in srgb, var(--memox-primary) 8%, transparent); padding: 2px 8px; border-radius: 6px; }

  .tok-block-head .note { font-size: 12px; color: #6a6f82; }
  body.stage-dark .tok-block-head .note { color: #8b91a8; }

  /* color swatch grid */

  .tok-color {
    background: #fff; border: 1px solid rgba(20,24,48,0.09); border-radius: 14px; overflow: hidden;

     a DARK specimen (real MemoX tokens, .memox-dark scope) plus its Flutter

  body.stage-dark .wid-head { border-bottom-color: rgba(139,154,255,0.12); }
  .wid-head .nm { font-size: 13.5px; font-weight: 800; letter-spacing: -0.2px; display: flex; align-items: center; gap: 8px; }
  .wid-head .fl { font-family: var(--tok-mono); font-size: 11px; font-weight: 600; color: #3346d6; /* doc-only code-syntax blue — not a theme token */ margin-top: 3px; display: inline-block; }
  body.stage-dark .wid-head .fl { color: #B5C0FF; }

  body.stage-dark .wid-head .ds { color: #8b91a8; }
  /* dual-theme specimen stage — panes STACK vertically so each specimen gets
     the card's full width (side-by-side halved the width and broke the fonts) */
  .wid-stage { display: flex; flex-direction: column; }
  .wid-pane { padding: 18px 16px; min-height: 76px; display: flex; flex-direction: column; align-items: stretch; justify-content: center; gap: 10px; position: relative; }
  /* Fixed surface literals so the widget pane backdrop is immune to outer .memox-dark token
     overrides — the pane itself IS the scope boundary (light pane always light, dark always dark)
     so using var(--memox-bg) here would collapse when the pane sits inside .memox-dark. */
  .wid-pane.l { background: #F7F9FE; /* = --memox-surface light */ color: var(--memox-text-primary); }
  .wid-pane.d { background: #0A0E27; /* = --memox-surface dark  */ color: var(--memox-text-primary); }
  .wid-pane.l + .wid-pane.d { border-top: 1px solid rgba(139,154,255,0.16); }
  .wid-pane > .lab { position: absolute; top: 7px; right: 9px; font-family: var(--tok-mono); font-size: 8.5px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: rgba(20,24,48,0.30); }
  .wid-pane.d > .lab { color: rgba(228,232,250,0.34); }
  /* variant chips footer */
  .wid-foot { padding: 10px 15px 13px; display: flex; flex-wrap: wrap; gap: 6px; border-top: 1px solid rgba(20,24,48,0.06); }

  body.stage-dark .wid-foot .vt b { color: #B5C0FF; }

/* ─────── App wrapper with multiple phones ─────── */
// Lazy-mounts its screen only while near the horizontal viewport. With 129 frames,
// mounting every React tree on load is what made the gallery heavy — this keeps just
// the handful of frames in (and near) view mounted, and tears the rest down so the DOM
// stays small while scrolling. The .phone box is a fixed 390×780, so the placeholder
// reserves identical space and the scroll position never jumps.
const noop = () => {};

// Robust lazy-mount: mount a row's frames once it scrolls within ~1.6 viewports.
// Uses getBoundingClientRect on scroll/resize + an interval fallback, so it works
// in every environment (the old IntersectionObserver gate never fired in some webviews).
function useNear(ref) {
  const [near, setNear] = React.useState(false);
  React.useEffect(() => {
    if (near) return;
    let raf = null, iv = null, done = false;
    const cleanup = () => {
      window.removeEventListener('scroll', onScroll, true);
      window.removeEventListener('resize', onScroll);
      if (iv) clearInterval(iv);
      if (raf) cancelAnimationFrame(raf);
    };
    const check = () => {
      const n = ref.current; if (!n || done) return;
      const r = n.getBoundingClientRect();
      const vh = window.innerHeight || 800;
      if (r.top < vh * 1.6 && r.bottom > -vh * 0.6) { done = true; setNear(true); cleanup(); }
    };
    const onScroll = () => { if (raf) return; raf = requestAnimationFrame(() => { raf = null; check(); }); };
    window.addEventListener('scroll', onScroll, true);
    window.addEventListener('resize', onScroll);
    iv = setInterval(check, 350);
    check();
    return cleanup;
  }, [near]);
  return near;
}

// One device frame in a chosen theme. Dark applies the scoped .memox-dark token block.
function Frame({ theme, children }) {
  const dark = theme === 'dark';
  return (
    <div className={'frame-wrap' + (dark ? ' memox-dark' : '')}>
      <div className="phone">{children}</div>
      <div className="theme-label">
        <span className="theme-dot" style={{ background: dark ? '#8B9AFF' : '#5265F5' }}></span>
        {dark ? 'Dark · Tokyo Nebula' : 'Light · Tokyo Pure'}
      </div>
    </div>);
}

// A screen shown as a light+dark pair with a state stepper. Both frames share one state index.
function ScreenRow({ group, view, num }) {
  const [i, setI] = React.useState(0);
  const ref = React.useRef(null);
  const near = useNear(ref);
  const total = group.states.length;
  const cur = group.states[i % total];
  const single = total <= 1;
  const make = () => {
    const props = group.prop ? { go: noop, [group.prop]: cur[0] } : { go: noop };
    // Key by the current state value so screens that take the state only as a
    // useState initializer (Recall, Fill) remount and re-init when the stepper
    // changes states — otherwise both states render identically. Single-state
    // screens keep a constant key, so their interactivity is preserved.
    return React.createElement(group.Comp, { key: 'st-' + String(cur[0]), ...props });
  };
  const showLight = view !== 'dark';
  const showDark = view !== 'light';
  return (
    <div className="row" ref={ref}>
      <div className="row-head">
        <span className="row-num">{num}</span>
        <span className="row-title">{group.title}</span>
        {!single &&
          <div className="stepper" role="group" aria-label={group.title + ' states'}>
            <button onClick={() => setI((i - 1 + total) % total)} aria-label="Previous state" title="Previous state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <span className="st-label">{cur[1]} · {(i % total) + 1}/{total}</span>
            <button onClick={() => setI((i + 1) % total)} aria-label="Next state" title="Next state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            </button>
          </div>}
        {single && <span className="st-label st-single">Single state</span>}
      </div>
      {near ?
        <div className="pair">
          {showLight ? <Frame theme="light">{make()}</Frame> : null}
          {showDark ? <Frame theme="dark">{make()}</Frame> : null}
        </div> :
        <div className="row-placeholder"></div>}
    </div>);
}

// luminance check so the inline hex label stays legible on its own swatch
function isDarkHex(hex) {
  if (!hex || hex[0] !== '#') return false;
  const h = hex.length === 4
    ? hex.slice(1).split('').map((c) => parseInt(c + c, 16))
    : [parseInt(hex.slice(1, 3), 16), parseInt(hex.slice(3, 5), 16), parseInt(hex.slice(5, 7), 16)];
  return (0.299 * h[0] + 0.587 * h[1] + 0.114 * h[2]) < 150;
}

// one color token = a card with a Light chip + Dark chip, role + Dart symbol
function ColorToken({ role, dart, light, dark, tags }) {
  const chip = (hex, isDark) => (
    <div className="chip" style={{ background: hex || (isDark ? '#0A0E27' : '#F7F9FE') }}>
      {hex
        ? <span className={isDarkHex(hex) ? 'is-dark' : ''}>{hex}</span>
        : <span className={isDark ? 'is-dark' : ''} style={{ opacity: 0.7 }}>inherits</span>}
    </div>);
  return (
    <div className="tok-color">
      <div className="chips">{chip(light, false)}{chip(dark, true)}</div>
      <div className="meta">
        <div className="role">{role}</div>
        <div className="dart">{dart}</div>
      </div>
      {tags && tags.length
        ? <div className="tok-corner-tags">{tags.map((t) => <em key={t}>{t}</em>)}</div>
        : null}
    </div>);
}

/* ════════════════════════════════════════════════════════════════════════
   COMPONENTS — Shared-widget library (Flutter handoff)
   Every reusable widget the 23 screens compose from, rendered as a real
   LIGHT + DARK specimen using live MemoX tokens, with its Flutter widget
   mapping and the variants/props a dev must implement. Nothing here is a
   mock-up: specimens use the same classes/tokens the screens do.
   ════════════════════════════════════════════════════════════════════════ */

// One widget card: header (name + Flutter map + desc), a dual-theme specimen
// stage (light + dark panes sharing one render fn, STACKED so each is full
// width), and variant chips. Which panes show follows the toolbar View toggle
// (light / dark / both) via WidgetViewCtx — so a single theme reads big & clean.
const WidgetViewCtx = React.createContext('both');
function WidgetCard({ nm, fl, ds, render, variants, span2 }) {
  const view = React.useContext(WidgetViewCtx);
  const showL = view !== 'dark';
  const showD = view !== 'light';
  return (
    <div className={'wid-card' + (span2 ? ' span2' : '')}>
      <div className="wid-head">
        <div className="nm">{nm}</div>
        <span className="fl">{fl}</span>
        {ds ? <div className="ds">{ds}</div> : null}
      </div>
      <div className="wid-stage">
        {showL ? <div className="wid-pane l"><span className="lab">Light</span>{render()}</div> : null}
        {showD ? <div className="wid-pane d memox-dark"><span className="lab">Dark</span>{render()}</div> : null}
      </div>
      {variants && variants.length
        ? <div className="wid-foot">{variants.map((v, i) => <span className="vt" key={i}>{v}</span>)}</div>
        : null}
    </div>);
}
const VT = (label, val) => <React.Fragment><b>{label}</b>{val ? ' ' + val : ''}</React.Fragment>;

// small reusable specimen helpers (real MemoX classes/tokens) ----------------
const ddot = (c, s = 8) => <span className="status-dot" style={{ background: c, width: s, height: s }} />;
function MasteryRing({ pct = 0.62, size = 44 }) {
  const col = pct < 0.34 ? 'var(--memox-status-learning)' : pct < 0.67 ? 'var(--memox-status-reviewing)' : 'var(--memox-status-mastered)';
  return (
    <div style={{ width: size, height: size, borderRadius: '50%', background: `conic-gradient(${col} ${pct * 360}deg, var(--memox-surface-container) 0deg)`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ width: size - 6, height: size - 6, borderRadius: '50%', background: 'var(--memox-surface-container-lowest)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 700, color: 'var(--memox-text-primary)' }}>{Math.round(pct * 100)}</div>
    </div>);
}

function WidgetSection({ n, title, note, children }) {
  return (
    <div className="tok-block">
      <div className="tok-block-head">
        <span className="n">{n}</span>
        <h3>{title}</h3>
        {note ? <span className="note">{note}</span> : null}
      </div>
      <div className="wid-grid">{children}</div>
    </div>);
}

    <>
      <div className="controls">
        <div className="brandblock">
          <span className="brand">MemoX · Mobile UI Kit</span>
          <span className="sub">23 screens · light + dark · cycle states with the steppers</span>
        </div>
        <a className="kitlink" href="components.html">Components & foundations →</a>
        <div className="ctl">
          <span className="seg-label">View</span>
          <div className="seg">
            {['both','light','dark'].map((v) => <button key={v} className={view === v ? 'active' : ''} onClick={() => setView(v)}>{cap(v)}</button>)}
          </div>
        </div>
        <div className="ctl">
          <span className="seg-label">Width</span>
          <div className="seg">
            {widths.map((w) => <button key={w} className={width === w ? 'active' : ''} onClick={() => setWidth(w)}>{w}</button>)}
          </div>
        </div>
      </div>
      <div className="gallery" style={{ '--phone-w': width + 'px' }}>
        {GROUPS.map((g) => (
          <React.Fragment key={g.num}>
            {g.section ? <div className="section-head">{g.section}</div> : null}
            <ScreenRow group={g} view={view} num={g.num} />
          </React.Fragment>
        ))}
      </div>
    </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
