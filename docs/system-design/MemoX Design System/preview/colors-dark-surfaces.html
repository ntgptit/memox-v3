<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>MemoX — Tokyo Nebula Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 20px; background: #060925; color: #E4E8FA; font-family: var(--memox-font-sans); position: relative; overflow: hidden; }
  body::before {
    content:''; position:absolute; top:-80px; right:-60px;
    width:280px; height:280px; border-radius:999px;
    background: radial-gradient(circle, rgba(181,160,255,0.30), transparent 65%);
    filter: blur(6px); pointer-events:none;
  }
  .ladder { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; position: relative; z-index: 1; }
  .tile { height: 120px; border-radius: var(--memox-radius-md); border: 1px solid rgba(139,154,255,0.16); padding: 10px; display: flex; flex-direction: column; justify-content: space-between; color: #A4ACD0; }
  .nm { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: var(--memox-ls-section); line-height:1.3; }
  .hx { font-size: 10px; font-variant-numeric: tabular-nums; opacity: .8; }
  .role { font-size: 10px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: #B5A0FF; margin-bottom: 12px; position:relative; z-index:1; }
</style>
</head>
<body>
  <div class="role">Dark · Tokyo Nebula · cards float above page</div>
  <div class="ladder">
    <div class="tile" style="background:#060925"><div class="nm">Surface /<br>Dim</div><div class="hx">#060925</div></div>
    <div class="tile" style="background:#0A0E27"><div class="nm">Page</div><div class="hx">#0A0E27</div></div>
    <div class="tile" style="background:#131A3A"><div class="nm">Lowest /<br>Paper</div><div class="hx">#131A3A</div></div>
    <div class="tile" style="background:#1B2249"><div class="nm">Container<br>Low</div><div class="hx">#1B2249</div></div>
    <div class="tile" style="background:#232B5A"><div class="nm">Container</div><div class="hx">#232B5A</div></div>
    <div class="tile" style="background:#2C356E"><div class="nm">Container<br>High</div><div class="hx">#2C356E</div></div>
  </div>
</body>
</html>
