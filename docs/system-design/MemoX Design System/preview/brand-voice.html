<!doctype html>
<!-- @dsCard group="Brand" name="Brand · Voice" subtitle="Do vs don't (calm, no emoji, no hype)" viewport="700x220" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>MemoX — Voice</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: var(--memox-font-sans); color: var(--memox-on-surface); }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .col { border-radius: 12px; padding: 14px 16px; border: var(--memox-border-ghost); }
  .good { border-left: 4px solid var(--memox-mastery); }
  .bad { border-left: 4px solid var(--memox-error); }
  .ov { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--memox-on-surface-variant); margin-bottom: 8px; }
  .line { font-size: 14px; line-height: 1.45; margin-bottom: 6px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="col good">
      <div class="ov">Do · calm &amp; direct</div>
      <div class="line">"All caught up."</div>
      <div class="line">"You have 23 cards due."</div>
      <div class="line">"Good selected. Undo?"</div>
      <div class="line">"You're offline. Changes will sync later."</div>
    </div>
    <div class="col bad">
      <div class="ov">Don't · hype / emoji</div>
      <div class="line" style="color:var(--memox-on-surface-variant)">"Awesome job! 🎉🔥"</div>
      <div class="line" style="color:var(--memox-on-surface-variant)">"⚠️ Connection lost!!!"</div>
      <div class="line" style="color:var(--memox-on-surface-variant)">"Keep smashing it!!"</div>
      <div class="line" style="color:var(--memox-on-surface-variant)">"Oops, something went wrong"</div>
    </div>
  </div>
</body>
</html>
