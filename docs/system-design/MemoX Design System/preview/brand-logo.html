<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>MemoX — Logo</title>
    <link rel="stylesheet" href="../colors_and_type.css"/>
    <style>
        body { margin: 0; padding: 24px; background: #fff; font-family: var(--memox-font-sans); color: var(--memox-on-surface); display:flex; align-items:center; gap: 40px; }
        .logomark { width: 88px; height: 88px; border-radius: 20px; background: var(--memox-primary); display:flex; align-items:center; justify-content:center; color:#fff; font-weight: 800; font-size: 44px; letter-spacing:-2px; }
        .word { display:flex; align-items:center; gap: 14px; }
        .word .mk { width: 44px; height: 44px; border-radius: 12px; background: var(--memox-primary); display:flex; align-items:center; justify-content:center; color:#fff; font-weight: 800; font-size: 22px; letter-spacing:-1px; }
        .word .tx { font-size: 32px; font-weight: 800; letter-spacing: -0.64px; }
        .word .tx span { color: var(--memox-primary); }
        .meta { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; color: var(--memox-on-surface-variant); text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>
<div>
    <div class="logomark">Mx</div>
    <div class="meta">logomark</div>
</div>
<div>
    <div class="word">
        <div class="mk">Mx</div>
        <div class="tx">memo<span>X</span></div>
    </div>
    <div class="meta">wordmark</div>
</div>
</body>
</html>
