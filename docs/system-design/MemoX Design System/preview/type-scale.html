<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>MemoX — Type Scale</title>
    <link rel="stylesheet" href="../colors_and_type.css"/>
    <style>
        body { margin: 0; padding: 22px; background: #fff; font-family: var(--memox-font-sans); color: var(--memox-on-surface); }
        .row { display: grid; grid-template-columns: 80px 1fr 120px; align-items: baseline; gap: 14px; padding: 8px 0; border-bottom: var(--memox-border-ghost); }
        .row:last-child { border-bottom: none; }
        .size { font-size: 11px; font-weight: 700; color: var(--memox-on-surface-variant); letter-spacing: var(--memox-ls-section); text-transform: uppercase; font-variant-numeric: tabular-nums; }
        .meta { font-size: 11px; color: var(--memox-on-surface-variant); text-align: right; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
<div class="row">
    <div class="size">48 / 600</div>
    <div style="font-size:48px; font-weight:600; letter-spacing:-0.64px; line-height:1.1;">127</div>
    <div class="meta">Stat display</div>
</div>
<div class="row">
    <div class="size">32 / 700</div>
    <div style="font-size:32px; font-weight:700; letter-spacing:-0.64px; line-height:1.2;">Good
        evening
    </div>
    <div class="meta">Display large</div>
</div>
<div class="row">
    <div class="size">24 / 600</div>
    <div style="font-size:24px; font-weight:600; letter-spacing:-0.64px; line-height:1.2;">Korean
        vocabulary
    </div>
    <div class="meta">Headline</div>
</div>
<div class="row">
    <div class="size">20 / 600</div>
    <div style="font-size:20px; font-weight:600; line-height:1.2;">Due today</div>
    <div class="meta">Title large</div>
</div>
<div class="row">
    <div class="size">16 / 500</div>
    <div style="font-size:16px; font-weight:500; line-height:1.5;">Review 23 cards to keep your
        streak alive.
    </div>
    <div class="meta">Body · Title</div>
</div>
<div class="row">
    <div class="size">14 / 500</div>
    <div style="font-size:14px; font-weight:500; line-height:1.5; color:var(--memox-on-surface-variant);">
        Last studied 2 hours ago
    </div>
    <div class="meta">Body small · Label</div>
</div>
<div class="row">
    <div class="size">12 / 700</div>
    <div style="font-size:12px; font-weight:700; letter-spacing:1.2px; line-height:1.4; color:var(--memox-on-surface-variant); text-transform:uppercase;">
        Section overline
    </div>
    <div class="meta">Caption · Overline</div>
</div>
</body>
</html>
