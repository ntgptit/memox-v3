<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>MemoX — Surface Ladder (Tokyo Pure Light)</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 20px; background: #DDE2EF; }
  .ladder { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .tile { height: 120px; border-radius: var(--memox-radius-md); border: var(--memox-border-ghost); padding: 10px; display: flex; flex-direction: column; justify-content: space-between; color: var(--memox-on-surface-variant); }
  .tile .nm { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: var(--memox-ls-section); line-height:1.3; }
  .tile .hx { font-size: 10px; font-variant-numeric: tabular-nums; opacity: .7; }
</style>
</head>
<body>
  <div class="ladder">
    <div class="tile" style="background:#FFFFFF"><div class="nm">Container<br>Lowest</div><div class="hx">#FFFFFF</div></div>
    <div class="tile" style="background:#F7F9FE"><div class="nm">Surface /<br>Page</div><div class="hx">#F7F9FE</div></div>
    <div class="tile" style="background:#F1F4FB"><div class="nm">Container<br>Low</div><div class="hx">#F1F4FB</div></div>
    <div class="tile" style="background:#E9EDF7"><div class="nm">Container</div><div class="hx">#E9EDF7</div></div>
    <div class="tile" style="background:#E2E7F3"><div class="nm">Container<br>High</div><div class="hx">#E2E7F3</div></div>
    <div class="tile" style="background:#DAE0EF"><div class="nm">Highest /<br>Dim</div><div class="hx">#DAE0EF</div></div>
  </div>
</body>
</html>
