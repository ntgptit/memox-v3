<!doctype html>
<!-- @dsCard group="Components" name="Components · Deck card" subtitle="List item with single-color mastery bar" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>MemoX — Deck Card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--memox-surface-container-low); font-family: var(--memox-font-sans); color: var(--memox-on-surface); }
  .card { background: #fff; border-radius: 12px; border: var(--memox-border-ghost); padding: 14px; display: grid; grid-template-columns: 42px 1fr auto; gap: 12px; align-items:center; margin-bottom: 8px; }
  .ic { width: 42px; height: 42px; border-radius: 11px; background: rgba(82,101,245,0.10); display:flex; align-items:center; justify-content:center; }
  .ic svg { width: 22px; height: 22px; stroke: var(--memox-primary); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .ic.green { background: rgba(31,138,91,0.12); }
  .ic.green svg { stroke: var(--memox-mastery); }
  .title { font-size: 15px; font-weight: 600; }
  .sub { font-size: 12px; color: var(--memox-on-surface-variant); margin-top: 2px; }
  .bar-track { height: 5px; background: var(--memox-surface-container); border-radius: 999px; overflow: hidden; margin-top: 8px; }
  .bar-fill { height: 100%; }
  .pct { font-size: 11px; font-weight: 700; color: var(--memox-on-surface-variant); letter-spacing: 0.8px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="card">
    <div class="ic green"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
    <div>
      <div class="title">TOPIK II — Vocab</div>
      <div class="sub">142 cards · 23 due today</div>
      <div class="bar-track"><div class="bar-fill" style="width:86%; background:var(--memox-status-mastered)"></div></div>
    </div>
    <div class="pct">86%</div>
  </div>
  <div class="card">
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
    <div>
      <div class="title">Genki Ch. 1–5</div>
      <div class="sub">86 cards · all caught up</div>
      <div class="bar-track"><div class="bar-fill" style="width:52%; background:var(--memox-status-reviewing)"></div></div>
    </div>
    <div class="pct">52%</div>
  </div>
</body>
</html>
