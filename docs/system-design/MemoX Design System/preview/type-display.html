<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>MemoX — Display Specimen</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: var(--memox-font-sans); color: var(--memox-on-surface); }
  .overline { font-size: 12px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--memox-on-surface-variant); }
  .display { font-size: 48px; font-weight: 800; letter-spacing: -0.64px; line-height: 1.05; margin-top: 8px; }
  .mark { color: var(--memox-primary); }
  .meta { margin-top: 16px; font-size: 13px; color: var(--memox-on-surface-variant); display:flex; gap: 18px; }
  .meta span b { color: var(--memox-on-surface); font-weight:700; }
</style>
</head>
<body>
  <div class="overline">Plus Jakarta Sans · Google Fonts</div>
  <div class="display">Aa <span class="mark">Gg</span> Bb Qq 01 23</div>
  <div class="meta"><span><b>Weights</b> 400 · 500 · 600 · 700 · 800</span><span><b>Styles</b> Roman · Italic</span><span><b>Features</b> tabular-nums</span></div>
</body>
</html>
