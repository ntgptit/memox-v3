<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>MemoX — Dashboard · resume placement (Hướng B)</title>
    <link rel="stylesheet" href="../colors_and_type.css"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
            integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
            crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
            integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
            crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
            integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
            crossorigin="anonymous"></script>
    <style>
        body { margin: 0; font-family: var(--memox-font-sans); }

        /* ── shared app layout inside phone (mirrors the UI kit) ── */
        .app { height: 100%; width: 100%; display: flex; flex-direction: column; background: var(--memox-surface); color: var(--memox-on-surface); position: relative; overflow: hidden; }
        .statusbar { height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; font-size: 14px; font-weight: 600; }
        .appbar { display: flex; align-items: center; padding: 0 8px; gap: 4px; }
        .appbar-lg { padding: 0 14px; }
        .scroll { flex: 1; overflow-y: auto; padding: 0 14px 14px; scrollbar-width: none; -ms-overflow-style: none; }
        .scroll::-webkit-scrollbar { display: none; }
        .ov { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--memox-on-surface-variant); }
        .card { background: var(--memox-surface-container-lowest); border: var(--memox-border-ghost); border-radius: 12px; padding: 12px; }
        .icon-btn { width: 36px; height: 36px; border-radius: 999px; display:inline-flex; align-items:center; justify-content:center; background: transparent; border: none; padding: 0; color: var(--memox-on-surface); cursor: pointer; }
        .icon-btn:hover { background: rgba(82,101,245,0.08); }
        .icon-btn svg { width: 20px; height: 20px; }
        .bottom-nav-wrap { padding: 4px 10px 12px; }
        .bottom-nav {
          height: 64px;
          background: var(--memox-chrome-glass);
          backdrop-filter: var(--memox-chrome-blur);
          -webkit-backdrop-filter: var(--memox-chrome-blur);
          border: var(--memox-border-ghost);
          border-radius: 18px;
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          align-items: center;
        }
        .bn-item { display:flex; flex-direction:column; align-items:center; gap: 3px; color: var(--memox-on-surface-variant); font-size: 10px; font-weight: 600; }
        .bn-item svg { width: 20px; height: 20px; }
        .bn-item.active { color: var(--memox-primary); }
        .bn-item.active .bn-pill { background: rgba(82, 101, 245, 0.14); padding: 4px 14px; border-radius: 999px; }
        button { font-family: inherit; cursor: pointer; }
        .pill-btn {
          height: 40px; padding: 0 18px; border-radius: 10px; border: none;
          font-size: 13px; font-weight: 600; letter-spacing: 0.1px;
          display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        }
        .pill-btn.primary { background: var(--memox-primary); color: #fff; }
        .pill-btn.outline { background: transparent; color: var(--memox-primary); border: 1px solid var(--memox-outline-variant); }

        @keyframes memoxPulseDot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.85); } }
        @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="dashboard-variants.jsx"></script>
</body>
</html>
